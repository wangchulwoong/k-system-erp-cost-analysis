<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer, CartesianGrid, Cell } = Recharts;
const XLSX = window.XLSX;

/* =========================================================
   CONSTANTS & HELPERS
   ========================================================= */
const APP_NAME = "비용실적 분석시스템";
const DEFAULT_SETTINGS = { geminiKey: "", creds: { id: "admin", pw: "halla2026" } };

const MFG_KW = ["부재료","노무비","시간외","외주가공","전력비","연료비","수도광열","소모품비","수선유지","보험료(제)","임차료(제)","감가상각비(제)","잡비(제)","제조간접","작업","생산"];
const SGA_KW = ["급여","상여","퇴직급여","복리후생","여비교통","통신비","수도광열비","세금과공과","임차료(판)","감가상각비(판)","보험료(판)","광고선전","접대비","기부금","판매수수료","운반비","도서인쇄","소모품비(판)","잡비(판)","잡급","수수료","지급수수료"];

// 분석 제외 계정과목 (원가성 대분류 등 의미없는 지표)
const EXCLUDE_KW = ["레미콘 제품원가","제조원가","재료비","도급비","급료","임금","제품원가","상품원가","제품에서 타계정으로대체액","타계정으로대체"];

// 계정과목 상위분류 정규화: 수선비_건물 → 수선비
const normalizeAcc = acc => {
  const s = String(acc || "");
  const idx = s.indexOf("_");
  return idx > 0 ? s.slice(0, idx).trim() : s.trim();
};

const classify = acc => {
  const n = normalizeAcc(acc);
  if (MFG_KW.some(k => n.includes(k))) return "제조경비";
  if (SGA_KW.some(k => n.includes(k))) return "판관비";
  return "기타";
};

const fmt  = n => (n == null || isNaN(n)) ? "-" : Math.round(n).toLocaleString("ko-KR");
const fmtM = n => (n == null || isNaN(n)) ? "-" : (Math.round(n / 10000)).toLocaleString("ko-KR") + "만";
const diff_color = d => d > 0 ? "#e53e3e" : d < 0 ? "#2f855a" : "#718096";
const diff_label = d => (d > 0 ? "+" : "") + fmt(d);
const pct = (c, p) => {
  if (!p || p === 0) return c > 0 ? "신규" : "-";
  const v = ((c - p) / Math.abs(p) * 100);
  return (v > 0 ? "▲" : "▼") + Math.abs(v).toFixed(1) + "%";
};
const pct_color = (c, p) => {
  if (!p) return "#718096";
  return c > p ? "#e53e3e" : c < p ? "#2f855a" : "#718096";
};
const monthLabel = m => m && m.length >= 6 ? `${m.slice(0,4)}년 ${parseInt(m.slice(4,6))}월` : (m || "");

/* =========================================================
   STORAGE (localStorage 기반)
   ========================================================= */
function storageGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function storageSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}
function storageList(prefix) {
  try { return Object.keys(localStorage).filter(k => k.startsWith(prefix)); } catch(e) { return []; }
}
function storageDel(key) {
  try { localStorage.removeItem(key); } catch(e) {}
}

/* =========================================================
   EXCEL PARSING
   ========================================================= */
function parseExcelDate(v) {
  if (!v && v !== 0) return "";
  if (typeof v === "number") {
    try { const d = XLSX.SSF.parse_date_code(v); if (d) return `${d.y}${String(d.m).padStart(2,"0")}`; } catch(e) {}
  }
  const s = String(v).replace(/\D/g, "");
  return s.length >= 6 ? s.slice(0, 6) : "";
}

function parseERP(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
  const recs = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const month = parseExcelDate(r[1]);
    const unit  = String(r[3]  || "").trim();
    const acc   = String(r[16] || "").trim();
    const amt   = typeof r[17] === "number" ? r[17] : parseFloat(String(r[17]).replace(/,/g,"")) || 0;
    const memo  = String(r[21] || "").trim();
    if (!unit || !acc || amt === 0) continue;
    if (EXCLUDE_KW.some(k => acc.includes(k))) continue;
    recs.push({ month, unit, acc, amt, memo });
  }
  return recs;
}

function aggregate(recs) {
  const res = {};
  recs.forEach(r => {
    if (!r.month) return;
    const normAcc = normalizeAcc(r.acc);
    if (!res[r.month])                    res[r.month] = {};
    if (!res[r.month][r.unit])            res[r.month][r.unit] = {};
    if (!res[r.month][r.unit][normAcc]) {
      res[r.month][r.unit][normAcc] = { amt: 0, memos: [], cat: classify(r.acc) };
    }
    res[r.month][r.unit][normAcc].amt += r.amt;
    const m = res[r.month][r.unit][normAcc].memos;
    // 적요: "계정과목_내용 금액" 형태로 저장, 중복 제외, 최대 20건
    if (r.memo && m.length < 20 && !m.includes(r.memo)) m.push(r.memo);
  });
  return res;
}

/* =========================================================
   COMPARISON BUILD
   ========================================================= */
function buildCompare(currAgg, prevAgg) {
  const allUnits = new Set([...Object.keys(currAgg), ...Object.keys(prevAgg)]);
  const units = [];
  const totals = { curr: { mfg:0, sga:0, etc:0 }, prev: { mfg:0, sga:0, etc:0 } };

  allUnits.forEach(unit => {
    const ca = currAgg[unit] || {};
    const pa = prevAgg[unit] || {};
    const allAccs = new Set([...Object.keys(ca), ...Object.keys(pa)]);
    const accs = [];
    const ut = { curr: { mfg:0, sga:0, etc:0 }, prev: { mfg:0, sga:0, etc:0 } };

    allAccs.forEach(acc => {
      const c   = ca[acc]?.amt || 0;
      const p   = pa[acc]?.amt || 0;
      const cat = ca[acc]?.cat || pa[acc]?.cat || classify(acc);
      const memos = [...(ca[acc]?.memos||[]), ...(pa[acc]?.memos||[])].filter((m,i,a)=>a.indexOf(m)===i).slice(0,12);
      accs.push({ acc, cat, c, p, diff: c - p, memos });
      const k = cat==="제조경비"?"mfg":cat==="판관비"?"sga":"etc";
      ut.curr[k] += c; ut.prev[k] += p;
    });
    accs.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));

    ["mfg","sga","etc"].forEach(k => { totals.curr[k] += ut.curr[k]; totals.prev[k] += ut.prev[k]; });
    const tc = ut.curr.mfg + ut.curr.sga + ut.curr.etc;
    const tp = ut.prev.mfg + ut.prev.sga + ut.prev.etc;
    units.push({ unit, accs, curr: ut.curr, prev: ut.prev, totalCurr: tc, totalPrev: tp });
  });

  units.sort((a,b) => b.totalCurr - a.totalCurr);
  return { units, totals };
}

/* =========================================================
   GEMINI API
   ========================================================= */
async function callGemini(prompt, apiKey) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
    { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{ parts:[{ text: prompt }] }] }) }
  );
  if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || "Gemini API 오류"); }
  const d = await res.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

async function analyzeWithGemini(compare, currentMonth, prevMonth, apiKey) {
  const { units, totals } = compare;
  const tc = totals.curr, tp = totals.prev;

  let prompt = `당신은 레미콘·골재 제조업 전문 경영분석가입니다.
아래는 ${monthLabel(prevMonth||"")} 대비 ${monthLabel(currentMonth)} 비용 전표 데이터 분석입니다.
적요를 참고하여 증감 원인을 팩트 위주로 분석하고 반드시 아래 JSON 형식으로만 응답하세요 (마크다운 없이).
문체는 반드시 "~함", "~임", "~증가함", "~감소함" 등의 간결한 명사형/축약형으로 작성하세요. "~했습니다", "~입니다" 등의 경어체 사용 금지.

[전체 비용 변동]
- 제조경비: ${fmt(tp.mfg)}원 → ${fmt(tc.mfg)}원 (${diff_label(tc.mfg-tp.mfg)}원, ${pct(tc.mfg,tp.mfg)})
- 판관비:   ${fmt(tp.sga)}원 → ${fmt(tc.sga)}원 (${diff_label(tc.sga-tp.sga)}원, ${pct(tc.sga,tp.sga)})
- 합계:     ${fmt(tp.mfg+tp.sga+tp.etc)}원 → ${fmt(tc.mfg+tc.sga+tc.etc)}원\n\n`;

  units.forEach(u => {
    const changes = u.accs.filter(a => Math.abs(a.diff) >= 100000);
    if (!changes.length) return;
    prompt += `▶ ${u.unit} (당월합계: ${fmt(u.totalCurr)}원, 증감: ${diff_label(u.totalCurr-u.totalPrev)}원)\n`;
    changes.slice(0,7).forEach(a => {
      prompt += `  • ${a.acc}(${a.cat}): ${fmt(a.p)}→${fmt(a.c)} (${diff_label(a.diff)}원)\n`;
      if (a.memos.length) prompt += `    [적요] ${a.memos.slice(0,5).join(" / ")}\n`;
    });
    prompt += "\n";
  });

  prompt += `응답 JSON:
{
  "overallComment": "전체 비용 증감 핵심 요약 (3-5문장, 주요 단위와 계정과목 명시, 금액 포함)",
  "keyInsights": ["핵심인사이트1(금액 포함)", "핵심인사이트2", "핵심인사이트3"],
  "warnings": ["주의항목1 (이상 급등/급락 등)", "주의항목2"],
  "unitComments": {
    "전표관리단위명": {
      "summary": "1-2문장 요약 (금액 포함)",
      "details": ["계정과목별 팩트 분석1", "분석2", "분석3"]
    }
  }
}`;

  const text = await callGemini(prompt, apiKey);
  const clean = text.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
  try { return JSON.parse(clean); }
  catch(e) { return { overallComment: text, keyInsights: [], warnings: [], unitComments: {} }; }
}

/* =========================================================
   EXCEL EXPORT
   ========================================================= */
function exportToExcel(result) {
  const { comparison, aiComments, currentMonth, prevMonth } = result;
  const { units, totals } = comparison;
  const wb = XLSX.utils.book_new();
  const tc = totals.curr, tp = totals.prev;

  // Sheet 1: 전체요약
  const s1 = [
    [`비용실적 분석 보고서`, "", "", "", ""],
    [`${monthLabel(currentMonth)} (전월 대비 증감)`, "", "", "", ""],
    [""],
    ["구분", "전월 (원)", "당월 (원)", "증감액 (원)", "증감률"],
    ["제조경비", tp.mfg, tc.mfg, tc.mfg-tp.mfg, pct(tc.mfg,tp.mfg)],
    ["판관비",   tp.sga, tc.sga, tc.sga-tp.sga,   pct(tc.sga,tp.sga)],
    ["기타",     tp.etc, tc.etc, tc.etc-tp.etc,    pct(tc.etc,tp.etc)],
    ["합계",tp.mfg+tp.sga+tp.etc, tc.mfg+tc.sga+tc.etc,
     (tc.mfg+tc.sga+tc.etc)-(tp.mfg+tp.sga+tp.etc),
     pct(tc.mfg+tc.sga+tc.etc, tp.mfg+tp.sga+tp.etc)],
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s1), "전체요약");

  // Sheet 2: 전표관리단위별
  const s2 = [["전표관리단위","구분","계정과목","전월(원)","당월(원)","증감액(원)","증감률","주요적요(3건)"]];
  units.forEach(u => {
    s2.push([u.unit,"","",u.totalPrev,u.totalCurr,u.totalCurr-u.totalPrev,pct(u.totalCurr,u.totalPrev),"[소계]"]);
    u.accs.forEach(a => s2.push(["",a.cat,a.acc,a.p,a.c,a.diff,pct(a.c,a.p),a.memos.slice(0,3).join(" | ")]));
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s2), "전표관리단위별");

  // Sheet 3: TOP 30 증감
  const allAccs = [];
  units.forEach(u => u.accs.forEach(a => allAccs.push({ unit:u.unit, ...a })));
  allAccs.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));
  const s3 = [["순위","전표관리단위","계정과목","구분","전월(원)","당월(원)","증감액(원)","증감률","주요적요"]];
  allAccs.slice(0,30).forEach((a,i) => s3.push([i+1,a.unit,a.acc,a.cat,a.p,a.c,a.diff,pct(a.c,a.p),a.memos.slice(0,3).join(" | ")]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s3), "주요증감TOP30");

  // Sheet 4: AI 분석
  const s4 = [["AI 분석 결과 (Gemini 2.5 Flash)"]];
  if (aiComments?.overallComment) {
    s4.push(["▶ 전체 요약"]); s4.push([aiComments.overallComment]); s4.push([""]);
  }
  if (aiComments?.keyInsights?.length) {
    s4.push(["▶ 주요 인사이트"]);
    aiComments.keyInsights.forEach(k => s4.push(["  • "+k]));
    s4.push([""]);
  }
  if (aiComments?.warnings?.length) {
    s4.push(["▶ 주의사항"]);
    aiComments.warnings.forEach(w => s4.push(["  ⚠ "+w]));
    s4.push([""]);
  }
  if (aiComments?.unitComments) {
    s4.push(["▶ 전표관리단위별 AI 분석"]);
    Object.entries(aiComments.unitComments).forEach(([unit,c]) => {
      s4.push([unit]); s4.push(["  요약: "+c.summary]);
      c.details?.forEach(d => s4.push(["    - "+d]));
      s4.push([""]);
    });
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(s4), "AI분석코멘트");

  XLSX.writeFile(wb, `비용실적분석_${currentMonth}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* =========================================================
   LOGIN SCREEN
   ========================================================= */
function LoginScreen({ onLogin }) {
  const [id, setId] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  function doLogin() {
    setLoading(true);
    const s = storageGet("app:settings") || DEFAULT_SETTINGS;
    if (id === s.creds.id && pw === s.creds.pw) { onLogin(); }
    else { setErr("아이디 또는 비밀번호가 올바르지 않습니다."); }
    setLoading(false);
  }

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"linear-gradient(145deg,#0f2040 0%,#1a3a6e 50%,#0f2040 100%)"}}>
      <div style={{width:380,padding:"40px 36px",background:"rgba(255,255,255,0.97)",
        borderRadius:16,boxShadow:"0 24px 80px rgba(0,0,0,0.45)",border:"1px solid rgba(255,255,255,0.1)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:56,height:56,margin:"0 auto 14px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",
            borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}></div>
          <h1 style={{margin:0,fontSize:22,fontWeight:800,color:"#0f2040",letterSpacing:"-0.5px"}}>{APP_NAME}</h1>
          <p style={{margin:"6px 0 0",fontSize:13,color:"#64748b"}}>한라엔컴㈜ ERP 비용 분석 플랫폼</p>
        </div>
        {[["아이디", id, setId, "text"], ["비밀번호", pw, setPw, "password"]].map(([label, val, setter, type]) => (
          <div key={label} style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5}}>{label}</label>
            <input type={type} value={val} onChange={e=>setter(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&doLogin()}
              style={{width:"100%",padding:"11px 14px",border:"1.5px solid #e2e8f0",borderRadius:8,
                fontSize:14,outline:"none",background:"#f8fafc"}} />
          </div>
        ))}
        {err && <div style={{padding:"8px 12px",background:"#fef2f2",border:"1px solid #fecaca",
          borderRadius:6,fontSize:13,color:"#dc2626",marginBottom:12}}>{err}</div>}
        <button onClick={doLogin} disabled={loading}
          style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",
            color:"white",border:"none",borderRadius:8,fontSize:15,fontWeight:700,cursor:"pointer",marginTop:4}}>
          {loading ? "확인 중..." : "로그인"}
        </button>
        <p style={{fontSize:11,color:"#94a3b8",textAlign:"center",margin:"16px 0 0"}}>기본 계정: admin / halla2026</p>
      </div>
    </div>
  );
}

/* =========================================================
   DROPZONE
   ========================================================= */
function DropZone({ label, fileName, onUpload, required, badge }) {
  const ref = useRef();
  const [dragging, setDragging] = useState(false);

  function handle(file) {
    if (!file || (!file.name.endsWith(".xlsx") && !file.name.endsWith(".xls"))) {
      alert("xlsx/xls 파일만 지원합니다."); return;
    }
    onUpload(file);
  }

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <label style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{label}</label>
        {required && <span style={{fontSize:10,padding:"1px 6px",background:"#fee2e2",color:"#dc2626",borderRadius:4,fontWeight:700}}>필수</span>}
        {badge && <span style={{fontSize:10,padding:"1px 6px",background:"#dbeafe",color:"#1d4ed8",borderRadius:4}}>{badge}</span>}
      </div>
      <div onClick={()=>ref.current.click()}
        onDragOver={e=>{e.preventDefault();setDragging(true)}}
        onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);handle(e.dataTransfer.files[0])}}
        style={{border:`2px dashed ${fileName?"#16a34a":dragging?"#3b82f6":"#cbd5e1"}`,
          borderRadius:10,padding:"18px 16px",textAlign:"center",cursor:"pointer",
          background:fileName?"#f0fdf4":dragging?"#eff6ff":"#f8fafc",transition:"all 0.2s"}}>
        {fileName
          ? <div><div style={{fontSize:22}}></div><p style={{margin:"4px 0 0",fontSize:12,color:"#166534",fontWeight:600}}>{fileName}</p></div>
          : <div><div style={{fontSize:22}}></div><p style={{margin:"4px 0 0",fontSize:12,color:"#64748b"}}>클릭 또는 드래그</p><p style={{margin:"2px 0 0",fontSize:11,color:"#94a3b8"}}>.xlsx / .xls</p></div>
        }
      </div>
      <input ref={ref} type="file" accept=".xlsx,.xls" style={{display:"none"}}
        onChange={e=>e.target.files[0]&&handle(e.target.files[0])} />
    </div>
  );
}

/* =========================================================
   RESULTS: SUMMARY TABLE
   ========================================================= */
function SummaryTable({ totals, currentMonth, prevMonth, units }) {
  const rows = [
    { label:"제조경비", c:totals.curr.mfg, p:totals.prev.mfg, color:"#1e40af", bg:"#eff6ff" },
    { label:"판관비",   c:totals.curr.sga, p:totals.prev.sga, color:"#7c3aed", bg:"#f5f3ff" },
    { label:"기타",     c:totals.curr.etc, p:totals.prev.etc, color:"#4b5563", bg:"#f9fafb" },
  ];
  const gc = rows.reduce((s,r)=>s+r.c,0), gp = rows.reduce((s,r)=>s+r.p,0);
  const th = { padding:"9px 12px",background:"#0f2040",color:"white",fontSize:12,fontWeight:700,textAlign:"right" };

  // 상위 3개 단위 집중도
  const top3 = units ? units.slice(0,3) : [];
  const top3sum = top3.reduce((s,u)=>s+(u.totalCurr||0),0);
  const top3pct = gc > 0 ? (top3sum/gc*100).toFixed(1) : 0;

  return (
    <div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead>
          <tr>
            <th style={{...th,textAlign:"left",paddingLeft:16}}>구분</th>
            <th style={th}>{prevMonth ? monthLabel(prevMonth) : "전월"}</th>
            <th style={th}>{monthLabel(currentMonth)}</th>
            <th style={th}>증감액</th>
            <th style={th}>증감률</th>
            <th style={th}>비중</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r,i)=>{
            const d = r.c-r.p;
            const share = gc > 0 ? (r.c/gc*100).toFixed(1) : 0;
            return <tr key={i} style={{background:r.bg}}>
              <td style={{padding:"10px 12px",paddingLeft:16,fontWeight:700,color:r.color}}>{r.label}</td>
              <td style={{padding:"10px 12px",textAlign:"right"}}>{fmt(r.p)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontWeight:600}}>{fmt(r.c)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",color:diff_color(d),fontWeight:700}}>{diff_label(d)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",color:pct_color(r.c,r.p)}}>{pct(r.c,r.p)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",color:"#475569"}}>{share}%</td>
            </tr>;
          })}
          <tr style={{background:"#0f2040"}}>
            <td style={{padding:"10px 12px",paddingLeft:16,fontWeight:800,color:"white"}}>합 계</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:"rgba(255,255,255,0.8)"}}>{fmt(gp)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",fontWeight:800,color:"white"}}>{fmt(gc)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:diff_color(gc-gp),fontWeight:800}}>{diff_label(gc-gp)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:pct_color(gc,gp),fontWeight:700}}>{pct(gc,gp)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:"rgba(255,255,255,0.7)"}}>100%</td>
          </tr>
        </tbody>
      </table>
      {top3.length > 0 && (
        <div style={{marginTop:12,padding:"10px 14px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0",fontSize:12,color:"#475569"}}>
          <span style={{fontWeight:700,color:"#1e293b"}}>비용 집중도</span>
          &nbsp;상위 3개 단위({top3.map(u=>u.unit).join(", ")})가 전체의 <b style={{color:"#1e40af"}}>{top3pct}%</b> 차지
        </div>
      )}
    </div>
  );
}

function CostChart({ units }) {
  const IS_HQ = u => u.unit.includes("본사") || u.unit.includes("HQ") || u.unit.includes("관리");
  const siteUnits = units.filter(u => !IS_HQ(u));
  const hqUnits   = units.filter(u =>  IS_HQ(u));

  const toData = list => list.map(u => ({
    name: u.unit.length > 6 ? u.unit.slice(0,6)+"…" : u.unit,
    전월: Math.round((u.prev.mfg+u.prev.sga+u.prev.etc)/10000),
    당월: Math.round((u.curr.mfg+u.curr.sga+u.curr.etc)/10000),
  }));

  const siteData = toData(siteUnits);
  const hqData   = toData(hqUnits);
  const siteH = Math.max(240, siteData.length * 28 + 60);
  const hqH   = Math.max(180, hqData.length  * 28 + 60);

  return (
    <div>
      {siteData.length > 0 && (
        <div style={{marginBottom: hqData.length > 0 ? 24 : 0}}>
          {hqData.length > 0 && (
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,letterSpacing:"0.5px"}}>
              사업장
            </div>
          )}
          <BarChartBlock data={siteData} height={siteH} />
        </div>
      )}
      {hqData.length > 0 && (
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,letterSpacing:"0.5px",
            paddingTop:siteData.length>0?8:0,borderTop:siteData.length>0?"1px solid #f1f5f9":"none"}}>
            본사
          </div>
          <BarChartBlock data={hqData} height={hqH} />
        </div>
      )}
    </div>
  );
}

/* =========================================================
   TOP CHANGES
   ========================================================= */
function TopChanges({ units }) {
  const all = [];
  units.forEach(u => u.accs.forEach(a => all.push({...a, unit:u.unit})));
  all.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));
  const top = all.slice(0,10);
  return (
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
      <thead>
        <tr style={{background:"#f1f5f9"}}>
          {["순위","전표관리단위","계정과목","구분","증감액","증감률"].map((h,i) => (
            <th key={i} style={{padding:"7px 10px",textAlign:i>=4?"right":"left",color:"#475569",fontWeight:700,fontSize:11}}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {top.map((a,i) => (
          <tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:i%2===0?"white":"#f8fafc"}}>
            <td style={{padding:"7px 10px",fontWeight:700,color:"#94a3b8"}}>{i+1}</td>
            <td style={{padding:"7px 10px",fontWeight:500}}>{a.unit}</td>
            <td style={{padding:"7px 10px"}}>{a.acc}</td>
            <td style={{padding:"7px 10px"}}>
              <span style={{padding:"1px 6px",borderRadius:4,fontSize:10,fontWeight:600,
                background:a.cat==="제조경비"?"#dbeafe":a.cat==="판관비"?"#ede9fe":"#f0fdf4",
                color:a.cat==="제조경비"?"#1d4ed8":a.cat==="판관비"?"#6d28d9":"#166534"}}>
                {a.cat}
              </span>
            </td>
            <td style={{padding:"7px 10px",textAlign:"right",color:diff_color(a.diff),fontWeight:800,fontSize:13}}>{diff_label(a.diff)}</td>
            <td style={{padding:"7px 10px",textAlign:"right",color:pct_color(a.c,a.p),fontWeight:600}}>{pct(a.c,a.p)}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

/* =========================================================
   AI TAB
   ========================================================= */
function AITab({ aiComments }) {
  if (!aiComments) return <Card title="분석 코멘트"><p style={{color:"#94a3b8",padding:20,textAlign:"center"}}>AI 분석 결과가 없습니다.</p></Card>;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {Object.entries(aiComments.unitComments||{}).map(([unit,c],i) => (
        <div key={i} style={{background:"white",borderRadius:10,padding:"16px 20px",
          boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:"1px solid #e2e8f0"}}>
          <div style={{fontSize:14,fontWeight:800,color:"#1e293b",marginBottom:8}}>{unit}</div>
          <p style={{fontSize:13,color:"#374151",margin:"0 0 10px",lineHeight:1.65,fontWeight:500}}>{c.summary}</p>
          {c.details?.map((d,j) => (
            <div key={j} style={{fontSize:12,color:"#4b5563",paddingLeft:10,borderLeft:"2px solid #3b82f6",lineHeight:1.6}}>
              {d}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

/* =========================================================
   RESULTS TAB
   ========================================================= */

  const { comparison, aiComments, currentMonth, prevMonth } = result;
  const [tab, setTab] = useState("overview");
  const tabs = [["overview","전체요약"],["units","단위별분석"],["top","TOP 증감"],["ai","분석코멘트"]];

  return (
    <div style={{maxWidth:1100}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <PageHeader icon="" title="분석 결과"
          sub={`${prevMonth?monthLabel(prevMonth):"전월"} → ${monthLabel(currentMonth)} 비용 증감 분석`} />
        <button onClick={onExport}
          style={{padding:"10px 22px",background:"#166534",color:"white",border:"none",
            borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
          Excel 내보내기 (4시트)
        </button>
      </div>

      {aiComments?.overallComment && (
        <div style={{background:"linear-gradient(135deg,#0f2040,#1a3a6e)",borderRadius:12,
          padding:"18px 22px",marginBottom:18,color:"white"}}>
          <div style={{fontSize:11,fontWeight:700,opacity:0.7,marginBottom:8,letterSpacing:"1px"}}>
            비용 증감 요약
          </div>
          <p style={{fontSize:14,lineHeight:1.75,margin:0,opacity:0.95}}>{aiComments.overallComment}</p>
          {(aiComments.keyInsights?.length > 0 || aiComments.warnings?.length > 0) && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:14,
              paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.15)"}}>
              {aiComments.keyInsights?.length > 0 && (
                <div>
                  <div style={{fontSize:11,fontWeight:700,opacity:0.7,marginBottom:6}}>주요 인사이트</div>
                  {aiComments.keyInsights.map((k,i) => <p key={i} style={{fontSize:12,margin:"3px 0",opacity:0.85}}>• {k}</p>)}
                </div>
              )}
              {aiComments.warnings?.length > 0 && (
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginBottom:6}}>주의 항목</div>
                  {aiComments.warnings.map((w,i) => <p key={i} style={{fontSize:12,margin:"3px 0",color:"#fde68a"}}>• {w}</p>)}
                </div>
              )}
            </div>
          )}
        </div>
      )}

      <div style={{display:"flex",gap:4,marginBottom:16,borderBottom:"2px solid #e2e8f0"}}>
        {tabs.map(([id,label]) => (
          <button key={id} onClick={()=>setTab(id)}
            style={{padding:"8px 16px",background:"none",border:"none",
              borderBottom:tab===id?"2px solid #1d4ed8":"2px solid transparent",
              color:tab===id?"#1d4ed8":"#64748b",fontWeight:tab===id?700:500,
              fontSize:13,cursor:"pointer",marginBottom:-2}}>
            {label}
          </button>
        ))}
      </div>

      {tab==="overview" && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1.2fr",gap:16}}>
          <Card title="비용 구분별 요약">
            <SummaryTable totals={comparison.totals} currentMonth={currentMonth} prevMonth={prevMonth} units={comparison.units} />
          </Card>
          <Card title="단위별 당월 비용 (만원)">
            <CostChart units={comparison.units} />
          </Card>
        </div>
      )}
      {tab==="units" && <Card title="전표관리단위별 상세 분석"><UnitAccordion units={comparison.units} aiComments={aiComments} /></Card>}
      {tab==="top"   && <Card title="주요 증감 TOP 10 (증감액 기준)"><TopChanges units={comparison.units} /></Card>}
      {tab==="ai"    && <AITab aiComments={aiComments} />}
    </div>
  );
}

/* =========================================================
   HISTORY TAB
   ========================================================= */
function HistoryTab({ history, onSelect, onDelete }) {
  if (!history.length) return (
    <div style={{textAlign:"center",padding:"80px 20px",color:"#94a3b8"}}>
      <div style={{fontSize:32,marginBottom:12,color:"#cbd5e1"}}>—</div>
      <p style={{fontSize:15,fontWeight:600}}>저장된 히스토리가 없습니다</p>
      <p style={{fontSize:13}}>분석을 실행하면 자동으로 저장됩니다.</p>
    </div>
  );

  return (
    <div style={{maxWidth:800}}>
      <PageHeader icon="" title="분석 히스토리" sub="과거 분석 결과를 확인하고 전월 비교 기준으로 활용하세요" />
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {history.map((h,i) => {
          const tot = h.comparison?.totals;
          const gc = tot ? tot.curr.mfg+tot.curr.sga+tot.curr.etc : 0;
          const gp = tot ? tot.prev.mfg+tot.prev.sga+tot.prev.etc : 0;
          return (
            <div key={i} style={{background:"white",borderRadius:10,padding:"16px 20px",
              boxShadow:"0 1px 4px rgba(0,0,0,0.07)",display:"flex",alignItems:"center",
              gap:14,border:"1px solid #e2e8f0"}}>
              <div style={{width:44,height:44,background:"linear-gradient(135deg,#1a3a6e,#2563eb)",
                borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}></div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:800,color:"#1e293b"}}>{monthLabel(h.currentMonth)} 실적 분석</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>
                  {h.prevMonth ? `${monthLabel(h.prevMonth)} 대비` : "단독 분석"} · {new Date(h.savedAt).toLocaleString("ko-KR")}
                </div>
                {tot && (
                  <div style={{fontSize:13,marginTop:4}}>
                    총비용 <b>{fmt(gc)}</b>원 · 전월比 <span style={{color:diff_color(gc-gp),fontWeight:700}}>{diff_label(gc-gp)}원</span>
                  </div>
                )}
              </div>
              <div style={{display:"flex",gap:8,flexShrink:0}}>

                    borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:600}}>보기</button>

                    border:"1px solid #fca5a5",borderRadius:6,fontSize:12,cursor:"pointer"}}>삭제</button>
              </div>
            </div>
          );
        })}

    </div>
  );
}

/* =========================================================
   SETTINGS TAB
   ========================================================= */

  const [id, setId]     = useState(settings.creds?.id || "admin");
  const [pw, setPw]     = useState(settings.creds?.pw || "halla2026");
  const [saved, setSaved] = useState(false);

  function save() {
    onSave({ geminiKey:key, creds:{id,pw} });
    setSaved(true); setTimeout(()=>setSaved(false), 2000);
  }

  const inp = {width:"100%",padding:"10px 13px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,background:"#f8fafc"};
  const lbl = {fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5};

  return (
    <div style={{maxWidth:600}}>
      <PageHeader icon="" title="설정" sub="Gemini API 키 및 로그인 계정을 관리합니다" />

      <Card title="Gemini API 설정" mb={16}>
        <label style={lbl}>Google Gemini API 키 (gemini-2.5-flash)</label>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="AIza..." style={inp} />
        <div style={{marginTop:8,padding:"10px 12px",background:"#eff6ff",borderRadius:7,
          border:"1px solid #bfdbfe",fontSize:12,color:"#1e40af"}}>
          Google AI Studio (aistudio.google.com) → API 키 발급 → 여기에 입력
        </div>
      </Card>

      <Card title="로그인 계정 관리" mb={16}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div><label style={lbl}>아이디</label><input value={id} onChange={e=>setId(e.target.value)} style={inp} /></div>
          <div><label style={lbl}>비밀번호</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} style={inp} /></div>
        </div>
      </Card>

      <Card title="ERP 파일 컬럼 구조 (고정)" mb={20}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13,color:"#4b5563"}}>
          {[["B열 (index 1)","회계일"],["D열 (index 3)","전표관리단위"],
            ["Q열 (index 16)","계정과목"],["R열 (index 17)","차변금액"],["V열 (index 21)","적요"]].map(([col,name]) => (
            <div key={col} style={{display:"flex",gap:8,padding:"7px 10px",background:"#f8fafc",borderRadius:6}}>
              <span style={{fontWeight:700,color:"#1e40af",minWidth:100}}>{col}</span>

        {saved ? "저장 완료" : "저장"}
      </button>
    </div>
  );
}

/* =========================================================
   MAIN APP
   ========================================================= */
function App() {
  const [loggedIn, setLoggedIn]   = useState(false);
  const [tab, setTab]             = useState("upload");
  const [settings, setSettings]   = useState(DEFAULT_SETTINGS);

  const [currFile, setCurrFile]   = useState(null);
  const [prevFile, setPrevFile]   = useState(null);
  const [currData, setCurrData]   = useState(null);
  const [prevData, setPrevData]   = useState(null);

  const [result, setResult]       = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [error, setError]         = useState("");
  const [history, setHistory]     = useState([]);

  useEffect(() => { loadSettings(); loadHistory(); }, []);

  function loadSettings() {
    const s = storageGet("app:settings");
    if (s) setSettings(s);
  }
  function saveSettings(s) {
    setSettings(s);
    storageSet("app:settings", s);
  }
  function loadHistory() {
    const keys = storageList("analysis:");
    const items = keys.map(k => {
      const v = storageGet(k);
      return v ? { key:k, ...v } : null;
    }).filter(Boolean);
    items.sort((a,b) => (b.savedAt||"").localeCompare(a.savedAt||""));
    setHistory(items);
  }

  function loadFile(file, type) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb    = XLSX.read(e.target.result, { type:"array" });
        const recs  = parseERP(wb);
        const agg   = aggregate(recs);
        const months = Object.keys(agg).sort();
        if (!months.length) { alert("데이터를 찾을 수 없습니다. 컬럼 구조를 확인하세요."); return; }
        const data = { recs, agg, months, fileName: file.name };
        if (type === "curr") { setCurrData(data); setCurrFile(file.name); }
        else                 { setPrevData(data); setPrevFile(file.name); }
      } catch(err) { alert("파일 파싱 오류: " + err.message); }
    };
    reader.readAsArrayBuffer(file);
  }

  function usePrevHistory(h) {
    const recAgg = {};
    h.comparison?.units?.forEach(u => {
      recAgg[u.unit] = {};
      u.accs.forEach(a => { recAgg[u.unit][a.acc] = { amt:a.c, memos:a.memos, cat:a.cat }; });
    });
    setPrevData({ fromHistory:true, recAgg, months:[h.currentMonth], fileName:`${monthLabel(h.currentMonth)} (히스토리)` });
    setPrevFile(`${monthLabel(h.currentMonth)} (히스토리)`);
  }

  async function runAnalysis() {
    if (!currData) { alert("당월 파일을 업로드해주세요."); return; }
    if (!settings.geminiKey) { alert("설정 메뉴에서 Gemini API 키를 입력해주세요."); return; }
    setAnalyzing(true); setError("");
    try {
      const currentMonth = currData.months[currData.months.length - 1];
      const currAgg      = currData.agg[currentMonth] || {};
      let prevAgg = {}, prevMonth = null;

      if (prevData) {
        if (prevData.fromHistory) {
          prevAgg   = prevData.recAgg || {};
          prevMonth = prevData.months[0];
        } else {
          prevMonth = prevData.months[prevData.months.length - 1];
          prevAgg   = prevData.agg[prevMonth] || {};
        }
      }

      const comparison = buildCompare(currAgg, prevAgg);
      const aiComments = await analyzeWithGemini(comparison, currentMonth, prevMonth, settings.geminiKey);
      const res = {
        currentMonth, prevMonth, comparison, aiComments,
        currentFileName: currData.fileName,
        prevFileName: prevData?.fileName || null,
        savedAt: new Date().toISOString()
      };
      setResult(res);
      storageSet(`analysis:${currentMonth}_${Date.now()}`, res);
      loadHistory();
      setTab("results");
    } catch(err) {
      setError("오류: " + err.message);
    } finally {
      setAnalyzing(false);
    }
  }

  if (!loggedIn) return <LoginScreen onLogin={()=>setLoggedIn(true)} />;

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:"'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif",background:"#f0f4f8"}}>
      <Sidebar active={tab} onNav={setTab} onLogout={()=>setLoggedIn(false)} />
      <main style={{flex:1,overflow:"auto",padding:"24px 28px"}}>
        {tab==="upload" && (
          <UploadTab currFile={currFile} prevFile={prevFile}
            onCurrUpload={f=>loadFile(f,"curr")} onPrevUpload={f=>loadFile(f,"prev")}
            onAnalyze={runAnalysis} analyzing={analyzing} error={error}
            hasKey={!!settings.geminiKey} history={history} onPrevFromHistory={usePrevHistory} />
        )}
        {tab==="results" && result && <ResultsTab result={result} onExport={()=>exportToExcel(result)} />}
        {tab==="results" && !result && (
          <div style={{textAlign:"center",padding:"100px 20px",color:"#94a3b8"}}>
            <div style={{fontSize:32,marginBottom:12,color:"#cbd5e1"}}>—</div>
            <p style={{fontSize:15,fontWeight:600}}>분석 결과가 없습니다</p>
            <p style={{fontSize:13}}>분석하기 탭에서 파일을 업로드하고 분석을 실행하세요.</p>
          </div>
        )}
        {tab==="history" && (
          <HistoryTab history={history}
            onSelect={h=>{setResult(h);setTab("results");}}
            onDelete={k=>{storageDel(k);loadHistory();}} />
        )}
        {tab==="settings" && <SettingsTab settings={settings} onSave={saveSettings} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
