/* ═══ ERP 파싱 ═══ */
function parseDate(v){
  if(!v&&v!==0)return"";
  if(typeof v==="number"){try{const d=XLSX.SSF.parse_date_code(v);if(d)return""+d.y+(d.m<10?"0":"")+d.m;}catch{}}
  const s=String(v).replace(/\D/g,"");return s.length>=6?s.slice(0,6):"";
}
function parseERP(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  let dataStart=1;
  for(let i=0;i<5;i++){if(String(rows[i]?.[1]||"").includes("회계일")){dataStart=i+1;break;}}
  const recs=[];
  for(let i=dataStart;i<rows.length;i++){
    const r=rows[i];
    const month=parseDate(r[1]),unit=String(r[3]||"").trim(),acc=String(r[16]||"").trim();
    const amt=typeof r[17]==="number"?r[17]:parseFloat(String(r[17]).replace(/,/g,""))||0;
    const memo=String(r[21]||"").trim(),dept=String(r[27]||"").trim(),mgmt=String(r[38]||"").trim();
    if(!unit||!acc||amt===0)continue;
    if(EXCLUDE_KW.some(k=>acc.includes(k)))continue;
    recs.push({month,unit,acc,amt,memo,dept,mgmt});
  }
  return recs;
}
function aggregate(recs){
  const res={};
  recs.forEach(r=>{
    if(!r.month)return;
    const na=normAcc(r.acc);
    if(!res[r.month])res[r.month]={};
    if(!res[r.month][r.unit])res[r.month][r.unit]={};
    if(!res[r.month][r.unit][na])res[r.month][r.unit][na]={amt:0,memoMap:{},cat:classify(r.acc)};
    const e=res[r.month][r.unit][na];
    e.amt+=r.amt;
    if(r.memo)e.memoMap[r.memo]=(e.memoMap[r.memo]||0)+r.amt;
  });
  Object.values(res).forEach(mo=>Object.values(mo).forEach(un=>Object.values(un).forEach(e=>{
    e.memos=Object.entries(e.memoMap).map(([t,a])=>({text:t,amt:a})).sort((a,b)=>b.amt-a.amt);
    delete e.memoMap;
  })));
  return res;
}
function buildCompare(cA,pA){
  const allU=new Set([...Object.keys(cA),...Object.keys(pA)]);
  const units=[],totals={curr:{mfg:0,sga:0},prev:{mfg:0,sga:0}};
  allU.forEach(unit=>{
    const ca=cA[unit]||{},pa=pA[unit]||{};
    const allAccs=new Set([...Object.keys(ca),...Object.keys(pa)]);
    const accs=[],ut={curr:{mfg:0,sga:0},prev:{mfg:0,sga:0}};
    allAccs.forEach(acc=>{
      const c=ca[acc]?.amt||0,p=pa[acc]?.amt||0,cat=ca[acc]?.cat||pa[acc]?.cat||classify(acc),memos=ca[acc]?.memos||[],prevMemos=pa[acc]?.memos||[],displayMemos=(c<p&&prevMemos.length>0)?prevMemos:memos;
      accs.push({acc,cat,c,p,diff:c-p,memos:displayMemos,currMemos:memos,prevMemos});
      ut.curr[cat==="제조경비"?"mfg":"sga"]+=c;
      ut.prev[cat==="제조경비"?"mfg":"sga"]+=p;
    });
    accs.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
    ["mfg","sga"].forEach(k=>{totals.curr[k]+=ut.curr[k];totals.prev[k]+=ut.prev[k];});
    units.push({unit,accs,curr:ut.curr,prev:ut.prev,totalCurr:ut.curr.mfg+ut.curr.sga,totalPrev:ut.prev.mfg+ut.prev.sga});
  });
  units.sort((a,b)=>Math.abs(b.totalCurr-b.totalPrev)-Math.abs(a.totalCurr-a.totalPrev));
  return{units,totals};
}

/* ═══ 사업활동비 집계 ═══ */
function buildActivityData(recs){
  const ACT_KW=["경상접대비","복리후생비_회식대"];
  const targets=recs.filter(r=>ACT_KW.some(k=>r.acc.includes(k)));
  if(!targets.length)return null;
  const months=[...new Set(targets.map(r=>r.month).filter(Boolean))].sort();
  const month=months[months.length-1];
  const mr=targets.filter(r=>r.month===month);
  const deptMap={};
  mr.forEach(r=>{
    const dept=r.dept||r.unit||"미분류";
    const mgmt=MGMT_LABELS[r.mgmt]??MGMT_LABELS[""];
    const accType=r.acc.includes("복리후생비")?"회식대":"접대비";
    if(!deptMap[dept])deptMap[dept]={dept,hq:isHQDept(dept),접대비:0,회식대:0,total:0,mgmtBreak:{},details:[]};
    deptMap[dept][accType]+=r.amt;deptMap[dept].total+=r.amt;
    deptMap[dept].mgmtBreak[mgmt]=(deptMap[dept].mgmtBreak[mgmt]||0)+r.amt;
    deptMap[dept].details.push({acc:r.acc,amt:r.amt,mgmt,memo:r.memo});
  });
  const depts=Object.values(deptMap).sort((a,b)=>b.total-a.total);
  const allMgmt={};mr.forEach(r=>{const m=MGMT_LABELS[r.mgmt]??MGMT_LABELS[""];allMgmt[m]=(allMgmt[m]||0)+r.amt;});
  return{month,depts,hqDepts:depts.filter(d=>d.hq),siteDepts:depts.filter(d=>!d.hq),
    grandTotal:depts.reduce((s,d)=>s+d.total,0),grandJeob:depts.reduce((s,d)=>s+d.접대비,0),grandFed:depts.reduce((s,d)=>s+d.회식대,0),allMgmt};
}

/* ═══ 항목별 집계 (수선비/소모품비/시내교통비/국내출장비) ═══ */
function buildItemData(recs,keyword,prevRecs){
  const match=r=>normAcc(r.acc).includes(keyword)||r.acc.includes(keyword);
  const targets=recs.filter(match);
  if(!targets.length)return null;
  const months=[...new Set(targets.map(r=>r.month).filter(Boolean))].sort();
  const month=months[months.length-1];
  const mr=targets.filter(r=>r.month===month);
  const pmr=(prevRecs||[]).filter(match);
  const prevUMap={},prevDMap={};
  pmr.forEach(r=>{prevUMap[r.unit]=(prevUMap[r.unit]||0)+r.amt;const d=r.dept||r.unit;prevDMap[d]=(prevDMap[d]||0)+r.amt;});
  const uMap={},dMap={};
  mr.forEach(r=>{
    const u=r.unit||"미분류",cat=classify(r.acc),d=r.dept||r.unit||"미분류";
    if(!uMap[u])uMap[u]={unit:u,hq:isHQUnit(u),제조경비:0,판관비:0,total:0,prev:prevUMap[u]||0,memoMap:{}};
    uMap[u][cat]+=r.amt;uMap[u].total+=r.amt;
    const key=r.memo||"(적요없음)";uMap[u].memoMap[key]=(uMap[u].memoMap[key]||0)+r.amt;
    if(!dMap[d])dMap[d]={dept:d,unit:u,hq:isHQDept(d)||isHQUnit(u),제조경비:0,판관비:0,total:0,prev:prevDMap[d]||0,memoMap:{}};
    dMap[d][cat]+=r.amt;dMap[d].total+=r.amt;dMap[d].memoMap[key]=(dMap[d].memoMap[key]||0)+r.amt;
  });
  Object.keys(prevUMap).forEach(u=>{if(!uMap[u])uMap[u]={unit:u,hq:isHQUnit(u),제조경비:0,판관비:0,total:0,prev:prevUMap[u],memoMap:{}};});
  const toList=m=>Object.values(m).map(x=>({...x,diff:x.total-x.prev,memos:Object.entries(x.memoMap).map(([t,a])=>({text:t,amt:a})).sort((a,b)=>b.amt-a.amt)})).sort((a,b)=>b.total-a.total);
  const units=toList(uMap),depts=toList(dMap);
  const prevMonths=[...new Set(pmr.map(r=>r.month).filter(Boolean))].sort();
  return{month,prevMonth:prevMonths[prevMonths.length-1]||null,units,depts,
    grandTotal:units.reduce((s,u)=>s+u.total,0),grandPrev:units.reduce((s,u)=>s+u.prev,0),
    grandMfg:units.reduce((s,u)=>s+u.제조경비,0),grandSga:units.reduce((s,u)=>s+u.판관비,0)};
}

async function sendTelegramViaEdge(telegramToken, chatId, message, sbUrl, sbKey){
  const effectiveSbUrl = sbUrl || DEFAULT_SB_URL;
  const effectiveSbKey = sbKey || DEFAULT_SB_KEY;
  const edgeUrl = effectiveSbUrl + "/functions/v1/rapid-action";
  const res = await fetch(edgeUrl, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + effectiveSbKey
    },
    body: JSON.stringify({token: telegramToken, chatId, message})
  });
  if(!res.ok) throw new Error("Edge Function 응답 오류: " + res.status);
  return await res.json();
}

// 승인/거부 URL 처리
async function handleApprovalUrl(){
  const params = new URLSearchParams(window.location.search);
  const action = params.get("action");
  const token = params.get("token");
  if(!action || !token) return null;
  const sb = getSB();
  if(sb && (action === "approve" || action === "reject")){
    try{
      await sb.from("access_requests").update({
        status: action === "approve" ? "approved" : "rejected",
        resolved_at: new Date().toISOString()
      }).eq("token", token);
    }catch(e){ console.error("승인처리 실패:", e); }
  }
  window.history.replaceState({}, "", window.location.pathname);
  return action;
}

  async function doLogin(){
    if(!id || !pw){ setErr("아이디와 비밀번호를 입력하세요."); return; }
    setPhase("loading"); setErr("");

    // 1. Supabase에서 최신 계정 로드 (브라우저 간 공유)
    let accounts;
    try{ accounts = await loadAccounts(); }
    catch{ accounts = getAccountsSync(); }

    const account = accounts.find(a => a.id === id && a.pw === pw);
    if(!account){
      setPhase("login");
      setErr("아이디 또는 비밀번호가 올바르지 않습니다.");
      return;
    }

    // 2. Supabase에서 최신 설정 로드 (브라우저 간 공유)
    let settings;
    try{ settings = await loadAppSettings(); }
    catch{ settings = lsGet("app:settings") || {}; }

    const {telegramToken, telegramChatId, appUrl, sbUrl, sbKey} = settings;
    const hasTelegram = !!(telegramToken && telegramChatId);
    const hasSB = getSB() !== null;

    // 접속 로그
    try{
      const logs = JSON.parse(localStorage.getItem("ip:logs") || "[]");
      logs.unshift({time: new Date().toISOString(), id: account.id, ua: navigator.userAgent.slice(0,80)});
      localStorage.setItem("ip:logs", JSON.stringify(logs.slice(0, 50)));
    }catch{}

    // 3. Telegram + Supabase 모두 있을 때만 승인 대기
    // 마스터 계정은 승인 없이 바로 로그인
    if(account.role==="master"){ onLogin(account); return; }
    if(hasTelegram && hasSB){
      const tk = Math.random().toString(36).slice(2) + Date.now().toString(36);
      tokenRef.current = tk;

      // Supabase에 요청 저장
      const saved = await submitAccessRequest(tk, account.name || account.id);
      if(!saved){
        // Supabase 저장 실패 → 그냥 로그인
        onLogin(account); return;
      }

      // Edge Function으로 Telegram 전송
      const base = appUrl || window.location.origin + window.location.pathname;
      const approveUrl = base + (base.includes("?") ? "&" : "?") + "action=approve&token=" + tk;
      const rejectUrl = base + (base.includes("?") ? "&" : "?") + "action=reject&token=" + tk;
      const msg = "🔔 [한라엔컴 비용분석시스템]\n\n"
        + "계정 <b>" + (account.name || account.id) + "</b> 접속 요청\n"
        + "시각: " + new Date().toLocaleString("ko-KR") + "\n\n"
        + "✅ <a href='" + approveUrl + "'>승인하기</a>\n"
        + "❌ <a href='" + rejectUrl + "'>거부하기</a>";

      try{
        await sendTelegramViaEdge(telegramToken, telegramChatId, msg, sbUrl, sbKey);
        console.log("Telegram 전송 성공");
      }catch(e){
        console.error("Telegram 전송 실패:", e);
        // 전송 실패해도 승인 대기는 유지 (관리자가 Supabase 직접 확인 가능)
      }

      // 승인 대기 화면
      setPhase("waiting");
      setCountdown(120);

      countRef.current = setInterval(() => {
        setCountdown(n => {
          if(n <= 1){ stopPolling(); setPhase("timeout"); return 0; }
          return n - 1;
        });
      }, 1000);

      pollRef.current = setInterval(async () => {
        const status = await pollApproval(tk);
        if(status === "approved"){
          stopPolling(); setPhase("approved");
          setTimeout(() => onLogin(account), 800);
        } else if(status === "rejected"){
          stopPolling(); setPhase("rejected");
        }
      }, 3000);

    } else {
      // Telegram 미설정 → 바로 로그인
      onLogin(account);
    }
  }

  const inp = {width:"100%",padding:"11px 14px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,outline:"none",background:"#f8fafc"};

  // 승인 링크 처리 화면
  if(phase === "admin_approved") return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#0f2040,#1a3a6e)"}}>
      <div style={{width:360,padding:"40px",background:"white",borderRadius:16,textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:16}}>✅</div>
        <h2 style={{fontSize:20,fontWeight:800,color:"#166534",marginBottom:8}}>승인 완료</h2>
        <p style={{fontSize:13,color:"#64748b"}}>접속 요청이 승인되었습니다. 이 창을 닫으세요.</p>
      </div>
    </div>
  );
  if(phase === "admin_rejected") return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#0f2040,#1a3a6e)"}}>
      <div style={{width:360,padding:"40px",background:"white",borderRadius:16,textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:16}}>❌</div>
        <h2 style={{fontSize:20,fontWeight:800,color:"#dc2626",marginBottom:8}}>거부 완료</h2>
        <p style={{fontSize:13,color:"#64748b"}}>접속 요청이 거부되었습니다. 이 창을 닫으세요.</p>
      </div>
    </div>
  );

  // 대기/승인/거부/타임아웃 화면
  if(phase !== "login" && phase !== "loading") return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#0f2040,#1a3a6e)"}}>
      <div style={{width:420,padding:"40px 36px",background:"white",borderRadius:16,textAlign:"center",boxShadow:"0 24px 80px rgba(0,0,0,0.45)"}}>
        {phase === "waiting" && <>
          <div style={{width:60,height:60,margin:"0 auto 20px",border:"5px solid #e2e8f0",borderTopColor:"#2563eb",borderRadius:"50%",animation:"spin 1s linear infinite"}}></div>
          <h2 style={{fontSize:18,fontWeight:800,color:"#0f2040",marginBottom:8}}>승인 대기 중...</h2>
          <p style={{fontSize:13,color:"#64748b",marginBottom:16,lineHeight:1.7}}>관리자에게 Telegram 알림을 보냈습니다.<br/>승인 후 자동으로 접속됩니다.</p>
          <div style={{padding:"12px 16px",background:"#eff6ff",borderRadius:8,fontSize:14,color:"#1e40af",fontWeight:700,marginBottom:16}}>
            {Math.floor(countdown/60)}:{String(countdown%60).padStart(2,"0")} 후 자동 만료
          </div>
          <button onClick={()=>{stopPolling();setPhase("login");}} style={{padding:"9px 24px",background:"white",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13,cursor:"pointer",color:"#64748b"}}>취소</button>
        </>}
        {phase === "approved" && <>
          <div style={{fontSize:52,marginBottom:16}}>✅</div>
          <h2 style={{fontSize:18,fontWeight:800,color:"#166534"}}>승인됨 — 접속 중...</h2>
        </>}
        {phase === "rejected" && <>
          <div style={{fontSize:52,marginBottom:16}}>❌</div>
          <h2 style={{fontSize:18,fontWeight:800,color:"#dc2626",marginBottom:8}}>접속이 거부되었습니다</h2>
          <button onClick={()=>setPhase("login")} style={{padding:"10px 28px",background:"#0f2040",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600}}>돌아가기</button>
        </>}
        {phase === "timeout" && <>
          <div style={{fontSize:52,marginBottom:16}}>⏰</div>
          <h2 style={{fontSize:18,fontWeight:800,color:"#92400e",marginBottom:8}}>시간 초과</h2>
          <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>2분 내 응답이 없어 만료되었습니다.</p>
          <button onClick={()=>setPhase("login")} style={{padding:"10px 28px",background:"#0f2040",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600}}>다시 시도</button>
        </>}
      </div>
    </div>
  );

  // 기본 로그인 화면
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#0f2040,#1a3a6e)"}}>
      <div style={{width:380,padding:"40px 36px",background:"rgba(255,255,255,0.97)",borderRadius:16,boxShadow:"0 24px 80px rgba(0,0,0,0.45)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:52,height:52,margin:"0 auto 14px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",borderRadius:14}}></div>
          <h1 style={{margin:0,fontSize:22,fontWeight:800,color:"#0f2040"}}>비용실적 분석시스템</h1>
          <p style={{margin:"6px 0 0",fontSize:13,color:"#64748b"}}>한라엔컴㈜ ERP 비용 분석 플랫폼</p>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5}}>아이디</label>
          <input value={id} onChange={e=>setId(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="아이디 입력" style={inp}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5}}>비밀번호</label>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="비밀번호 입력" style={inp}/>
        </div>
        {err&&<div style={{padding:"8px 12px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:6,fontSize:13,color:"#dc2626",marginBottom:14}}>{err}</div>}
        <button onClick={doLogin} disabled={phase==="loading"} style={{width:"100%",padding:"13px",background:phase==="loading"?"#94a3b8":"linear-gradient(135deg,#1a3a6e,#2563eb)",color:"white",border:"none",borderRadius:8,fontSize:15,fontWeight:700,cursor:phase==="loading"?"not-allowed":"pointer"}}>
          {phase==="loading"?"계정 확인 중...":"로그인"}
        </button>
      </div>
    </div>
  );
}

/* ═══ 계정 관리 UI ═══ */
function AccountManager({settings,onSave}){
  const [accounts,setAccounts]=useState(()=>getAccountsSync());
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({id:"",name:"",pw:"",role:"viewer",active:true});
  const [saved,setSaved]=useState(false);

  useEffect(()=>{loadAccounts().then(accs=>{if(accs&&accs.length>0)setAccounts(accs);});},[]);

  const ROLES={admin:"관리자",viewer:"열람전용",master:"마스터(승인없이 로그인)"};
  function startNew(){setForm({id:"",name:"",pw:"",role:"viewer",active:true});setEditing("new");}
  function startEdit(i){setForm({...accounts[i]});setEditing(i);}
  async function doSave(){
    if(!form.id||!form.pw){alert("아이디와 비밀번호를 입력하세요.");return;}
    let next=[...accounts];
    if(editing==="new"){if(next.find(a=>a.id===form.id)){alert("이미 존재하는 아이디입니다.");return;}next.push(form);}
    else{next[editing]=form;}
    setAccounts(next);
    await saveAccounts(next);
    setEditing(null);setSaved(true);setTimeout(()=>setSaved(false),1500);
  }
  async function doDelete(i){
    if(!window.confirm("계정을 삭제합니다."))return;
    const next=accounts.filter((_,idx)=>idx!==i);
    setAccounts(next);await saveAccounts(next);
  }
  async function doToggle(i){
    const next=accounts.map((a,idx)=>idx===i?{...a,active:!a.active}:a);
    setAccounts(next);await saveAccounts(next);
  }
  const inp={width:"100%",padding:"9px 12px",border:"1.5px solid #e2e8f0",borderRadius:7,fontSize:13,background:"#f8fafc"};
  const lbl={fontSize:11,fontWeight:700,color:"#374151",display:"block",marginBottom:4};
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <p style={{fontSize:12,color:"#64748b"}}>계정별로 접속을 제어합니다. Telegram 연동 시 계정명이 알림에 표시됩니다.</p>
        <button onClick={startNew} style={{padding:"7px 16px",background:"#0f2040",color:"white",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:600,flexShrink:0,marginLeft:8}}>+ 계정 추가</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:editing!==null?16:0}}>
        {accounts.map((a,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:a.active?"white":"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0",opacity:a.active?1:0.6}}>
            <div style={{width:34,height:34,background:a.role==="admin"?"linear-gradient(135deg,#1a3a6e,#2563eb)":"linear-gradient(135deg,#64748b,#94a3b8)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:13,fontWeight:800,flexShrink:0}}>{(a.name||a.id).slice(0,1).toUpperCase()}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{a.name||a.id}</span>
                <span style={{fontSize:10,padding:"1px 6px",background:a.role==="admin"?"#dbeafe":"#f1f5f9",color:a.role==="admin"?"#1d4ed8":"#64748b",borderRadius:4,fontWeight:600}}>{ROLES[a.role]||a.role}</span>
                {!a.active&&<span style={{fontSize:10,padding:"1px 6px",background:"#fef2f2",color:"#dc2626",borderRadius:4}}>비활성</span>}
              </div>
              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>ID: {a.id}</div>
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              <button onClick={()=>doToggle(i)} style={{padding:"5px 10px",background:"white",border:"1px solid #e2e8f0",borderRadius:6,fontSize:11,cursor:"pointer",color:"#64748b"}}>{a.active?"비활성화":"활성화"}</button>
              <button onClick={()=>startEdit(i)} style={{padding:"5px 10px",background:"white",border:"1px solid #e2e8f0",borderRadius:6,fontSize:11,cursor:"pointer",color:"#374151"}}>수정</button>
              <button onClick={()=>doDelete(i)} style={{padding:"5px 10px",background:"white",border:"1px solid #fca5a5",borderRadius:6,fontSize:11,cursor:"pointer",color:"#dc2626"}}>삭제</button>
            </div>
          </div>
        ))}
      </div>
      {editing!==null&&(
        <div style={{padding:"16px",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0",marginTop:8}}>
          <div style={{fontSize:13,fontWeight:700,color:"#0f2040",marginBottom:14}}>{editing==="new"?"새 계정 추가":"계정 수정"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={lbl}>아이디 (로그인 ID)</label><input value={form.id} onChange={e=>setForm(f=>({...f,id:e.target.value}))} style={inp} disabled={editing!=="new"}/></div>
            <div><label style={lbl}>표시 이름</label><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="예: 기획팀" style={inp}/></div>
            <div><label style={lbl}>비밀번호</label><input type="password" value={form.pw} onChange={e=>setForm(f=>({...f,pw:e.target.value}))} style={inp}/></div>
            <div><label style={lbl}>권한</label><select value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))} style={{...inp,cursor:"pointer"}}><option value="master">마스터(승인없이 로그인)</option><option value="admin">관리자</option><option value="viewer">열람전용</option></select></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={doSave} style={{padding:"9px 20px",background:"#0f2040",color:"white",border:"none",borderRadius:7,fontSize:13,cursor:"pointer",fontWeight:600}}>{saved?"저장 완료":"저장"}</button>
            <button onClick={()=>setEditing(null)} style={{padding:"9px 16px",background:"white",border:"1px solid #e2e8f0",borderRadius:7,fontSize:13,cursor:"pointer",color:"#64748b"}}>취소</button>
          </div>
        </div>
      )}
    </div>
  );
}
/* ═══ Claude API ═══ */
async function callClaude(prompt,apiKey){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),90000);
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:3000,messages:[{role:"user",content:prompt}]}),
      signal:ctrl.signal
    });
    clearTimeout(tid);
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||"HTTP "+res.status);}
    const d=await res.json();
    return d.content?.[0]?.text||"";
  }catch(e){clearTimeout(tid);if(e.name==="AbortError")throw new Error("응답 시간 초과. 다시 시도해주세요.");throw e;}
}

async function runAI(compare,currentMonth,prevMonth,apiKey){
  var units=compare.units,totals=compare.totals;
  var tc=totals.curr,tp=totals.prev,gc=tc.mfg+tc.sga,gp=tp.mfg+tp.sga;

  // 데이터 문자열 구성
  var lines=[];
  lines.push("=== 비용 실적 데이터 ===");
  lines.push("기간: "+mLabel(prevMonth||"")+" → "+mLabel(currentMonth));
  lines.push("제조경비: "+fmt(tp.mfg)+" → "+fmt(tc.mfg)+" ("+dLabel(tc.mfg-tp.mfg)+", "+pctS(tc.mfg,tp.mfg)+")");
  lines.push("판관비: "+fmt(tp.sga)+" → "+fmt(tc.sga)+" ("+dLabel(tc.sga-tp.sga)+", "+pctS(tc.sga,tp.sga)+")");
  lines.push("합계: "+fmt(gp)+" → "+fmt(gc)+" ("+dLabel(gc-gp)+", "+pctS(gc,gp)+")");
  lines.push("");
  lines.push("=== 사업장별 주요 변동 ===");
  units.slice(0,18).forEach(function(u){
    var d=u.totalCurr-u.totalPrev;
    if(Math.abs(d)<100000)return;
    lines.push("["+u.unit+"] 전월 "+fmt(u.totalPrev)+" → 당월 "+fmt(u.totalCurr)+" ("+dLabel(d)+")");
    u.accs.slice(0,5).forEach(function(a){
      if(Math.abs(a.diff)<100000)return;
      var isUp=a.diff>0;
      var memos=isUp?(a.currMemos||a.memos||[]):(a.prevMemos||a.memos||[]);
      var memoStr=memos.slice(0,2).map(function(m){return m.text.slice(0,25)+"("+fmtS(m.amt)+")";}).join(", ");
      lines.push("  - "+a.acc+"("+a.cat+"): "+dLabel(a.diff)+"원"+(memoStr?" / "+memoStr:""));
    });
  });
  var dataStr=lines.join("\n");

  var prompt=
    "당신은 레미콘·골재 제조업 비용 분석 전문가입니다.\n"+
    "아래 데이터를 분석하고, 지정된 형식으로 정확히 출력하세요.\n\n"+
    "[분석 규칙]\n"+
    "- 감소 항목은 전월 적요를 참고해 '전월에 있었던 비용이 당월에 없어진 것'으로 설명\n"+
    "- 증가 항목은 당월 적요를 참고해 새로 발생한 비용 설명\n"+
    "- 의견·권고 금지, 수치와 팩트만 기술\n"+
    "- 문체: ~함, ~임, ~발생함, ~미발생\n\n"+
    "[데이터]\n"+dataStr+"\n\n"+
    "[출력 형식 - 아래 태그를 반드시 모두 포함해 출력]\n"+
    "SUMMARY: (전체 수치 요약 1문장. 총액, 제조경비, 판관비 증감액 포함)\n"+
    "UP1: (증가항목1. 형식: 단위명>계정명: 금액 - 원인)\n"+
    "UP2: (증가항목2)\n"+
    "UP3: (증가항목3)\n"+
    "DN1: (감소항목1. 형식: 단위명>계정명: 금액 - 전월 있었던 비용 설명)\n"+
    "DN2: (감소항목2)\n"+
    "DN3: (감소항목3)\n"+
    "WARN1: (이상징후1. 없으면 생략)\n"+
    "UNIT_사업장명1: (해당 사업장 요약 1문장)\n"+
    "UNIT_사업장명2: (해당 사업장 요약 1문장)\n"+
    "UNIT_사업장명3: (해당 사업장 요약 1문장)\n"+
    "UNIT_사업장명4: (해당 사업장 요약 1문장)\n"+
    "UNIT_사업장명5: (해당 사업장 요약 1문장)\n\n"+
    "주의: 태그 이름(SUMMARY:, UP1:, DN1:, UNIT_사업장명:)을 정확히 사용하고,\n"+
    "각 줄은 반드시 해당 태그로 시작해야 합니다. 추가 설명 없이 태그 형식만 출력하세요.";

  var rawText=await callClaude(prompt,apiKey);
  console.log("Claude 원본 응답:\n"+rawText);

  // 파싱
  var result={overallComment:"",upFactors:[],dnFactors:[],keyInsights:[],warnings:[],unitComments:{}};
  var lines2=rawText.split(/\r?\n/);
  lines2.forEach(function(line){
    line=line.trim();
    if(!line)return;
    if(line.startsWith("SUMMARY:")){
      result.overallComment=line.slice(8).trim();
    }else if(/^UP\d+:/.test(line)){
      var v=line.replace(/^UP\d+:\s*/,"").replace(/^\(|\)$/g,"").trim();
      if(v&&!v.startsWith("증가항목"))result.upFactors.push(v);
    }else if(/^DN\d+:/.test(line)){
      var v=line.replace(/^DN\d+:\s*/,"").replace(/^\(|\)$/g,"").trim();
      if(v&&!v.startsWith("감소항목"))result.dnFactors.push(v);
    }else if(/^WARN\d*:/.test(line)){
      var v=line.replace(/^WARN\d*:\s*/,"").replace(/^\(|\)$/g,"").trim();
      if(v&&!v.startsWith("이상징후")&&v!=="없음"&&v!=="해당없음")result.warnings.push(v);
    }else if(/^UNIT_/.test(line)){
      var rest=line.slice(5); // "UNIT_" 제거
      var ci=rest.indexOf(":");
      if(ci>0){
        var unitName=rest.slice(0,ci).trim();
        var summary=rest.slice(ci+1).replace(/^\(|\)$/g,"").trim();
        if(unitName&&summary&&!summary.startsWith("해당 사업장"))
          result.unitComments[unitName]={summary:summary,details:[]};
      }
    }
  });
  result.keyInsights=result.upFactors;

  console.log("파싱 결과:",{
    summary:result.overallComment.slice(0,40),
    up:result.upFactors.length,
    dn:result.dnFactors.length,
    units:Object.keys(result.unitComments)
  });

  if(!result.overallComment){
    result.overallComment=mLabel(currentMonth)+" 총비용 "+fmt(gc)+"원, 전월 대비 "+dLabel(gc-gp)+"원("+pctS(gc,gp)+") 변동함.";
  }
  return result;
}

function exportXLS(result){

  const mg={left:0.4,right:0.4,top:0.6,bottom:0.6,header:0.3,footer:0.3};

  // 셀 스타일 빌더
  function b(st="thin",cl="CBD5E1"){return{style:st,color:{rgb:cl}};}
  function ab(st,cl){return{top:b(st,cl),bottom:b(st,cl),left:b(st,cl),right:b(st,cl)};}
  function mk(f={},bg="FFFFFF",al={},bd=ab()){return{font:{name:"맑은 고딕",sz:10,...f},fill:{fgColor:{rgb:bg}},alignment:{vertical:"center",...al},border:bd};}
  function C(v,s){
    if(v==null||v==="")return{v:"",t:"s",s};
    if(typeof v==="number")return{v,t:"n",s,z:"#,##0"};
    return{v,t:"s",s};
  }
  function NC(v,s){// 숫자셀 (증감표시)
    if(typeof v!=="number")return C(v,s);
    return{v,t:"n",s,z:'#,##0;[Red]-#,##0;"-"'};
  }

  // 스타일 정의
  const S={
    TITLE: mk({sz:18,bold:true,color:{rgb:"FFFFFF"}},          "0F2040",{horizontal:"center"}, ab("medium","2563EB")),
    SUBTITLE: mk({sz:11,color:{rgb:"CADCFC"}},                  "1A3A6E",{horizontal:"center"}, ab("thin","1A3A6E")),
    HDR: mk({sz:10,bold:true,color:{rgb:"FFFFFF"}},             "1A3A6E",{horizontal:"center"}, {top:b("medium","0F2040"),bottom:b("medium","2563EB"),left:b("thin","2563EB"),right:b("thin","2563EB")}),
    HDRR: mk({sz:10,bold:true,color:{rgb:"FFFFFF"}},            "1A3A6E",{horizontal:"right"},  {top:b("medium","0F2040"),bottom:b("medium","2563EB"),left:b("thin","2563EB"),right:b("thin","2563EB")}),
    SEC: mk({sz:11,bold:true,color:{rgb:"FFFFFF"}},             "1E3A5F",{horizontal:"left"},   {top:b("medium","0F2040"),bottom:b("medium","2563EB"),left:b("medium","0F2040"),right:b("medium","0F2040")}),
    D0L: mk({sz:10},                                            "F0F7FF",{horizontal:"left"},   ab()),
    D0R: mk({sz:10},                                            "F0F7FF",{horizontal:"right"},  ab()),
    D1L: mk({sz:10},                                            "FFFFFF",{horizontal:"left"},   ab()),
    D1R: mk({sz:10},                                            "FFFFFF",{horizontal:"right"},  ab()),
    TOL: mk({sz:11,bold:true,color:{rgb:"FFFFFF"}},             "0F2040",{horizontal:"left"},   {top:b("medium","2563EB"),bottom:b("medium","2563EB"),left:b("medium","0F2040"),right:b("thin")}),
    TOR: mk({sz:11,bold:true,color:{rgb:"FFFFFF"}},             "0F2040",{horizontal:"right"},  {top:b("medium","2563EB"),bottom:b("medium","2563EB"),left:b("thin"),right:b("medium","0F2040")}),
    UPL: mk({sz:10,bold:true,color:{rgb:"991B1B"}},             "FEF2F2",{horizontal:"left"},   ab("thin","FCA5A5")),
    UPR: mk({sz:10,bold:true,color:{rgb:"991B1B"}},             "FEF2F2",{horizontal:"right"},  ab("thin","FCA5A5")),
    DNL: mk({sz:10,bold:true,color:{rgb:"166534"}},             "F0FDF4",{horizontal:"left"},   ab("thin","86EFAC")),
    DNR: mk({sz:10,bold:true,color:{rgb:"166534"}},             "F0FDF4",{horizontal:"right"},  ab("thin","86EFAC")),
    MEM: mk({sz:9,color:{rgb:"475569"},italic:true},            "F8FAFC",{horizontal:"left",wrapText:true}, ab()),
    CMH: mk({sz:11,bold:true,color:{rgb:"FFFFFF"}},             "0F2040",{horizontal:"left"},   ab("medium","2563EB")),
    CMB: mk({sz:10,color:{rgb:"1E293B"}},                       "FFFFFF",{horizontal:"left",wrapText:true}, ab()),
    CML: mk({sz:10,color:{rgb:"1E293B"}},                       "EFF6FF",{horizontal:"left",wrapText:true}, {top:b(),bottom:b(),left:b("thick","2563EB"),right:b()}),
    WARN:mk({sz:10,bold:true,color:{rgb:"92400E"}},             "FEF3C7",{horizontal:"left"},   ab("thin","F59E0B")),
    EMPTY:mk({sz:10},                                           "FFFFFF",{},                    ab("thin","F1F5F9")),
  };

  function makeSheet(data,cols,name,pageSetup,pageMargins){
    const ws=XLSX.utils.aoa_to_sheet(data.map(r=>r.map(c2=>c2?.v??"")));
    data.forEach((row,ri)=>row.forEach((cell,ci)=>{
      if(cell==null)return;
      const addr=XLSX.utils.encode_cell({r:ri,c:ci});
      ws[addr]={...cell};
    }));
    if(cols)ws["!cols"]=cols;
    ws["!pageSetup"]=pageSetup||pg;
    ws["!margins"]=pageMargins||mg;
    ws["!printOptions"]={gridLines:false};
    return ws;
  }

  // ══════════════════════════════════════
  // 시트 1: 경영요약
  // ══════════════════════════════════════
  {
    const rows=[];
    const m=(v,s)=>C(v,s);

    // 타이틀
    rows.push([m("비용실적 분석 보고서",S.TITLE),null,null,null,null,null]);
    rows.push([m(period+" | 한라엔컴㈜ 기획팀",S.SUBTITLE),null,null,null,null,null]);
    rows.push([m("",S.EMPTY),null,null,null,null,null]);

    // 핵심 지표
    rows.push([m("[ 핵심 비용 지표 ]",S.SEC),null,null,null,null,null]);
    rows.push([m("구분",S.HDR),m("전월",S.HDRR),m("당월",S.HDRR),m("증감액",S.HDRR),m("증감률",S.HDRR),m("비중",S.HDRR)]);

    const items=[
      {l:"제조경비",c:tc.mfg,p:tp.mfg},
      {l:"판관비",c:tc.sga,p:tp.sga},
    ];
    items.forEach((item,i)=>{
      const DL=i%2===0?S.D0L:S.D1L, DR=i%2===0?S.D0R:S.D1R;
      const d=item.c-item.p, pct=item.p>0?((item.c-item.p)/item.p*100).toFixed(1)+"%":"-";
      const wt=gc>0?(item.c/gc*100).toFixed(1)+"%":"-";
      rows.push([m(item.l,DL),C(item.p,DR),C(item.c,DR),NC(d,DR),m(pct,DR),m(wt,DR)]);
    });
    const dT2=gc-gp,pct2=gp>0?((gc-gp)/gp*100).toFixed(1)+"%":"-";
    rows.push([m("합 계",S.TOL),C(gp,S.TOR),C(gc,S.TOR),NC(dT2,S.TOR),m(pct2,S.TOR),m("100%",S.TOR)]);
    rows.push([m("",S.EMPTY),null,null,null,null,null]);

    // AI 분석 요약
    rows.push([m("[ AI 분석 요약 ]",S.SEC),null,null,null,null,null]);
    if(aiComments?.overallComment){
      rows.push([m(aiComments.overallComment,S.CML),null,null,null,null,null]);
    }
    rows.push([m("",S.EMPTY),null,null,null,null,null]);

    // 증가 요인
    rows.push([m("[ 주요 증가 요인 ]",S.SEC),null,null,null,null,null]);
    (aiComments?.upFactors||[]).slice(0,5).forEach((k,i)=>{
      rows.push([m((i+1)+". "+k,S.UPL),null,null,null,null,null]);
    });
    if(!(aiComments?.upFactors?.length))rows.push([m("해당 없음",S.D0L),null,null,null,null,null]);
    rows.push([m("",S.EMPTY),null,null,null,null,null]);

    // 감소 요인
    rows.push([m("[ 주요 감소 요인 ]",S.SEC),null,null,null,null,null]);
    (aiComments?.dnFactors||[]).slice(0,5).forEach((k,i)=>{
      rows.push([m((i+1)+". "+k,S.DNL),null,null,null,null,null]);
    });
    if(!(aiComments?.dnFactors?.length))rows.push([m("해당 없음",S.D0L),null,null,null,null,null]);
    rows.push([m("",S.EMPTY),null,null,null,null,null]);

    // 이상 항목
    const warns=aiComments?.warnings||[];
    if(warns.length>0){
      rows.push([m("[ ⚠ 주의 항목 ]",S.SEC),null,null,null,null,null]);
      warns.forEach(w=>rows.push([m("▶ "+w,S.WARN),null,null,null,null,null]));
      rows.push([m("",S.EMPTY),null,null,null,null,null]);
    }

    const ws=makeSheet(rows,[{wch:52},{wch:16},{wch:16},{wch:16},{wch:10},{wch:10}],"경영요약");
    // 병합
    const mergeRows=[0,1,2,3,rows.length-2];
    rows.forEach((_,ri)=>{
      const first=rows[ri][0];
      if(!first)return;
      const s=first.s;
      if([S.TITLE,S.SUBTITLE,S.SEC,S.CML,S.UPL,S.DNL,S.WARN,S.EMPTY,S.CMB].includes(s)){
        if(!ws["!merges"])ws["!merges"]=[];
        ws["!merges"].push({s:{r:ri,c:0},e:{r:ri,c:5}});
      }
    });
    // 행 높이
    ws["!rows"]=rows.map((_,ri)=>{
      if(ri===0)return{hpt:36};
      if(ri===1)return{hpt:20};
      if(rows[ri][0]?.s===S.SEC)return{hpt:22};
      if(rows[ri][0]?.s===S.CML)return{hpt:36};
      return{hpt:18};
    });
    XLSX.utils.book_append_sheet(wb,ws,"경영요약");
  }

  // ══════════════════════════════════════
  // 시트 2: 단위별 상세
  // ══════════════════════════════════════
  {
    const rows=[];
    const m=(v,s)=>C(v,s);
    rows.push([m("단위별 상세 분석",S.TITLE),null,null,null,null,null,null,null]);
    rows.push([m(period,S.SUBTITLE),null,null,null,null,null,null,null]);
    rows.push([m("",S.EMPTY),null,null,null,null,null,null,null]);
    rows.push([m("전표관리단위",S.HDR),m("구분",S.HDR),m("계정과목",S.HDR),m("전월",S.HDRR),m("당월",S.HDRR),m("증감액",S.HDRR),m("증감률",S.HDRR),m("주요 적요",S.HDR)]);

    const sorted=[...units].sort((a,b)=>Math.abs(b.totalCurr-b.totalPrev)-Math.abs(a.totalCurr-a.totalPrev));
    sorted.forEach((u,ui)=>{
      const d=u.totalCurr-u.totalPrev;
      const pct=u.totalPrev>0?((d/u.totalPrev)*100).toFixed(1)+"%":"-";
      const UL=ui%2===0?S.D0L:S.D1L, UR=ui%2===0?S.D0R:S.D1R;
      const unitS=mk({sz:10,bold:true,color:{rgb:"0F2040"}},ui%2===0?"DBEAFE":"EFF6FF",{horizontal:"left"},ab("thin","93C5FD"));
      const unitSR=mk({sz:10,bold:true,color:{rgb:"0F2040"}},ui%2===0?"DBEAFE":"EFF6FF",{horizontal:"right"},ab("thin","93C5FD"));

      // 단위 합계행
      rows.push([m(u.unit,unitS),m("합계",unitS),m("",unitS),C(u.totalPrev,unitSR),C(u.totalCurr,unitSR),NC(d,unitSR),m(pct,unitSR),m("",unitS)]);

      // 계정별 행
      u.accs.filter(a=>Math.abs(a.diff)>=10000).forEach((a,ai)=>{
        const adiff=a.diff;
        const apct=a.p>0?((adiff/a.p)*100).toFixed(1)+"%":"-";
        const AL=ai%2===0?S.D0L:S.D1L, AR=ai%2===0?S.D0R:S.D1R;
        const aS=adiff>=0&&Math.abs(adiff)>=500000?S.UPL:adiff<0&&Math.abs(adiff)>=500000?S.DNL:AL;
        const aSR=adiff>=0&&Math.abs(adiff)>=500000?S.UPR:adiff<0&&Math.abs(adiff)>=500000?S.DNR:AR;
        const memos=(a.memos||[]).slice(0,2).map(m2=>m2.text.slice(0,20)+"("+fmtS(m2.amt)+")").join(" / ");
        rows.push([m("",AL),m(a.cat,AL),m(a.acc,aS),C(a.p,AR),C(a.c,aSR),NC(adiff,aSR),m(apct,aSR),m(memos,S.MEM)]);
      });
    });

    // 합계행
    rows.push([m("총 합계",S.TOL),m("",S.TOL),m("",S.TOL),C(gp,S.TOR),C(gc,S.TOR),NC(dT,S.TOR),m(gp>0?((dT/gp)*100).toFixed(1)+"%":"-",S.TOR),m("",S.TOL)]);

    const ws=makeSheet(rows,[{wch:18},{wch:10},{wch:26},{wch:16},{wch:16},{wch:16},{wch:10},{wch:40}],"단위별상세");
    ws["!merges"]=[];
    ws["!merges"].push({s:{r:0,c:0},e:{r:0,c:7}});
    ws["!merges"].push({s:{r:1,c:0},e:{r:1,c:7}});
    ws["!merges"].push({s:{r:2,c:0},e:{r:2,c:7}});
    ws["!rows"]=rows.map((_,ri)=>ri===0?{hpt:32}:ri===1?{hpt:18}:{hpt:16});
    XLSX.utils.book_append_sheet(wb,ws,"단위별상세");
  }

  // ══════════════════════════════════════
  // 시트 3: 분석 코멘트
  // ══════════════════════════════════════
  {
    const rows=[];
    const m=(v,s)=>C(v,s);
    rows.push([m("AI 분석 코멘트",S.TITLE),null,null]);
    rows.push([m(period,S.SUBTITLE),null,null]);
    rows.push([m("",S.EMPTY),null,null]);

    const unitEntries=Object.entries(aiComments?.unitComments||{});
    if(unitEntries.length===0){
      rows.push([m("분석 코멘트가 없습니다. 재분석을 실행해주세요.",S.D0L),null,null]);
    } else {
      unitEntries.forEach(([unit,cm])=>{
        rows.push([m(unit,S.CMH),null,null]);
        rows.push([m(cm.summary||"",S.CML),null,null]);
        (cm.details||[]).forEach(d=>rows.push([m("• "+d,S.CMB),null,null]));
        rows.push([m("",S.EMPTY),null,null]);
      });
    }

    const ws=makeSheet(rows,[{wch:70},{wch:0},{wch:0}],"분석코멘트");
    ws["!merges"]=[];
    rows.forEach((_,ri)=>{
      ws["!merges"].push({s:{r:ri,c:0},e:{r:ri,c:2}});
    });
    ws["!rows"]=rows.map((_,ri)=>{
      if(ri===0)return{hpt:32};
      const s=rows[ri][0]?.s;
      if(s===S.CML||s===S.CMB)return{hpt:36};
      return{hpt:20};
    });
    XLSX.utils.book_append_sheet(wb,ws,"분석코멘트");
  }

  const fname="한라엔컴_비용분석_"+mLabel(currentMonth).replace(/\s/g,"")+".xlsx";
  XLSX.writeFile(wb,fname);
}

      const x=0.4+i*4.3;

    footer(sl);

      const rowVals=[u.unit,fmtS(u.totalPrev),fmtS(u.totalCurr),(d2>=0?"+":"")+fmtS(d2),pctS(u.totalCurr,u.totalPrev),cm2];
      let rx=0.3;

        sl.addText(v,{x:rx+0.08,y:1.17+i*0.49,w:col.w-0.16,h:0.4,fontSize:9,align:col.al,...col2,wrap:ci===5,fontFace:"Malgun Gothic"});

    footer(sl);
  }

  // ── 슬라이드 5: 분석 코멘트 ──
  const unitEntries2=Object.entries(aiComments?.unitComments||{});
  if(unitEntries2.length>0){

  }

  const fname="한라엔컴_비용분석_"+mLabel(currentMonth).replace(/\s/g,"")+".pptx";
  await pres.writeFile({fileName:fname});

/* ─── 세로막대 차트 (가로 나열) ─── */
function VBarChart({data}){
  if(!data||!data.length)return null;
  const CHART_H=420,LABEL_H=40,TOP=10,BW=20,GAP=6,PAD=10;
  const maxV=Math.max(...data.flatMap(d=>[d.prev,d.curr]),1);
  const COL=BW*2+GAP+8,W=data.length*COL+PAD*2,H=CHART_H+LABEL_H+TOP+16;
  const GRIDS=[0.25,0.5,0.75,1.0];
  return(
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{display:"block",minWidth:300,width:"100%"}}>
        {GRIDS.map(pct=>{
          const y=TOP+(1-pct)*CHART_H;
          return <g key={pct}><line x1={0} y1={y} x2={W} y2={y} stroke="#f1f5f9" strokeWidth="1"/><text x={2} y={y-2} fontSize={8} fill="#94a3b8">{fmtS(maxV*pct)}</text></g>;
        })}
        {data.map((d,i)=>{
          const x=PAD+i*COL;
          const ph=Math.max(Math.round(d.prev/maxV*CHART_H),1);
          const ch=Math.max(Math.round(d.curr/maxV*CHART_H),1);
          const up=d.curr>=d.prev;
          const py=TOP+CHART_H-ph,cy=TOP+CHART_H-ch;
          return(
            <g key={i}>
              <rect x={x} y={py} width={BW} height={ph} fill="#e2e8f0" rx="2"/>
              <rect x={x+BW+GAP} y={cy} width={BW} height={ch} fill={up?"#ef4444":"#22c55e"} rx="2"/>
              {ch>14&&<text x={x+BW+GAP+BW/2} y={cy-3} fontSize={8} fill={up?"#dc2626":"#16a34a"} textAnchor="middle" fontWeight="600">{fmtS(d.curr)}</text>}
              <text x={x+BW+GAP/2} y={TOP+CHART_H+LABEL_H-4} fontSize={9} fill={d.isHQ?"#7c3aed":"#475569"} textAnchor="middle">{d.name.length>5?d.name.slice(0,5)+"…":d.name}</text>
            </g>
          );
        })}
      </svg>
      <div style={{display:"flex",gap:14,fontSize:11,color:"#64748b",marginTop:4}}>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#e2e8f0",borderRadius:2,marginRight:3}}></span>전월</span>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#ef4444",borderRadius:2,marginRight:3}}></span>증가</span>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#22c55e",borderRadius:2,marginRight:3}}></span>감소</span>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#8b5cf6",borderRadius:2,marginRight:3}}></span>본사</span>
      </div>
    </div>
  );
}
function CostChart({units}){
  const toAmt=u=>u.curr.mfg+u.curr.sga;
  const toPrev=u=>u.prev.mfg+u.prev.sga;
  const siteData=SITE_ORDER.map(name=>{const u=units.find(u=>u.unit===name);return u?{name:name.length>6?name.slice(0,6)+"…":name,prev:toPrev(u),curr:toAmt(u),isHQ:false}:null;}).filter(Boolean);
  const hqUnits=units.filter(u=>isHQUnit(u.unit)).sort((a,b)=>toAmt(b)-toAmt(a));
  const hqData=hqUnits.map(u=>({name:u.unit.length>6?u.unit.slice(0,6)+"…":u.unit,prev:toPrev(u),curr:toAmt(u),isHQ:true}));
  return <VBarChart data={[...siteData,...hqData]}/>;
}

/* ─── 요약 테이블 ─── */
function SummaryTable({totals,currentMonth,prevMonth,units}){
  const rows=[{l:"제조경비",c:totals.curr.mfg,p:totals.prev.mfg,cl:"#1e40af",bg:"#eff6ff"},{l:"판관비",c:totals.curr.sga,p:totals.prev.sga,cl:"#7c3aed",bg:"#f5f3ff"}];
  const gc=rows.reduce((s,r)=>s+r.c,0),gp=rows.reduce((s,r)=>s+r.p,0);
  const th={padding:"9px 12px",background:"#0f2040",color:"white",fontSize:12,fontWeight:700,textAlign:"right"};
  const allFlat=[];units?.forEach(u=>u.accs.forEach(a=>allFlat.push({...a,unit:u.unit})));allFlat.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  const top3Up=allFlat.filter(a=>a.diff>0).slice(0,3),top3Dn=allFlat.filter(a=>a.diff<0).slice(0,3);
  const top3=units?units.slice(0,3):[],top3pct=gc>0?(top3.reduce((s,u)=>s+u.totalCurr,0)/gc*100).toFixed(1):0;
  return(
    <div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,marginBottom:12}}>
        <thead><tr><th style={{...th,textAlign:"left",paddingLeft:16}}>구분</th><th style={th}>{prevMonth?mLabel(prevMonth):"전월"}</th><th style={th}>{mLabel(currentMonth)}</th><th style={th}>증감액</th><th style={th}>증감률</th><th style={th}>비중</th></tr></thead>
        <tbody>
          {rows.map((r,i)=>{const d=r.c-r.p,sh=gc>0?(r.c/gc*100).toFixed(1):0;return(
            <tr key={i} style={{background:r.bg}}>
              <td style={{padding:"10px 12px",paddingLeft:16,fontWeight:700,color:r.cl}}>{r.l}</td>
              <td style={{padding:"10px 12px",textAlign:"right",color:"#64748b"}}>{fmt(r.p)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontWeight:600}}>{fmt(r.c)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",color:dColor(d),fontWeight:700}}>{dLabel(d)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",color:pctC(r.c,r.p)}}>{pctS(r.c,r.p)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",color:"#475569"}}>{sh}%</td>
            </tr>
          );})}
          <tr style={{background:"#0f2040"}}>
            <td style={{padding:"10px 12px",paddingLeft:16,fontWeight:800,color:"white"}}>합 계</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:"rgba(255,255,255,0.7)"}}>{fmt(gp)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",fontWeight:800,color:"white"}}>{fmt(gc)}</td>

          </div>

      )}

  );
}

/* ─── 단위별 아코디언 ─── */
function UnitAccordion({units,aiComments,prevMonth}){
  const [open,setOpen]=useState(null);
  const grand=units.reduce((s,u)=>s+u.totalCurr,0);
  const grandPrev=units.reduce((s,u)=>s+u.totalPrev,0);
  const totalAnom=units.reduce((s,u)=>s+u.accs.filter(a=>Math.abs(a.diff)>=5000000).length,0);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
        {[{l:"분석 단위 수",v:units.length+"개",sub:"전표관리단위",c:"#1e40af"},{l:"당월 총비용",v:fmtS(grand),sub:prevMonth?mLabel(prevMonth)+" 대비":"전월 대비",c:"#0f2040"},{l:"총 증감액",v:dLabel(grand-grandPrev)+"원",sub:pctS(grand,grandPrev),c:(grand-grandPrev)>0?"#dc2626":"#16a34a"},{l:"이상 항목",v:totalAnom+"건",sub:"500만원 이상 증감",c:totalAnom>0?"#b91c1c":"#16a34a"}].map((k,i)=>(
          <div key={i} style={{background:"white",borderRadius:10,padding:"12px 16px",border:"1px solid #e2e8f0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",borderTop:"3px solid "+k.c}}>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:17,fontWeight:800,color:k.c}}>{k.v}</div>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>
      {units.map((u,i)=>{
        const d=u.totalCurr-u.totalPrev,isOpen=open===i;
        const ai=aiComments?.unitComments?.[u.unit];
        const anomalies=u.accs.filter(a=>Math.abs(a.diff)>=5000000);
        const share=grand>0?(u.totalCurr/grand*100).toFixed(1):0;
        const topAcc=u.accs[0];
        return(
          <div key={i} style={{border:"1px solid #e2e8f0",borderRadius:12,marginBottom:8,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
            <div onClick={()=>setOpen(isOpen?null:i)} style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",background:isOpen?"#f0f9ff":"white"}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:i<3?["linear-gradient(135deg,#f59e0b,#d97706)","linear-gradient(135deg,#94a3b8,#64748b)","linear-gradient(135deg,#cd7f32,#a16207)"][i]:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:i<3?"white":"#64748b",flexShrink:0}}>{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontWeight:800,fontSize:15,color:"#0f2040"}}>{u.unit}</span>
                  <span style={{fontSize:10,padding:"1px 7px",background:isHQUnit(u.unit)?"#ede9fe":"#dbeafe",color:isHQUnit(u.unit)?"#6d28d9":"#1d4ed8",borderRadius:4,fontWeight:600}}>{isHQUnit(u.unit)?"본사":"사업장"}</span>
                  {anomalies.length>0&&<span style={{fontSize:10,padding:"1px 7px",background:"#fef2f2",border:"1px solid #fca5a5",color:"#b91c1c",borderRadius:4,fontWeight:700}}>{"⚠ "+anomalies.length+"건"}</span>}
                </div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:4,display:"flex",gap:14,flexWrap:"wrap"}}>
                  <span>비중 <b style={{color:"#1e40af"}}>{share}%</b></span>
                  <span>제조 {u.totalCurr>0?(u.curr.mfg/u.totalCurr*100).toFixed(0):0}% / 판관 {u.totalCurr>0?(u.curr.sga/u.totalCurr*100).toFixed(0):0}%</span>
                  {topAcc&&Math.abs(topAcc.diff)>0&&<span>최대증감 <b style={{color:topAcc.diff>0?"#dc2626":"#16a34a"}}>{topAcc.acc} {dLabel(topAcc.diff)}원</b></span>}
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,minWidth:120}}>
                <div style={{fontSize:17,fontWeight:800,color:dColor(d)}}>{dLabel(d)}원</div>
                <div style={{fontSize:11,color:pctC(u.totalCurr,u.totalPrev),marginTop:1}}>{pctS(u.totalCurr,u.totalPrev)}</div>
                <div style={{fontSize:11,color:"#94a3b8"}}>당월 {fmtS(u.totalCurr)}</div>
              </div>
              <span style={{color:"#94a3b8",fontSize:14,flexShrink:0}}>{isOpen?"▲":"▼"}</span>
            </div>
            {isOpen&&(
              <div style={{background:"#f8fafc"}}>
                <div style={{padding:"14px 18px 0",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                  {[{l:"제조경비",c:u.curr.mfg,p:u.prev.mfg,cl:"#1e40af",bg:"#eff6ff",bd:"#bfdbfe"},{l:"판관비",c:u.curr.sga,p:u.prev.sga,cl:"#7c3aed",bg:"#f5f3ff",bd:"#ddd6fe"},{l:"합 계",c:u.totalCurr,p:u.totalPrev,cl:"white",bg:"#0f2040",bd:"#0f2040"}].map((s,j)=>(
                    <div key={j} style={{padding:"12px 14px",background:s.bg,borderRadius:10,border:"1px solid "+s.bd}}>
                      <div style={{fontSize:11,color:j===2?"rgba(255,255,255,0.55)":"#64748b",fontWeight:600,marginBottom:4}}>{s.l}</div>
                      <div style={{fontSize:15,fontWeight:800,color:s.cl}}>{fmt(s.c)}</div>
                      <div style={{fontSize:11,color:dColor(s.c-s.p),fontWeight:600,marginTop:3}}>{dLabel(s.c-s.p)}<span style={{color:j===2?"rgba(255,255,255,0.4)":"#94a3b8",fontWeight:400,marginLeft:6}}>{pctS(s.c,s.p)}</span></div>
                    </div>
                  ))}
                </div>
                {anomalies.length>0&&<div style={{margin:"12px 18px 0",padding:"10px 14px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,fontSize:12}}><b style={{color:"#b91c1c",marginRight:8}}>500만원↑ 증감</b><span style={{color:"#991b1b"}}>{anomalies.map(a=>a.acc+" ("+dLabel(a.diff)+"원)").join("  ·  ")}</span></div>}
                <div style={{padding:"14px 18px 0",overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr style={{background:"#0f2040"}}>{["계정과목","구분","전월","당월","증감액","증감률","비중","적요(금액순)"].map((h,j)=><th key={j} style={{padding:"8px 10px",textAlign:j>=2&&j<=5?"right":"left",color:"white",fontWeight:700,fontSize:11,borderRight:"1px solid rgba(255,255,255,0.08)"}}>{h}</th>)}</tr></thead>
                    <tbody>
                      {u.accs.map((a,j)=>{
                        const an=Math.abs(a.diff)>=5000000,wp=u.totalCurr>0?(a.c/u.totalCurr*100).toFixed(1):0;
                        return(
                          <tr key={j} style={{background:an?(a.diff>0?"#fef2f2":"#f0fdf4"):j%2===0?"white":"#f8fafc",borderBottom:"1px solid #f1f5f9"}}>
                            <td style={{padding:"8px 10px",fontWeight:an?700:500,color:an?(a.diff>0?"#b91c1c":"#166534"):"#1e293b"}}>{an&&"⚠ "}{a.acc}</td>
                            <td style={{padding:"8px 10px"}}><CatBadge cat={a.cat}/></td>
                            <td style={{padding:"8px 10px",textAlign:"right",color:"#94a3b8"}}>{fmt(a.p)}</td>
                            <td style={{padding:"8px 10px",textAlign:"right",fontWeight:600,color:a.c>a.p?"#dc2626":a.c<a.p?"#16a34a":"#374151"}}>{fmt(a.c)}</td>
                            <td style={{padding:"8px 10px",textAlign:"right",fontWeight:700,color:dColor(a.diff),fontSize:13}}>{dLabel(a.diff)}</td>
                            <td style={{padding:"8px 10px",textAlign:"right",color:pctC(a.c,a.p)}}>{pctS(a.c,a.p)}</td>
                            <td style={{padding:"8px 10px",textAlign:"right"}}>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
                                <div style={{width:36,height:6,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}><div style={{width:wp+"%",height:"100%",background:a.diff>0?"#ef4444":"#22c55e",borderRadius:3}}></div></div>
                                <span style={{fontSize:10,color:"#64748b",minWidth:28}}>{wp}%</span>
                              </div>
                            </td>
                            <td style={{padding:"8px 10px",minWidth:200}}><MemoCell memos={a.memos}/></td>
                          </tr>
                        );
                      })}
                    </tbody>
                    <tfoot><tr style={{background:"#0f2040"}}><td style={{padding:"9px 10px",fontWeight:800,color:"white"}}>소 계</td><td></td><td style={{padding:"9px 10px",textAlign:"right",color:"rgba(255,255,255,0.65)",fontWeight:600}}>{fmt(u.totalPrev)}</td><td style={{padding:"9px 10px",textAlign:"right",color:"white",fontWeight:800}}>{fmt(u.totalCurr)}</td><td style={{padding:"9px 10px",textAlign:"right",fontWeight:800,color:d>0?"#fca5a5":"#86efac",fontSize:13}}>{dLabel(d)}</td><td style={{padding:"9px 10px",textAlign:"right",color:d>0?"#fca5a5":"#86efac"}}>{pctS(u.totalCurr,u.totalPrev)}</td><td style={{padding:"9px 10px",textAlign:"right",color:"rgba(255,255,255,0.55)"}}>100%</td><td></td></tr></tfoot>
                  </table>
                </div>
                {/* 구성비 바 */}
                <div style={{margin:"12px 18px 14px",padding:"12px 14px",background:"white",border:"1px solid #e2e8f0",borderRadius:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:10}}>계정과목별 당월 구성비</div>
                  {u.accs.slice(0,8).map((a,j)=>{const ww=u.totalCurr>0?Math.max((a.c/u.totalCurr*100),0):0;const bc=a.cat==="제조경비"?"#3b82f6":"#8b5cf6";return(
                    <div key={j} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                      <div style={{fontSize:10,color:"#475569",width:90,flexShrink:0,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}} title={a.acc}>{a.acc}</div>
                      <div style={{flex:1,height:12,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}><div style={{width:ww.toFixed(1)+"%",height:"100%",background:bc,borderRadius:3}}></div></div>
                      <div style={{fontSize:10,color:bc,fontWeight:700,width:38,textAlign:"right"}}>{ww.toFixed(1)}%</div>
                      <div style={{fontSize:10,color:"#64748b",width:65,textAlign:"right"}}>{fmtS(a.c)}</div>
                    </div>
                  );})}
                </div>
                {ai&&(
                  <div style={{margin:"0 18px 14px",padding:"14px 16px",background:"white",border:"1px solid #e2e8f0",borderRadius:10,borderLeft:"4px solid #f59e0b"}}>
                    <div style={{fontSize:11,fontWeight:800,color:"#78350f",marginBottom:10}}>분석 코멘트</div>
                    <div style={{fontSize:12,color:"#92400e",fontWeight:600,marginBottom:10}}>
                      {(ai.summary||"").split("\n\n").filter(p=>p.trim()).map((para,pi)=><p key={pi} style={{lineHeight:1.75,margin:pi>0?"8px 0 0":0}}>{para.trim()}</p>)}
                    </div>
                    {ai.details?.length>0&&<div style={{borderTop:"1px solid #fde68a",paddingTop:10,display:"flex",flexDirection:"column",gap:6}}>
                      {ai.details.map((detail,k)=><div key={k} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:12,color:"#78350f",lineHeight:1.65}}><span style={{flexShrink:0,width:17,height:17,background:"#fef9c3",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#92400e",marginTop:1}}>{k+1}</span><span>{detail}</span></div>)}
                    </div>}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ═══ 계정별 분석 ═══ */
const ACCT_STRUCTURE=[
  {section:"II. 노무비",items:["임금(제)","퇴직급여(제)","잡급(제)"]},
  {section:"III. 제조경비",items:["중기유지비","전력비(제)","수도광열비(제)","수선비(제)","교육훈련비(제)","소모품비(제)","세금과공과(제)","감가상각비(제)","감가상각비(제)_사용권자산","보상비(제)","지급임차료(제)","도서인쇄비(제)","보험료(제)","복리후생비(제)","지급수수료(제)","화약대(제)","의료비(제)","운반비(제)","안전관리비(제)","복구비(제)","석산채굴권상각"]},
  {section:"IV. 판매비와 관리비",items:["급여","퇴직급여","복리후생비","여비교통비","통신비","세금과공과","지급임차료","감가상각비","감가상각비_사용권자산","보험료","접대비","광고선전비","교육훈련비","차량유지비","소모품비","도서인쇄비","지급수수료","수도광열비","수선비","판매수수료","의료비","전력비","보상비","대손상각비","특허권상각","광업권상각","영업권상각","소프트웨어상각","경상연구개발비","잡급","잡비","안전관리비"]}
];
function buildAcctData(units){
  const curr={},prev={};
  units.forEach(u=>u.accs.forEach(a=>{const na=normAcc(a.acc);curr[na]=(curr[na]||0)+a.c;prev[na]=(prev[na]||0)+a.p;}));
  return{curr,prev};
}
function AccountTab({units,currentMonth,prevMonth}){
  const [collapsed,setCollapsed]=useState({});
  const{curr,prev}=buildAcctData(units);
  const toggleSec=sec=>setCollapsed(s=>({...s,[sec]:!s[sec]}));
  const secTotal=(items,map)=>items.reduce((s,item)=>s+(map[normAcc(item)]||0),0);
  const totalC=Object.values(curr).reduce((s,v)=>s+v,0);
  const totalP=Object.values(prev).reduce((s,v)=>s+v,0);
  const th={padding:"9px 14px",background:"#0f2040",color:"white",fontSize:11,fontWeight:700,textAlign:"right",whiteSpace:"nowrap",borderRight:"1px solid rgba(255,255,255,0.08)"};
  const thL={...th,textAlign:"left"};
  return(
    <div style={{maxWidth:1000}}>
      <div style={{marginBottom:20}}><h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",margin:0}}>계정별 분석</h2><p style={{fontSize:13,color:"#64748b",margin:"4px 0 0"}}>{prevMonth?mLabel(prevMonth)+" → ":""}{mLabel(currentMonth)} · 제조원가명세서 + 손익계산서 기준</p></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {[{l:"당월 총비용",v:fmt(totalC)+"원",sub:fmtS(totalC),c:"#0f2040"},{l:"전월 총비용",v:fmt(totalP)+"원",sub:fmtS(totalP),c:"#64748b"},{l:"증감액",v:dLabel(totalC-totalP)+"원",sub:pctS(totalC,totalP),c:(totalC-totalP)>0?"#dc2626":"#16a34a"}].map((k,i)=>(
          <div key={i} style={{background:"white",borderRadius:10,padding:"14px 18px",border:"1px solid #e2e8f0",borderTop:"3px solid "+k.c}}>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:16,fontWeight:800,color:k.c}}>{k.v}</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>
      <div style={{background:"white",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr><th style={thL}>계정과목</th><th style={th}>{prevMonth?mLabel(prevMonth):"전월"}</th><th style={th}>{mLabel(currentMonth)}</th><th style={th}>증감액</th><th style={th}>증감률</th><th style={{...th,borderRight:"none"}}>비중</th></tr></thead>
          <tbody>
            {ACCT_STRUCTURE.map((sec,si)=>{
              const secC=secTotal(sec.items,curr),secP=secTotal(sec.items,prev),secD=secC-secP;
              const isCol=collapsed[sec.section];
              return(
                <React.Fragment key={si}>
                  <tr onClick={()=>toggleSec(sec.section)} style={{background:"#1a3a6e",cursor:"pointer"}}>
                    <td style={{padding:"10px 14px",color:"white",fontWeight:800,fontSize:12}}><span style={{marginRight:8,fontSize:10}}>{isCol?"▶":"▼"}</span>{sec.section}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:"rgba(255,255,255,0.75)",fontWeight:700}}>{fmt(secP)}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:"white",fontWeight:800}}>{fmt(secC)}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",fontWeight:800,color:secD>0?"#fca5a5":"#86efac"}}>{dLabel(secD)}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:secD>0?"#fca5a5":"#86efac"}}>{pctS(secC,secP)}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:"rgba(255,255,255,0.6)"}}>{totalC>0?(secC/totalC*100).toFixed(1):0}%</td>
                  </tr>
                  {!isCol&&sec.items.map((item,ii)=>{
                    const na=normAcc(item),cv=curr[na]||0,pv=prev[na]||0,d=cv-pv;
                    const anom=Math.abs(d)>=5000000,hasData=cv>0||pv>0;
                    const bg=anom?(d>0?"#fef2f2":"#f0fdf4"):(ii%2===0?"#f8fafc":"white");
                    return(
                      <tr key={ii} style={{background:bg,borderBottom:"1px solid #f1f5f9",opacity:hasData?1:0.4}}>
                        <td style={{padding:"8px 14px 8px 32px",color:anom?(d>0?"#b91c1c":"#166534"):"#374151",fontWeight:anom?600:400}}>{anom&&<span style={{marginRight:5,fontSize:10}}>⚠</span>}({ii+1}) {item}</td>
                        <td style={{padding:"8px 14px",textAlign:"right",color:"#94a3b8"}}>{pv>0?fmt(pv):"-"}</td>
                        <td style={{padding:"8px 14px",textAlign:"right",fontWeight:cv>0?600:400,color:cv>pv?"#dc2626":cv<pv?"#16a34a":"#374151"}}>{cv>0?fmt(cv):"-"}</td>
                        <td style={{padding:"8px 14px",textAlign:"right",fontWeight:anom?700:500,color:dColor(d)}}>{(cv>0||pv>0)?dLabel(d):"-"}</td>
                        <td style={{padding:"8px 14px",textAlign:"right",color:pctC(cv,pv)}}>{pv>0?pctS(cv,pv):"-"}</td>
                        <td style={{padding:"8px 14px",textAlign:"right",color:"#94a3b8",fontSize:11}}>{totalC>0&&cv>0?(cv/totalC*100).toFixed(1)+"%":"-"}</td>
                      </tr>
                    );
                  })}
                  {!isCol&&<tr style={{background:"#f1f5f9",borderBottom:"2px solid #e2e8f0"}}><td style={{padding:"8px 14px 8px 20px",fontWeight:700,color:"#0f2040",fontSize:12}}>소 계</td><td style={{padding:"8px 14px",textAlign:"right",fontWeight:600,color:"#64748b"}}>{fmt(secP)}</td><td style={{padding:"8px 14px",textAlign:"right",fontWeight:800,color:"#0f2040"}}>{fmt(secC)}</td><td style={{padding:"8px 14px",textAlign:"right",fontWeight:800,color:dColor(secD)}}>{dLabel(secD)}</td><td style={{padding:"8px 14px",textAlign:"right",color:pctC(secC,secP)}}>{pctS(secC,secP)}</td><td style={{padding:"8px 14px",textAlign:"right",color:"#475569"}}>{totalC>0?(secC/totalC*100).toFixed(1):0}%</td></tr>}
                </React.Fragment>
              );
            })}
            <tr style={{background:"#0f2040"}}><td style={{padding:"11px 14px",fontWeight:800,color:"white",fontSize:13}}>합 계</td><td style={{padding:"11px 14px",textAlign:"right",color:"rgba(255,255,255,0.7)",fontWeight:700}}>{fmt(totalP)}</td><td style={{padding:"11px 14px",textAlign:"right",color:"white",fontWeight:800,fontSize:14}}>{fmt(totalC)}</td><td style={{padding:"11px 14px",textAlign:"right",fontWeight:800,color:(totalC-totalP)>0?"#fca5a5":"#86efac",fontSize:13}}>{dLabel(totalC-totalP)}</td><td style={{padding:"11px 14px",textAlign:"right",color:(totalC-totalP)>0?"#fca5a5":"#86efac",fontWeight:700}}>{pctS(totalC,totalP)}</td><td style={{padding:"11px 14px",textAlign:"right",color:"rgba(255,255,255,0.55)"}}>100%</td></tr>
          </tbody>
        </table>
      </div>
      <div style={{marginTop:10,fontSize:11,color:"#94a3b8"}}>※ 섹션 클릭시 접기/펼치기 · ⚠ 500만원 이상 증감</div>
    </div>
  );
}

/* ═══ ItemAnalysisTab (수선비/소모품비/시내교통비/국내출장비) ═══ */
function ItemAnalysisTab({data,label,showDept=false}){
  const [open,setOpen]=useState(null);
  const [view,setView]=useState("site");
  if(!data)return(
    <div style={{maxWidth:800}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",marginBottom:4}}>{label} 사용현황</h2>
      <div style={{background:"white",borderRadius:12,padding:"40px",border:"1px solid #e2e8f0",textAlign:"center",color:"#94a3b8",marginTop:16}}>
        <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>데이터가 없습니다</p>
        <p style={{fontSize:13}}>분석하기 탭에서 당월 파일을 업로드하면 자동으로 표시됩니다.</p>
      </div>
    </div>
  );
  const{month,prevMonth,units,depts,grandTotal,grandPrev,grandMfg,grandSga}=data;
  const grandDiff=grandTotal-(grandPrev||0);
  const siteUnits=units.filter(u=>!u.hq);
  const hqRows=showDept&&depts&&depts.length>0
    ? depts.filter(d=>isHQDept(d.dept||"")||isHQUnit(d.unit||"")).sort((a,b)=>b.total-a.total)
    : units.filter(u=>u.hq);
  const curRows=view==="site"?siteUnits:hqRows;
  const curTotal=curRows.reduce((s,u)=>s+u.total,0),curPrev=curRows.reduce((s,u)=>s+(u.prev||0),0);

  const renderRow=(row,i)=>{
    const isOpen=open===i,share=curTotal>0?(row.total/curTotal*100).toFixed(1):0,diff=row.total-(row.prev||0);
    const key=view==="hq"&&showDept?(row.dept||row.unit):(row.unit||row.dept);
    return(
      <React.Fragment key={i}>
        <tr onClick={()=>setOpen(isOpen?null:i)} style={{background:isOpen?"#eff6ff":i%2===0?"white":"#f8fafc",cursor:"pointer",borderBottom:"1px solid #f1f5f9"}}>
          <td style={{padding:"9px 10px",fontWeight:600,color:"#1e293b"}}><span style={{marginRight:6,color:"#94a3b8",fontSize:10}}>{isOpen?"▼":"▶"}</span>{key}</td>
          <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:"#0f2040"}}>{fmt(row.total)}</td>
          <td style={{padding:"9px 10px",textAlign:"right",color:"#64748b"}}>{(row.prev||0)>0?fmt(row.prev):"-"}</td>
          <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:dColor(diff)}}>{(row.prev||0)>0?dLabel(diff):"-"}</td>
          <td style={{padding:"9px 10px",textAlign:"right",color:pctC(row.total,row.prev)}}>{(row.prev||0)>0?pctS(row.total,row.prev||1):"-"}</td>
          <td style={{padding:"9px 10px",textAlign:"right",color:"#2563eb"}}>{(row["제조경비"]||0)>0?fmt(row["제조경비"]):"-"}</td>
          <td style={{padding:"9px 10px",textAlign:"right",color:"#7c3aed"}}>{(row["판관비"]||0)>0?fmt(row["판관비"]):"-"}</td>
          <td style={{padding:"9px 10px",color:"#475569",fontSize:11}}>{row.memos?.[0]?<span>{row.memos[0].text.slice(0,28)}{row.memos[0].text.length>28?"…":""} <b style={{color:"#1e40af"}}>{fmtS(row.memos[0].amt)}</b></span>:"-"}</td>
          <td style={{padding:"9px 10px",textAlign:"right"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
              <div style={{width:36,height:6,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}><div style={{width:share+"%",height:"100%",background:"#2563eb",borderRadius:3}}></div></div>
              <span style={{fontSize:10,color:"#64748b",minWidth:28}}>{share}%</span>
            </div>
          </td>
        </tr>
        {isOpen&&row.memos&&row.memos.length>0&&(
          <tr><td colSpan={9} style={{padding:0,background:"#f8fafc",borderBottom:"2px solid #bfdbfe"}}>
            <div style={{padding:"12px 16px"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#1e40af",marginBottom:8}}>적요별 상세 ({row.memos.length}건)</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead><tr style={{background:"#dbeafe"}}>{["순위","적요","금액","비중"].map((h,j)=><th key={j} style={{padding:"5px 8px",textAlign:j===1?"left":"right",color:"#1e40af",fontWeight:700}}>{h}</th>)}</tr></thead>
                <tbody>{row.memos.map((m,j)=><tr key={j} style={{borderBottom:"1px solid #eff6ff",background:j%2===0?"white":"#f8fafc"}}><td style={{padding:"5px 8px",textAlign:"right",color:"#94a3b8",fontWeight:700}}>{j+1}</td><td style={{padding:"5px 8px",color:"#374151"}}>{m.text}</td><td style={{padding:"5px 8px",textAlign:"right",fontWeight:600}}>{fmt(m.amt)}</td><td style={{padding:"5px 8px",textAlign:"right",color:"#64748b"}}>{row.total>0?(m.amt/row.total*100).toFixed(1):0}%</td></tr>)}</tbody>
                <tfoot><tr style={{background:"#dbeafe"}}><td colSpan={2} style={{padding:"5px 8px",fontWeight:700,color:"#1e40af"}}>소 계</td><td style={{padding:"5px 8px",textAlign:"right",fontWeight:800,color:"#1e40af"}}>{fmt(row.total)}</td><td style={{padding:"5px 8px",textAlign:"right",color:"#1e40af"}}>100%</td></tr></tfoot>
              </table>
            </div>
          </td></tr>
        )}
      </React.Fragment>
    );
  };

  return(
    <div style={{maxWidth:1100}}>
      <div style={{marginBottom:20}}><h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",margin:0}}>{label} 사용현황</h2><p style={{fontSize:13,color:"#64748b",margin:"4px 0 0"}}>{mLabel(month)}{prevMonth?" (전월: "+mLabel(prevMonth)+")":" "} · 적요·금액 위주 분석</p></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:18}}>
        {[{l:label+" 합계",v:fmt(grandTotal)+"원",sub:fmtS(grandTotal),c:"#0f2040"},{l:"전월",v:(grandPrev||0)>0?fmt(grandPrev)+"원":"-",sub:"전월 실적",c:"#64748b"},{l:"증감액",v:(grandPrev||0)>0?dLabel(grandDiff)+"원":"-",sub:(grandPrev||0)>0?pctS(grandTotal,grandPrev||1):"-",c:grandDiff>0?"#dc2626":"#16a34a"},{l:"제조경비",v:fmt(grandMfg)+"원",sub:(grandTotal>0?(grandMfg/grandTotal*100).toFixed(1):0)+"%",c:"#2563eb"},{l:"판관비",v:fmt(grandSga)+"원",sub:(grandTotal>0?(grandSga/grandTotal*100).toFixed(1):0)+"%",c:"#7c3aed"}].map((k,i)=>(
          <div key={i} style={{background:"white",borderRadius:10,padding:"12px 14px",border:"1px solid #e2e8f0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",borderTop:"3px solid "+k.c}}>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:14,fontWeight:800,color:k.c}}>{k.v}</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["site","사업장"],["hq","본사조직"]].map(([v,l])=>(
          <button key={v} onClick={()=>{setView(v);setOpen(null);}} style={{padding:"8px 20px",background:view===v?"#0f2040":"white",border:"1.5px solid "+(view===v?"#0f2040":"#e2e8f0"),borderRadius:8,color:view===v?"white":"#64748b",fontWeight:view===v?700:500,fontSize:13,cursor:"pointer"}}>
            {l} ({v==="site"?siteUnits.length:hqRows.length}개)
          </button>
        ))}
        <div style={{marginLeft:"auto",fontSize:12,color:"#94a3b8",alignSelf:"center"}}>소계 <b style={{color:"#1e293b"}}>{fmt(curTotal)}원</b>{curPrev>0&&<span style={{marginLeft:8,color:dColor(curTotal-curPrev)}}>{dLabel(curTotal-curPrev)}원</span>}</div>
      </div>
      <div style={{background:"white",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#0f2040"}}>{[view==="hq"&&showDept?"예산부서":"전표관리단위","당월","전월","증감액","증감률","제조경비","판관비","최대 적요","비중"].map((h,i)=><th key={i} style={{padding:"9px 10px",color:"white",fontWeight:700,fontSize:11,textAlign:i===0||i===7?"left":"right",borderRight:"1px solid rgba(255,255,255,0.08)",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
          <tbody>{curRows.map((row,i)=>renderRow(row,i))}</tbody>
          <tfoot><tr style={{background:"#0f2040"}}><td style={{padding:"9px 10px",fontWeight:800,color:"white"}}>소 계</td><td style={{padding:"9px 10px",textAlign:"right",fontWeight:800,color:"white"}}>{fmt(curTotal)}</td><td style={{padding:"9px 10px",textAlign:"right",color:"rgba(255,255,255,0.65)"}}>{curPrev>0?fmt(curPrev):"-"}</td><td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:dColor(curTotal-curPrev)}}>{curPrev>0?dLabel(curTotal-curPrev):"-"}</td><td style={{padding:"9px 10px",textAlign:"right",color:pctC(curTotal,curPrev)}}>{curPrev>0?pctS(curTotal,curPrev):"-"}</td><td style={{padding:"9px 10px",textAlign:"right",color:"rgba(255,255,255,0.7)"}}>{fmt(curRows.reduce((s,u)=>s+(u["제조경비"]||0),0))}</td><td style={{padding:"9px 10px",textAlign:"right",color:"rgba(255,255,255,0.7)"}}>{fmt(curRows.reduce((s,u)=>s+(u["판관비"]||0),0))}</td><td></td><td style={{padding:"9px 10px",textAlign:"right",color:"rgba(255,255,255,0.55)"}}>100%</td></tr></tfoot>
        </table>
      </div>
      <div style={{marginTop:10,fontSize:11,color:"#94a3b8"}}>※ 제조경비: 계정과목 (제) 포함 · 판관비: (제) 미포함 · 적요 금액순{showDept?" · 본사: 예산부서(AB열) 기준":""}</div>
    </div>
  );
}

/* ═══ 사업활동비 탭 ═══ */
function ActivityTab({data}){

      <div style={{background:"white",borderRadius:12,padding:"40px",border:"1px solid #e2e8f0",textAlign:"center",color:"#94a3b8",marginTop:16}}>

        <p style={{fontSize:13}}>분석하기 탭에서 당월 파일을 업로드하면 자동으로 표시됩니다.</p>

          <div key={i} style={{background:"white",borderRadius:10,padding:"14px 18px",border:"1px solid #e2e8f0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",borderTop:"3px solid "+k.c}}>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:17,fontWeight:800,color:k.c}}>{k.v}</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>
      <div style={{background:"white",borderRadius:12,padding:"18px 20px",border:"1px solid #e2e8f0",marginBottom:16}}>

        <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
          {MGMT_ORD.filter(k=>allMgmt[k]>0).map(k=>(
            <div key={k} style={{flex:"1 1 120px",minWidth:110,padding:"12px 14px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0",borderTop:"2px solid "+MGMT_COLORS[k]}}>
              <div style={{fontSize:11,fontWeight:700,color:MGMT_COLORS[k],marginBottom:4}}>{k}</div>

      </div>
      <div style={{display:"flex",gap:6,marginBottom:16}}>

                <React.Fragment key={i}>
                  <tr onClick={()=>setOpen(isOpen?null:i)} style={{background:isOpen?"#eff6ff":i%2===0?"white":"#f8fafc",cursor:"pointer",borderBottom:"1px solid #f1f5f9"}}>

                    <td style={{padding:"9px 10px",textAlign:"right"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
                        <div style={{width:36,height:6,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}><div style={{width:share+"%",height:"100%",background:"#2563eb",borderRadius:3}}></div></div>

/* ═══ 경과시간 타이머 ═══ */
function ElapsedTimer(){
  const [sec,setSec]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setSec(s=>s+1),1000);return()=>clearInterval(t);},[]);
  const m=Math.floor(sec/60),s=sec%60;
  return <span style={{marginLeft:10,fontSize:13,color:"rgba(255,255,255,0.85)",fontWeight:600}}>{m>0?m+"분 ":""}{String(s).padStart(2,"0")}초 경과</span>;
}

/* ═══ 분석하기 탭 ═══ */
function DropZone({label,fileName,onUpload,required,badge}){
  const ref=useRef();const [drag,setDrag]=useState(false);
  function handle(file){if(!file||(!file.name.endsWith(".xlsx")&&!file.name.endsWith(".xls"))){alert("xlsx/xls만 지원합니다.");return;}onUpload(file);}
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <label style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{label}</label>
        {required&&<span style={{fontSize:10,padding:"1px 6px",background:"#fee2e2",color:"#dc2626",borderRadius:4,fontWeight:700}}>필수</span>}
        {badge&&<span style={{fontSize:10,padding:"1px 6px",background:"#dbeafe",color:"#1d4ed8",borderRadius:4}}>{badge}</span>}
      </div>
      <div onClick={()=>ref.current.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0]);}}
        style={{border:"2px dashed "+(fileName?"#16a34a":drag?"#3b82f6":"#cbd5e1"),borderRadius:10,padding:"18px 16px",textAlign:"center",cursor:"pointer",background:fileName?"#f0fdf4":drag?"#eff6ff":"#f8fafc"}}>
        {fileName?<p style={{margin:0,fontSize:12,color:"#166534",fontWeight:600}}>{"✓ "+fileName}</p>:<div><p style={{margin:0,fontSize:12,color:"#64748b"}}>클릭 또는 드래그</p><p style={{margin:"2px 0 0",fontSize:11,color:"#94a3b8"}}>.xlsx / .xls</p></div>}
      </div>
      <input ref={ref} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>e.target.files[0]&&handle(e.target.files[0])}/>
    </div>
  );
}

function UploadTab({currFile,prevFile,onCurrUpload,onPrevUpload,onAnalyze,analyzing,error,hasKey,history,onPrevHist}){

      <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",marginBottom:4}}>분석하기</h2>

        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{EXCLUDE_LABEL.map(k=><span key={k} style={{padding:"3px 10px",background:"#fef9c3",border:"1px solid #fde047",borderRadius:20,fontSize:11,color:"#92400e",fontWeight:500}}>{k}</span>)}</div>

      {!hasKey&&<div style={{padding:"10px 14px",background:"#fef9c3",border:"1px solid #fde047",borderRadius:8,fontSize:13,color:"#713f12",marginBottom:16}}>Gemini API 키가 없습니다. 설정 메뉴에서 입력하세요.</div>}
      {error&&<div style={{padding:"10px 14px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,fontSize:13,color:"#b91c1c",marginBottom:16}}>{error}</div>}
      <button onClick={onAnalyze} disabled={analyzing||!currFile||!hasKey}
        style={{padding:"14px 44px",background:(analyzing||!currFile||!hasKey)?"#94a3b8":"linear-gradient(135deg,#1a3a6e,#2563eb)",color:"white",border:"none",borderRadius:10,fontSize:15,fontWeight:800,cursor:(analyzing||!currFile||!hasKey)?"not-allowed":"pointer",display:"flex",alignItems:"center"}}>
        {analyzing?<><Spinner/><ElapsedTimer/></>:"분석 실행"}
      </button>
    </div>
  );
}
