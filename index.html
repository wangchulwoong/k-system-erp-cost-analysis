/* ═══════════════════════════════════════════════════
   상수 & 설정
═══════════════════════════════════════════════════ */
const DEFAULT_CREDS={id:"admin",pw:"halla2026"};
const MFG_KW=["부재료","노무비","시간외","외주가공","전력비","연료비","수도광열","소모품비","수선","보험료(제)","임차료(제)","감가상각비(제)","잡비(제)","제조간접"];
const SGA_KW=["급여","상여","퇴직급여","복리후생","여비교통","통신비","수도광열비","세금과공과","임차료(판)","감가상각비(판)","보험료(판)","광고선전","접대비","기부금","판매수수료","운반비","도서인쇄","소모품비(판)","잡비(판)","잡급","수수료","지급수수료"];
const EXCLUDE_KW=["레미콘 제품원가","제조원가","재료비","도급비","급료","임금","제품원가","상품원가","타계정으로대체"];
const EXCLUDE_LABEL=["레미콘 제품원가","제조원가","재료비","도급비","급료","임금","제품원가","상품원가","타계정으로대체액"];
const ANOMALY=5000000;

/* ═══════════════════════════════════════════════════
   헬퍼 함수
═══════════════════════════════════════════════════ */
const normAcc=acc=>{const s=String(acc||""),i=s.indexOf("_");return i>0?s.slice(0,i).trim():s.trim();};
const classify=acc=>{
  const s=String(acc||"");
  // (제) 포함 여부로 1차 판단
  if(s.includes("(제)"))return"제조경비";
  // MFG 키워드 2차
  const n=normAcc(s);
  if(MFG_KW.some(k=>n.includes(k)))return"제조경비";
  if(SGA_KW.some(k=>n.includes(k)))return"판관비";
  return"판관비"; // 기타 → 판관비로 통합
};
const isHQ=unit=>["본사","HQ","관리부"].some(k=>String(unit).includes(k));
const fmt=n=>(n==null||isNaN(n))?"-":Math.round(n).toLocaleString("ko-KR");
const fmtS=n=>{
  if(!n&&n!==0)return"-";
  const a=Math.abs(n);
  if(a>=100000000)return(n/100000000).toFixed(2)+"억";
  if(a>=10000000)return(n/10000000).toFixed(1)+"천만";
  if(a>=10000)return Math.round(n/10000)+"만";
  return Math.round(n).toLocaleString()+"원";
};
const dColor=d=>d>0?"#dc2626":d<0?"#16a34a":"#94a3b8";
const dLabel=d=>(d>0?"+":"")+fmt(d);
const pctStr=(c,p)=>{if(!p||p===0)return c>0?"신규":"-";const v=(c-p)/Math.abs(p)*100;return(v>0?"▲":"▼")+Math.abs(v).toFixed(1)+"%";};
const pctColor=(c,p)=>!p?"#94a3b8":c>p?"#dc2626":c<p?"#16a34a":"#94a3b8";
const mLabel=m=>m&&m.length>=6?`${m.slice(0,4)}년 ${parseInt(m.slice(4,6))}월`:(m||"");

/* ═══════════════════════════════════════════════════
   localStorage
═══════════════════════════════════════════════════ */
const lsGet=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const lsList=p=>{try{return Object.keys(localStorage).filter(k=>k.startsWith(p));}catch{return[];}};
const lsDel=k=>{try{localStorage.removeItem(k);}catch{}};

/* ═══════════════════════════════════════════════════
   ERP 파싱
═══════════════════════════════════════════════════ */
function parseDate(v){
  if(!v&&v!==0)return"";
  if(typeof v==="number"){try{const d=XLSX.SSF.parse_date_code(v);if(d)return""+d.y+(d.m<10?"0":"")+d.m;}catch{}}
  const s=String(v).replace(/\D/g,"");return s.length>=6?s.slice(0,6):"";
}

function parseERP(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  const recs=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const month=parseDate(r[1]);
    const unit=String(r[3]||"").trim();
    const acc=String(r[16]||"").trim();
    const amt=typeof r[17]==="number"?r[17]:parseFloat(String(r[17]).replace(/,/g,""))||0;
    const memo=String(r[21]||"").trim();
    const dept=String(r[27]||"").trim();   // AB열: 예산부서
    const mgmt=String(r[38]||"").trim();   // AM열: 관리항목3
    if(!unit||!acc||amt===0)continue;
    if(EXCLUDE_KW.some(k=>acc.includes(k)))continue;
    recs.push({month,unit,acc,amt,memo,dept,mgmt});
  }
  return recs;
}

function aggregate(recs){
  const res={};
  recs.forEach(r=>{
    if(!r.month)return;
    const na=normAcc(r.acc);
    if(!res[r.month])res[r.month]={};
    if(!res[r.month][r.unit])res[r.month][r.unit]={};
    if(!res[r.month][r.unit][na])res[r.month][r.unit][na]={amt:0,memoMap:{},cat:classify(r.acc)};
    const entry=res[r.month][r.unit][na];
    entry.amt+=r.amt;
    if(r.memo)entry.memoMap[r.memo]=(entry.memoMap[r.memo]||0)+r.amt;
  });
  Object.values(res).forEach(mo=>Object.values(mo).forEach(un=>Object.values(un).forEach(entry=>{
    entry.memos=Object.entries(entry.memoMap)
      .map(([text,amt])=>({text,amt}))
      .sort((a,b)=>b.amt-a.amt);
    delete entry.memoMap;
  })));
  return res;
}

function buildCompare(cA,pA){
  const allU=new Set([...Object.keys(cA),...Object.keys(pA)]);
  const units=[],totals={curr:{mfg:0,sga:0,etc:0},prev:{mfg:0,sga:0,etc:0}};
  allU.forEach(unit=>{
    const ca=cA[unit]||{},pa=pA[unit]||{};
    const allAccs=new Set([...Object.keys(ca),...Object.keys(pa)]);
    const accs=[],ut={curr:{mfg:0,sga:0,etc:0},prev:{mfg:0,sga:0,etc:0}};
    allAccs.forEach(acc=>{
      const c=ca[acc]?.amt||0,p=pa[acc]?.amt||0;
      const cat=ca[acc]?.cat||pa[acc]?.cat||classify(acc);
      const memos=ca[acc]?.memos||pa[acc]?.memos||[];
      accs.push({acc,cat,c,p,diff:c-p,memos});
      const k=cat==="제조경비"?"mfg":cat==="판관비"?"sga":"etc";
      ut.curr[k]+=c;ut.prev[k]+=p;
    });
    // 증감액 절대값 내림차순
    accs.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
    ["mfg","sga","etc"].forEach(k=>{totals.curr[k]+=ut.curr[k];totals.prev[k]+=ut.prev[k];});
    const tc=ut.curr.mfg+ut.curr.sga+ut.curr.etc;
    const tp=ut.prev.mfg+ut.prev.sga+ut.prev.etc;
    units.push({unit,accs,curr:ut.curr,prev:ut.prev,totalCurr:tc,totalPrev:tp});
  });
  // 증감액 절대값 내림차순
  units.sort((a,b)=>Math.abs(b.totalCurr-b.totalPrev)-Math.abs(a.totalCurr-a.totalPrev));
  return{units,totals};
}

/* ═══════════════════════════════════════════════════
   Gemini API (폴백 + 재시도)
═══════════════════════════════════════════════════ */
async function callGemini(prompt,apiKey,isShort=false){
  // 과부하 시 짧은 프롬프트로 재시도
  const SHORT_PROMPT=prompt.slice(0,2000)+"\n\n(데이터 축약본) 위 데이터만으로 간략히 분석해주세요.\n"+
    prompt.slice(prompt.indexOf("응답 JSON:"));

  const MODELS=["gemini-2.0-flash","gemini-2.5-flash","gemini-2.0-flash-lite"];
  const WAITS=[5000,10000,20000,30000,45000,60000];
  const isOverload=msg=>["high demand","overloaded","unavailable","503","quota","rate","limit","capacity"].some(k=>String(msg).toLowerCase().includes(k));

  for(let mi=0;mi<MODELS.length;mi++){
    const usePrompt=isShort||mi>0?SHORT_PROMPT:prompt;
    for(let at=0;at<6;at++){
      try{
        const res=await fetch(
          "https://generativelanguage.googleapis.com/v1beta/models/"+MODELS[mi]+":generateContent?key="+apiKey,
          {method:"POST",headers:{"Content-Type":"application/json"},
           body:JSON.stringify({
             contents:[{parts:[{text:usePrompt}]}],
             generationConfig:{maxOutputTokens:2048}
           })}
        );
        const d=await res.json();
        const errMsg=d.error?.message||((!res.ok)?("HTTP "+res.status):"");
        if(errMsg){
          if(isOverload(errMsg)){
            if(at<5){
              const wait=WAITS[at];
              console.log("과부하 대기: "+wait+"ms, model:"+MODELS[mi]+", 시도:"+(at+1));
              await new Promise(r=>setTimeout(r,wait));
              continue;
            }else{break;}
          }
          throw new Error(errMsg);
        }
        return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
      }catch(err){
        if(isOverload(err.message)){
          if(at<5){await new Promise(r=>setTimeout(r,WAITS[at]));continue;}
          else{break;}
        }
        throw err;
      }
    }
  }
  // 모든 모델 실패 시 짧은 프롬프트로 한 번 더
  if(!isShort)return callGemini(prompt,apiKey,true);
  throw new Error("Gemini 서버 과부하 지속 중. 5분 후 다시 시도해주세요. (오류코드: OVERLOAD)");
}

async function runAnalysis(compare,currentMonth,prevMonth,apiKey){
  const{units,totals}=compare;
  const tc=totals.curr,tp=totals.prev;
  let p="당신은 레미콘·골재 제조업 원가 및 경영분석 전문가입니다.\n";
  p+=mLabel(prevMonth||"")+" 대비 "+mLabel(currentMonth)+" 비용 전표 데이터를 분석합니다.\n\n";
  p+="[분석 지침]\n";
  p+="1. overallComment는 반드시 아래 3개 단락을 \\n\\n으로 구분하여 작성하세요.\n";
  p+="   1단락: 전체 수치 요약 (총액·제조경비·판관비 증감액·증감률 명시)\n";
  p+="   2단락: 주요 증가 원인 (단위명·계정과목·금액 명시, 구조적/일회성 구분)\n";
  p+="   3단락: 감소 요인 및 관리 포인트\n";
  p+="2. keyInsights: [단위명] [계정과목] [금액] — [원인] ([구조적/일회성]) 형식으로 3개\n";
  p+="3. warnings: 급등·급락 이상 징후 항목 (단위명·계정과목·금액 명시)\n";
  p+="4. unitComments summary는 \\n\\n으로 단락 구분 가능\n";
  p+="5. 문체: ~함, ~임, ~증가함, ~감소함 (경어체 금지)\n";
  p+="6. JSON만 응답 (마크다운 없이)\n\n";
  p+="[전체 비용 변동]\n";
  p+="제조경비: "+fmt(tp.mfg)+"원 → "+fmt(tc.mfg)+"원 ("+dLabel(tc.mfg-tp.mfg)+"원, "+pctStr(tc.mfg,tp.mfg)+")\n";
  p+="판관비: "+fmt(tp.sga)+"원 → "+fmt(tc.sga)+"원 ("+dLabel(tc.sga-tp.sga)+"원, "+pctStr(tc.sga,tp.sga)+")\n";
  p+="합계: "+fmt(tp.mfg+tp.sga+tp.etc)+"원 → "+fmt(tc.mfg+tc.sga+tc.etc)+"원\n\n";
  units.forEach(u=>{
    const changes=u.accs.filter(a=>Math.abs(a.diff)>=100000);
    if(!changes.length)return;
    p+="▶ "+u.unit+" (당월: "+fmt(u.totalCurr)+"원, 증감: "+dLabel(u.totalCurr-u.totalPrev)+"원)\n";
    changes.slice(0,8).forEach(a=>{
      p+="  • "+a.acc+"("+a.cat+"): "+fmt(a.p)+"→"+fmt(a.c)+" ("+dLabel(a.diff)+"원)\n";
      if(a.memos.length)p+="    [적요] "+a.memos.slice(0,4).map(m=>m.text+"("+fmtS(m.amt)+")").join(" / ")+"\n";
    });
    p+="\n";
  });
  p+=`응답 JSON:
{"overallComment":"1단락\\n\\n2단락\\n\\n3단락",
"keyInsights":["[단위명] [계정과목] [금액] — [원인] ([구조적/일회성])","동일","동일"],
"warnings":["[단위명] [계정과목]: [이상 내용]","동일"],
"unitComments":{"전표관리단위명":{"summary":"당월 합계 [금액], 전월 대비 [증감](증감률). 주요 원인.","details":["[계정과목] [금액변동]: [원인]","동일","동일"]}}}`;
  const text=await callGemini(p,apiKey);
  // JSON 블록 추출 - 다양한 패턴 처리
  let clean=text
    .replace(/```json\n?/gi,"").replace(/```\n?/g,"")
    .replace(/^[^{]*/,"")   // { 이전 불필요 텍스트 제거
    .replace(/}[^}]*$/,"}")  // } 이후 불필요 텍스트 제거
    .trim();
  // 중괄호 매칭으로 JSON 추출
  const jsonStart=text.indexOf("{");
  const jsonEnd=text.lastIndexOf("}");
  if(jsonStart>=0&&jsonEnd>jsonStart){
    clean=text.slice(jsonStart,jsonEnd+1);
  }
  try{return JSON.parse(clean);}
  catch{
    // 파싱 실패 시 overallComment에 원문 텍스트 넣어서 표시
    return{overallComment:text.replace(/```json?/g,"").replace(/```/g,"").trim(),keyInsights:[],warnings:[],unitComments:{}};
  }
}

  XLSX.utils.book_append_sheet(wb,ws4,"분석코멘트");

  XLSX.writeFile(wb,"비용실적분석_"+currentMonth+"_"+new Date().toISOString().slice(0,10)+".xlsx");
}

/* SVG 바 차트 (억원 단위) */
function SvgBar({data}){
  if(!data||!data.length)return <p style={{color:"#94a3b8",fontSize:13,padding:12}}>데이터 없음</p>;
  const LABEL=120, VALTXT=52, BH=17, GAP=5;
  const maxV=Math.max(...data.flatMap(d=>[d.prev,d.curr]),1);
  // 바 영역은 나머지: viewBox 폭을 고정 560으로, 바 가용폭 계산
  const TOTAL=560;
  const BAR=TOTAL-LABEL-VALTXT-4;
  const H=data.length*(BH*2+GAP+10)+20;
  return(
    <div style={{overflowX:"auto"}}>
      <svg viewBox={"0 0 "+TOTAL+" "+H} width="100%" style={{display:"block",minWidth:300}}>
        {data.map((d,i)=>{
          const y=16+i*(BH*2+GAP+10);
          const pw=Math.max(Math.round(d.prev/maxV*BAR),1);
          const cw=Math.max(Math.round(d.curr/maxV*BAR),1);
          const up=d.curr>=d.prev;
          return(
            <g key={i}>
              <text x={LABEL-4} y={y+BH-4} fontSize={11} fill="#475569" textAnchor="end">{d.name}</text>
              <rect x={LABEL} y={y} width={pw} height={BH-2} fill="#cbd5e1" rx="2"/>
              <text x={LABEL+BAR+4} y={y+BH-4} fontSize={10} fill="#94a3b8" textAnchor="start">{fmtS(d.prev)}</text>
              <rect x={LABEL} y={y+BH} width={cw} height={BH-2} fill={up?"#ef4444":"#22c55e"} rx="2"/>
              <text x={LABEL+BAR+4} y={y+BH*2-4} fontSize={10} fill={up?"#dc2626":"#16a34a"} fontWeight="600" textAnchor="start">{fmtS(d.curr)}</text>
            </g>
          );
        })}
      </svg>
      <div style={{display:"flex",gap:16,fontSize:11,color:"#64748b",marginTop:4,paddingLeft:120}}>
        <span><span style={{display:"inline-block",width:12,height:8,background:"#cbd5e1",borderRadius:2,marginRight:3}}></span>전월</span>
        <span><span style={{display:"inline-block",width:12,height:8,background:"#ef4444",borderRadius:2,marginRight:3}}></span>증가</span>
        <span><span style={{display:"inline-block",width:12,height:8,background:"#22c55e",borderRadius:2,marginRight:3}}></span>감소</span>
      </div>
    </div>
  );
}

// 사업장 고정 순서
const SITE_ORDER=["파주","양주","용인","화성","당진","송악","천안","원주","여주","이천","음성","충주","울산","온산","담양","평택","골재_충청","골재_호남","골재_영남","골재_곡성","골재_해미","골재_북부"];
// CM사업부 포함 본사 판별
const SITE_ORDER_SET=new Set(SITE_ORDER);
const isHQUnit=unit=>!SITE_ORDER_SET.has(unit)&&!SITE_ORDER.some(s=>unit.startsWith(s));

/* 세로막대 차트 (사업소 가로 나열) */
function VBarChart({data,title}){
  if(!data||!data.length)return null;
  const CHART_H=140, LABEL_H=36, TOP_PAD=8, BAR_W=22, GAP=6, VAL_PAD=14;
  const COL_W=BAR_W*2+GAP+8;
  const maxV=Math.max(...data.flatMap(d=>[d.prev,d.curr]),1);
  const W=data.length*COL_W+VAL_PAD*2;
  const H=CHART_H+LABEL_H+TOP_PAD+16;
  return(
    <div>
      {title&&<div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6}}>{title}</div>}
      <div style={{overflowX:"auto"}}>
        <svg viewBox={"0 0 "+W+" "+H} style={{display:"block",minWidth:200,width:"100%"}}>
          {/* 배경 그리드 */}
          {[0.25,0.5,0.75,1].map(pct=>{
            const y=TOP_PAD+(1-pct)*CHART_H;
            return <line key={pct} x1={0} y1={y} x2={W} y2={y} stroke="#f1f5f9" strokeWidth="1"/>;
          })}
          {data.map((d,i)=>{
            const x=VAL_PAD+i*COL_W;
            const ph=Math.max(Math.round(d.prev/maxV*CHART_H),1);
            const ch=Math.max(Math.round(d.curr/maxV*CHART_H),1);
            const up=d.curr>=d.prev;
            const py=TOP_PAD+CHART_H-ph;
            const cy=TOP_PAD+CHART_H-ch;
            return(
              <g key={i}>
                {/* 전월 바 */}
                <rect x={x} y={py} width={BAR_W} height={ph} fill="#e2e8f0" rx="2"/>
                {/* 당월 바 */}
                <rect x={x+BAR_W+GAP} y={cy} width={BAR_W} height={ch} fill={up?"#ef4444":"#22c55e"} rx="2"/>
                {/* 당월 값 */}
                <text x={x+BAR_W+GAP+BAR_W/2} y={cy-3} fontSize={8} fill={up?"#dc2626":"#16a34a"} textAnchor="middle" fontWeight="600">
                  {fmtS(d.curr)}
                </text>
                {/* 라벨 */}
                <text x={x+BAR_W+GAP/2} y={TOP_PAD+CHART_H+LABEL_H-4} fontSize={9} fill="#475569" textAnchor="middle">
                  {d.name.length>5?d.name.slice(0,5)+"…":d.name}
                </text>
              </g>
            );
          })}
        </svg>
      </div>
      <div style={{display:"flex",gap:14,fontSize:11,color:"#64748b",marginTop:4}}>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#e2e8f0",borderRadius:2,marginRight:3}}></span>전월</span>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#ef4444",borderRadius:2,marginRight:3}}></span>증가</span>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#22c55e",borderRadius:2,marginRight:3}}></span>감소</span>
      </div>
    </div>
  );
}

function CostChart({units}){
  const toAmt=u=>u.curr.mfg+u.curr.sga+u.curr.etc;
  const toPrev=u=>u.prev.mfg+u.prev.sga+u.prev.etc;
  // 사업장 고정 순서, 본사(HQ)는 맨 뒤에 금액순 추가
  const siteData=SITE_ORDER.map(name=>{
    const u=units.find(u=>u.unit===name);
    return u?{name:name.length>6?name.slice(0,6)+"…":name,prev:toPrev(u),curr:toAmt(u)}:null;
  }).filter(Boolean);
  const hqUnits=units.filter(u=>isHQUnit(u.unit)).sort((a,b)=>toAmt(b)-toAmt(a));
  const hqData=hqUnits.map(u=>({name:u.unit.length>6?u.unit.slice(0,6)+"…":u.unit,prev:toPrev(u),curr:toAmt(u),isHQ:true}));
  const allData=[...siteData,...hqData];
  return <VBarChart data={allData}/>;
}

/* 전체요약 테이블 */
function SummaryTable({totals,currentMonth,prevMonth,units}){
  const rows=[
    {label:"제조경비",c:totals.curr.mfg,p:totals.prev.mfg,color:"#1e40af",bg:"#eff6ff"},
    {label:"판관비",  c:totals.curr.sga,p:totals.prev.sga,color:"#7c3aed",bg:"#f5f3ff"},
    {label:"기타",    c:totals.curr.etc,p:totals.prev.etc,color:"#4b5563",bg:"#f9fafb"},
  ];
  const gc=rows.reduce((s,r)=>s+r.c,0),gp=rows.reduce((s,r)=>s+r.p,0);
  const th={padding:"9px 12px",background:"#0f2040",color:"white",fontSize:12,fontWeight:700,textAlign:"right"};
  /* 주요 증가/감소 TOP3 */
  const allFlat2=[];units?.forEach(u=>u.accs.forEach(a=>allFlat2.push({...a,unit:u.unit})));
  allFlat2.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  const top3Up=allFlat2.filter(a=>a.diff>0).slice(0,3);
  const top3Dn=allFlat2.filter(a=>a.diff<0).slice(0,3);
  const top3=units?units.slice(0,3):[];
  const top3pct=gc>0?(top3.reduce((s,u)=>s+u.totalCurr,0)/gc*100).toFixed(1):0;
  return(
    <div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,marginBottom:12}}>
        <thead>
          <tr>
            <th style={{...th,textAlign:"left",paddingLeft:16}}>구분</th>
            <th style={th}>{prevMonth?mLabel(prevMonth):"전월"}</th>
            <th style={th}>{mLabel(currentMonth)}</th>
            <th style={th}>증감액</th>
            <th style={th}>증감률</th>
            <th style={th}>비중</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r,i)=>{
            const d=r.c-r.p,share=gc>0?(r.c/gc*100).toFixed(1):0;
            return(
              <tr key={i} style={{background:r.bg}}>
                <td style={{padding:"10px 12px",paddingLeft:16,fontWeight:700,color:r.color}}>{r.label}</td>
                <td style={{padding:"10px 12px",textAlign:"right",color:"#64748b"}}>{fmt(r.p)}</td>
                <td style={{padding:"10px 12px",textAlign:"right",fontWeight:600}}>{fmt(r.c)}</td>
                <td style={{padding:"10px 12px",textAlign:"right",color:dColor(d),fontWeight:700}}>{dLabel(d)}</td>
                <td style={{padding:"10px 12px",textAlign:"right",color:pctColor(r.c,r.p)}}>{pctStr(r.c,r.p)}</td>
                <td style={{padding:"10px 12px",textAlign:"right",color:"#475569"}}>{share}%</td>
              </tr>
            );
          })}
          <tr style={{background:"#0f2040"}}>
            <td style={{padding:"10px 12px",paddingLeft:16,fontWeight:800,color:"white"}}>합 계</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:"rgba(255,255,255,0.7)"}}>{fmt(gp)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",fontWeight:800,color:"white"}}>{fmt(gc)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:dColor(gc-gp),fontWeight:800}}>{dLabel(gc-gp)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:pctColor(gc,gp),fontWeight:700}}>{pctStr(gc,gp)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:"rgba(255,255,255,0.6)"}}>100%</td>
          </tr>
        </tbody>
      </table>
      {/* 비용 집중도 */}
      {top3.length>0&&(
        <div style={{padding:"8px 14px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0",fontSize:12,color:"#475569",marginBottom:12}}>
          <b style={{color:"#1e293b"}}>비용 집중도</b>
          {" — 상위 3개 단위("+top3.map(u=>u.unit).join(", ")+")가 전체 "}
          <b style={{color:"#1e40af"}}>{top3pct}%</b>{" 차지"}
        </div>
      )}
      {/* 증가/감소 TOP3 */}
      {(top3Up.length>0||top3Dn.length>0)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{background:"#fef2f2",borderRadius:8,padding:"10px 12px",border:"1px solid #fecaca"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#b91c1c",marginBottom:8}}>주요 증가 항목</div>
            {top3Up.map((a,i)=>(
              <div key={i} style={{fontSize:11,marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                <span style={{color:"#374151"}}>{a.unit} · {a.acc}</span>
                <span style={{color:"#dc2626",fontWeight:700,marginLeft:8}}>{dLabel(a.diff)}원</span>
              </div>
            ))}
          </div>
          <div style={{background:"#f0fdf4",borderRadius:8,padding:"10px 12px",border:"1px solid #bbf7d0"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#166534",marginBottom:8}}>주요 감소 항목</div>
            {top3Dn.map((a,i)=>(
              <div key={i} style={{fontSize:11,marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                <span style={{color:"#374151"}}>{a.unit} · {a.acc}</span>
                <span style={{color:"#16a34a",fontWeight:700,marginLeft:8}}>{dLabel(a.diff)}원</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   단위별 아코디언 (완전 개선판)
═══════════════════════════════════════════════════ */
function UnitAccordion({units,aiComments,prevMonth}){
  const [open,setOpen]=useState(null);
  const grand=units.reduce((s,u)=>s+u.totalCurr,0);
  const grandPrev=units.reduce((s,u)=>s+u.totalPrev,0);
  const totalDiff=grand-grandPrev;
  const totalAnom=units.reduce((s,u)=>s+u.accs.filter(a=>Math.abs(a.diff)>=ANOMALY).length,0);

  return(
    <div>
      {/* 전체 미니 KPI */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:18}}>
        {[
          {l:"분석 단위 수",v:units.length+"개",sub:"전표관리단위",c:"#1e40af"},
          {l:"당월 총비용",v:fmtS(grand),sub:prevMonth?mLabel(prevMonth)+" 대비":"전월 대비",c:"#0f2040"},
          {l:"총 증감액",v:dLabel(totalDiff)+"원",sub:pctStr(grand,grandPrev),c:totalDiff>0?"#dc2626":"#16a34a"},
          {l:"이상 항목",v:totalAnom+"건",sub:"500만원 이상 증감",c:totalAnom>0?"#b91c1c":"#16a34a"},
        ].map((k,i)=>(
          <div key={i} style={{background:"white",borderRadius:10,padding:"12px 16px",border:"1px solid #e2e8f0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",borderTop:"3px solid "+k.c}}>
            <div style={{fontSize:11,color:"#64748b",fontWeight:600,marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:17,fontWeight:800,color:k.c}}>{k.v}</div>
            <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {units.map((u,i)=>{
        const d=u.totalCurr-u.totalPrev, isOpen=open===i;
        const ai=aiComments?.unitComments?.[u.unit];
        const anomalies=u.accs.filter(a=>Math.abs(a.diff)>=ANOMALY);
        const share=grand>0?(u.totalCurr/grand*100).toFixed(1):0;
        const mR=u.totalCurr>0?(u.curr.mfg/u.totalCurr*100).toFixed(0):0;
        const sR=u.totalCurr>0?(u.curr.sga/u.totalCurr*100).toFixed(0):0;
        const topAcc=u.accs[0];
        const rankColors=["#d97706","#6b7280","#92400e"];

        return(
          <div key={i} style={{border:"1px solid #e2e8f0",borderRadius:12,marginBottom:8,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
            {/* 아코디언 헤더 */}
            <div onClick={()=>setOpen(isOpen?null:i)} style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer",background:isOpen?"#f0f9ff":"white",transition:"background 0.15s"}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:i<3?"linear-gradient(135deg,"+rankColors[i]+","+rankColors[i]+"88)":"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:i<3?"white":"#64748b",flexShrink:0}}>
                {i+1}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontWeight:800,fontSize:15,color:"#0f2040"}}>{u.unit}</span>
                  <span style={{fontSize:10,padding:"1px 7px",background:isHQ(u.unit)?"#ede9fe":"#dbeafe",color:isHQ(u.unit)?"#6d28d9":"#1d4ed8",borderRadius:4,fontWeight:600}}>{isHQ(u.unit)?"본사":"사업장"}</span>
                  {anomalies.length>0&&<span style={{fontSize:10,padding:"1px 7px",background:"#fef2f2",border:"1px solid #fca5a5",color:"#b91c1c",borderRadius:4,fontWeight:700}}>{"⚠ "+anomalies.length+"건"}</span>}
                </div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:4,display:"flex",gap:14,flexWrap:"wrap"}}>
                  <span>전체 비중 <b style={{color:"#1e40af"}}>{share}%</b></span>
                  <span>제조 {mR}% / 판관 {sR}%</span>
                  {topAcc&&Math.abs(topAcc.diff)>0&&(
                    <span>최대 증감 <b style={{color:topAcc.diff>0?"#dc2626":"#16a34a"}}>{topAcc.acc} {dLabel(topAcc.diff)}원</b></span>
                  )}
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,minWidth:120}}>
                <div style={{fontSize:17,fontWeight:800,color:dColor(d)}}>{dLabel(d)}원</div>
                <div style={{fontSize:11,color:pctColor(u.totalCurr,u.totalPrev),marginTop:1}}>{pctStr(u.totalCurr,u.totalPrev)}</div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>당월 {fmtS(u.totalCurr)}</div>
              </div>
              <span style={{color:"#94a3b8",fontSize:14,flexShrink:0,marginLeft:4}}>{isOpen?"▲":"▼"}</span>
            </div>

            {/* 펼침 내용 */}
            {isOpen&&(
              <div style={{background:"#f8fafc"}}>
                {/* 소계 카드 4개 */}
                <div style={{padding:"14px 18px 0",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                  {[
                    {l:"제조경비",c:u.curr.mfg,p:u.prev.mfg,cl:"#1e40af",bg:"#eff6ff",bd:"#bfdbfe"},
                    {l:"판관비",  c:u.curr.sga,p:u.prev.sga,cl:"#7c3aed",bg:"#f5f3ff",bd:"#ddd6fe"},
                    {l:"기타",   c:u.curr.etc,p:u.prev.etc,cl:"#4b5563",bg:"#f9fafb",bd:"#e2e8f0"},
                    {l:"합 계",  c:u.totalCurr,p:u.totalPrev,cl:"white",bg:"#0f2040",bd:"#0f2040"},
                  ].map((s,j)=>(
                    <div key={j} style={{padding:"12px 14px",background:s.bg,borderRadius:10,border:"1px solid "+s.bd}}>
                      <div style={{fontSize:11,color:j===3?"rgba(255,255,255,0.55)":"#64748b",fontWeight:600,marginBottom:4}}>{s.l}</div>
                      <div style={{fontSize:15,fontWeight:800,color:s.cl}}>{fmt(s.c)}</div>
                      <div style={{fontSize:11,marginTop:3}}>
                        <span style={{color:dColor(s.c-s.p),fontWeight:600}}>{dLabel(s.c-s.p)}</span>
                        <span style={{color:j===3?"rgba(255,255,255,0.35)":"#94a3b8",marginLeft:6}}>{pctStr(s.c,s.p)}</span>
                      </div>
                    </div>
                  ))}

/* ═══════════════════════════════════════════════════
   수선비 / 소모품비 공통 상세 분석 로직
═══════════════════════════════════════════════════ */
function buildItemData(recs, keyword, prevRecs){
  if(!recs||!recs.length)return null;
  const match=r=>normAcc(r.acc).includes(keyword)||r.acc.includes(keyword);
  const targets=recs.filter(match);
  if(!targets.length)return null;
  const months=[...new Set(targets.map(r=>r.month).filter(Boolean))].sort();
  const month=months[months.length-1];
  const monthRecs=targets.filter(r=>r.month===month);

  // 전월 집계
  const prevTargets=(prevRecs||[]).filter(match);
  const prevMonths=[...new Set(prevTargets.map(r=>r.month).filter(Boolean))].sort();
  const prevMonth=prevMonths[prevMonths.length-1]||null;
  const prevMonthRecs=prevMonth?prevTargets.filter(r=>r.month===prevMonth):[];
  const prevUnitMap={};
  prevMonthRecs.forEach(r=>{
    const u=r.unit||"미분류";
    prevUnitMap[u]=(prevUnitMap[u]||0)+r.amt;
  });
  const prevDeptMap={};
  prevMonthRecs.forEach(r=>{
    const d=r.dept||r.unit||"미분류";
    prevDeptMap[d]=(prevDeptMap[d]||0)+r.amt;
  });

  // 전표관리단위별 집계
  const unitMap={};
  monthRecs.forEach(r=>{
    const u=r.unit||"미분류";
    const cat=r.acc.includes("(제)")?"제조경비":"판관비";
    if(!unitMap[u])unitMap[u]={unit:u,hq:isHQUnit(u),제조경비:0,판관비:0,total:0,prev:prevUnitMap[u]||0,memoMap:{}};
    unitMap[u][cat]+=r.amt;
    unitMap[u].total+=r.amt;
    const key=r.memo||"(적요없음)";
    unitMap[u].memoMap[key]=(unitMap[u].memoMap[key]||0)+r.amt;
  });
  // 전월에만 있는 단위도 포함
  Object.keys(prevUnitMap).forEach(u=>{
    if(!unitMap[u])unitMap[u]={unit:u,hq:isHQUnit(u),제조경비:0,판관비:0,total:0,prev:prevUnitMap[u],memoMap:{}};
  });
  const units=Object.values(unitMap).map(u=>({
    ...u,
    diff:u.total-(u.prev||0),
    memos:Object.entries(u.memoMap).map(([text,amt])=>({text,amt})).sort((a,b)=>b.amt-a.amt)
  })).sort((a,b)=>b.total-a.total);

  // 예산부서별 집계 (소모품비 본사 세분화용)
  const deptMap={};
  monthRecs.forEach(r=>{
    const dept=r.dept||r.unit||"미분류";
    const cat=r.acc.includes("(제)")?"제조경비":"판관비";
    if(!deptMap[dept])deptMap[dept]={dept,unit:r.unit||dept,hq:isHQUnit(r.unit||dept),제조경비:0,판관비:0,total:0,prev:prevDeptMap[dept]||0,memoMap:{}};
    deptMap[dept][cat]+=r.amt;
    deptMap[dept].total+=r.amt;
    const key=r.memo||"(적요없음)";
    deptMap[dept].memoMap[key]=(deptMap[dept].memoMap[key]||0)+r.amt;
  });
  const depts=Object.values(deptMap).map(d=>({
    ...d,
    hq:isHQUnit(d.unit||"")||isHQDept(d.dept||""),
    diff:d.total-d.prev,
    memos:Object.entries(d.memoMap).map(([text,amt])=>({text,amt})).sort((a,b)=>b.amt-a.amt)
  })).sort((a,b)=>b.total-a.total);

  const grandTotal=units.reduce((s,u)=>s+u.total,0);
  const grandPrev=units.reduce((s,u)=>s+u.prev,0);
  const grandMfg=units.reduce((s,u)=>s+u.제조경비,0);
  const grandSga=units.reduce((s,u)=>s+u.판관비,0);
  return{month,prevMonth,units,depts,grandTotal,grandPrev,grandMfg,grandSga,keyword};
}

/* ═══════════════════════════════════════════════════
   사업활동비 분석 로직
═══════════════════════════════════════════════════ */
const ACTIVITY_ACCS = ["경상접대비","복리후생비_회식대"];
const MGMT_LABELS = {
  "법인카드":"법인카드","개인카드":"개인카드","경조사":"경조사",
  "계산서":"계산서","세금계산서":"세금계산서","영수증":"영수증","":"기타"
};
// 사업장 키워드: 해당 단어 포함시 사업장
const SITE_KW = ["이천","양주","여주","원주","충주","파주","당진","천안","화성","담양","음성","송악","온산","울산","용인"];
// 본사 강제 지정 (키워드에 걸려도 본사)
const HQ_FORCE = ["삼각","골재사업담당","골재사업팀","CM사업부","골재_충청","골재_호남","골재_영남","고문실","관리본부","대표이사","레미콘사업담당","사업본부","설비팀","안전보건팀"];
const SITE_FORCE = ["용인","이천","양주","여주","원주","충주","파주","당진","천안","화성","담양","음성","송악","온산","울산","골재_곡성","골재_해미"];
const isHQDept = dept => {
  if(SITE_FORCE.some(k=>dept===k||dept.startsWith(k)))return false;
  if(HQ_FORCE.some(k=>dept.includes(k)))return true;
  return !SITE_KW.some(k=>dept.includes(k));
};


function buildActivityData(recs){
  if(!recs||!recs.length)return null;
  // 대상 레코드 필터
  const targets=recs.filter(r=>ACTIVITY_ACCS.some(k=>r.acc.includes(k)));
  if(!targets.length)return null;

  const months=[...new Set(targets.map(r=>r.month).filter(Boolean))].sort();
  const month=months[months.length-1];
  const monthRecs=targets.filter(r=>r.month===month);

  // 예산부서별 집계
  const deptMap={};
  monthRecs.forEach(r=>{
    const dept=r.dept||"미분류";
    const mgmtRaw=r.mgmt||"";
    const mgmt=MGMT_LABELS[mgmtRaw]||"기타";
    const accType=r.acc.includes("복리후생비")?"회식대":"접대비";
    if(!deptMap[dept])deptMap[dept]={dept,hq:isHQDept(dept),접대비:0,회식대:0,total:0,mgmtBreak:{},details:[]};
    deptMap[dept][accType]+=r.amt;
    deptMap[dept].total+=r.amt;
    deptMap[dept].mgmtBreak[mgmt]=(deptMap[dept].mgmtBreak[mgmt]||0)+r.amt;
    deptMap[dept].details.push({acc:r.acc,amt:r.amt,mgmt,memo:r.memo});
  });

  const depts=Object.values(deptMap).sort((a,b)=>b.total-a.total);
  const hqDepts=depts.filter(d=>d.hq);
  const siteDepts=depts.filter(d=>!d.hq);

  // 전체 합계
  const grandTotal=depts.reduce((s,d)=>s+d.total,0);
  const grandJeob=depts.reduce((s,d)=>s+d.접대비,0);
  const grandFed=depts.reduce((s,d)=>s+d.회식대,0);

  // 관리항목 전체 집계
  const allMgmt={};
  monthRecs.forEach(r=>{
    const mgmt=MGMT_LABELS[r.mgmt||""]||"기타";
    allMgmt[mgmt]=(allMgmt[mgmt]||0)+r.amt;
  });

  return{month,depts,hqDepts,siteDepts,grandTotal,grandJeob,grandFed,allMgmt,totalRecs:monthRecs.length};
}

function CommentTab({aiComments}){

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {Object.entries(aiComments.unitComments||{}).map(([unit,cm],i)=>(

          <div style={{fontSize:13,color:"#374151",marginBottom:10,fontWeight:500}}>

          {cm.details?.length>0&&(
            <div style={{display:"flex",flexDirection:"column",gap:5,borderTop:"1px solid #e2e8f0",paddingTop:10}}>
              {cm.details.map((detail,j)=>(
                <div key={j} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:12,color:"#4b5563",lineHeight:1.65}}>
                  <span style={{flexShrink:0,width:17,height:17,background:"#dbeafe",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#1d4ed8",marginTop:1}}>{j+1}</span>
                  <span>{detail}</span>
                </div>
              ))}
            </div>
          )}

      ))}
    </div>

/* ═══════════════════════════════════════════════════
   분석결과 탭
═══════════════════════════════════════════════════ */
function ResultsTab({result,onExport}){
  const{comparison,aiComments,currentMonth,prevMonth}=result;
  const [tab,setTab]=useState("overview");
  const TABS=[["overview","전체요약"],["units","단위별분석"],["top","TOP 증감"],["ai","분석코멘트"]];
  return(
    <div style={{maxWidth:1120}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",margin:0}}>분석 결과</h2>
          <p style={{fontSize:13,color:"#64748b",margin:"4px 0 0"}}>{prevMonth?mLabel(prevMonth):"전월"}{" → "}{mLabel(currentMonth)}{" 비용 증감 분석"}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onExport} style={{padding:"10px 22px",background:"#166534",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>Excel 내보내기 (A3·전문가형)</button>
          <button onClick={()=>window.print()} style={{padding:"10px 18px",background:"#1e40af",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>PDF 출력</button>
        </div>
      </div>

      {/* 비용 증감 요약 박스 */}
      {aiComments?.overallComment&&(
        <div style={{background:"white",borderRadius:12,padding:"20px 24px",marginBottom:18,border:"1px solid #e2e8f0",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",marginBottom:14,letterSpacing:"1.5px"}}>비용 증감 요약</div>

          {/* ── 미니 시각화 ── */}
          {comparison&&(()=>{
            const tc=comparison.totals.curr, tp=comparison.totals.prev;
            const gc=tc.mfg+tc.sga+tc.etc, gp=tp.mfg+tp.sga+tp.etc;
            const items=[
              {l:"제조경비",c:tc.mfg,p:tp.mfg,color:"#2563eb"},
              {l:"판관비",  c:tc.sga,p:tp.sga,color:"#7c3aed"},
              {l:"기타",    c:tc.etc,p:tp.etc,color:"#059669"},
            ];
            const maxVal=Math.max(...items.flatMap(x=>[x.c,x.p]),1);
            const dTotal=gc-gp;
            return(
              <div style={{marginBottom:18}}>
                {/* 합계 KPI 행 */}
                <div style={{display:"flex",alignItems:"center",gap:24,padding:"14px 16px",background:"#f8fafc",borderRadius:10,marginBottom:14,border:"1px solid #f1f5f9"}}>
                  <div>
                    <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3}}>당월 총비용</div>
                    <div style={{fontSize:22,fontWeight:800,color:"#0f2040",letterSpacing:"-0.5px"}}>{fmtS(gc)}</div>
                  </div>
                  <div style={{width:1,height:40,background:"#e2e8f0"}}></div>
                  <div>
                    <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3}}>전월 대비</div>
                    <div style={{fontSize:18,fontWeight:800,color:dTotal>0?"#dc2626":"#16a34a"}}>
                      {dTotal>0?"+":""}{fmtS(dTotal)}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3}}>증감률</div>
                    <div style={{fontSize:18,fontWeight:800,color:dTotal>0?"#dc2626":"#16a34a"}}>{pctStr(gc,gp)}</div>
                  </div>
                  <div style={{marginLeft:"auto",fontSize:12,color:"#94a3b8"}}>전월 {fmtS(gp)}</div>
                </div>
                {/* 구분별 바 */}
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {items.map((item,ii)=>{
                    const d=item.c-item.p;
                    const cW=Math.round(item.c/maxVal*100);
                    const pW=Math.round(item.p/maxVal*100);
                    return(
                      <div key={ii}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",fontSize:12,marginBottom:5}}>
                          <span style={{fontWeight:600,color:"#374151"}}>{item.l}</span>
                          <span style={{color:"#64748b"}}>
                            <span style={{marginRight:12,color:"#94a3b8"}}>전월 {fmtS(item.p)}</span>
                            <span style={{fontWeight:700,color:"#1e293b"}}>당월 {fmtS(item.c)}</span>
                            <span style={{marginLeft:10,fontWeight:700,color:d>0?"#dc2626":"#16a34a"}}>{d>0?"+":""}{fmtS(d)}</span>
                          </span>
                        </div>
                        <div style={{position:"relative",height:10,background:"#f1f5f9",borderRadius:5,overflow:"hidden"}}>
                          <div style={{position:"absolute",left:0,top:0,height:"100%",width:pW+"%",background:"#e2e8f0",borderRadius:5}}></div>
                          <div style={{position:"absolute",left:0,top:0,height:"100%",width:cW+"%",background:item.color,borderRadius:5,opacity:0.85}}></div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* ── 수치 요약 텍스트 (박스 없이) ── */}
          {(()=>{
            const paras=aiComments.overallComment.split("\n\n").filter(p=>p.trim());
            const p0=paras[0]||"";
            // 수치·금액 하이라이트: 숫자+원, % 패턴 강조
            const highlight=txt=>txt.split(/(\d[\d,\.]*(?:억|천만|만|원|%|bp))/g).map((seg,si)=>
              /^\d[\d,\.]*/.test(seg)
                ? <b key={si} style={{color:"#0f2040",fontWeight:700}}>{seg}</b>
                : seg
            );
            return(
              <div style={{borderTop:"1px solid #f1f5f9",paddingTop:14}}>
                <p style={{fontSize:13,lineHeight:1.9,color:"#374151",margin:0}}>{highlight(p0)}</p>
              </div>
            );
          })()}

          {/* ── 증가 요소 / 감소 요소 좌우 배치 ── */}
          {(()=>{
            const paras=aiComments.overallComment.split("\n\n").filter(p=>p.trim());
            const upPara=paras[1]||"";
            const dnPara=paras[2]||"";
            const hasUp=upPara.length>0, hasDn=dnPara.length>0;
            if(!hasUp&&!hasDn&&!(aiComments.keyInsights?.length>0)&&!(aiComments.warnings?.length>0))return null;
            return(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12}}>
                {/* 증가 요소 */}
                <div style={{background:"#fafafa",borderRadius:8,padding:"12px 14px",border:"1px solid #e5e7eb"}}>
                  <div style={{fontSize:11,fontWeight:800,color:"#dc2626",marginBottom:10,display:"flex",alignItems:"center",gap:5}}>
                    <span style={{display:"inline-block",width:8,height:8,background:"#dc2626",borderRadius:"50%"}}></span>
                    증가 요소
                  </div>
                  {upPara&&<p style={{fontSize:12,lineHeight:1.8,color:"#374151",margin:"0 0 10px"}}>{upPara.trim()}</p>}
                  {aiComments.keyInsights?.length>0&&(
                    <div style={{borderTop:upPara?"1px solid #e5e7eb":"none",paddingTop:upPara?8:0,display:"flex",flexDirection:"column",gap:5}}>
                      {aiComments.keyInsights.map((k,i)=>(
                        <div key={i} style={{fontSize:11,display:"flex",alignItems:"flex-start",gap:6}}>
                          <span style={{flexShrink:0,width:16,height:16,background:"#fee2e2",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#dc2626",marginTop:1}}>{i+1}</span>
                          <span style={{lineHeight:1.65,color:"#4b5563"}}>{k}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                {/* 감소 요소 + 주의 */}
                <div style={{background:"#fafafa",borderRadius:8,padding:"12px 14px",border:"1px solid #e5e7eb"}}>
                  <div style={{fontSize:11,fontWeight:800,color:"#16a34a",marginBottom:10,display:"flex",alignItems:"center",gap:5}}>
                    <span style={{display:"inline-block",width:8,height:8,background:"#16a34a",borderRadius:"50%"}}></span>
                    감소 요소 및 관리 포인트
                  </div>
                  {dnPara&&<p style={{fontSize:12,lineHeight:1.8,color:"#374151",margin:"0 0 10px"}}>{dnPara.trim()}</p>}
                  {aiComments.warnings?.length>0&&(
                    <div style={{borderTop:dnPara?"1px solid #e5e7eb":"none",paddingTop:dnPara?8:0,display:"flex",flexDirection:"column",gap:5}}>
                      {aiComments.warnings.map((w,i)=>(
                        <div key={i} style={{fontSize:11,display:"flex",alignItems:"flex-start",gap:6,color:"#b91c1c"}}>
                          <span style={{flexShrink:0,marginTop:2}}>⚠</span>
                          <span style={{lineHeight:1.65}}>{w}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })()}
        </div>
      )}
      {/* 서브탭 */}
      <div style={{display:"flex",gap:6,marginBottom:20}}>
        {TABS.map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{
            padding:"9px 20px",
            background:tab===id?"#0f2040":"white",
            border:"1.5px solid "+(tab===id?"#0f2040":"#e2e8f0"),
            borderRadius:8,
            color:tab===id?"white":"#64748b",
            fontWeight:tab===id?700:500,
            fontSize:13,
            cursor:"pointer",
            transition:"all 0.18s",
            boxShadow:tab===id?"0 2px 8px rgba(15,32,64,0.18)":"none",
            letterSpacing:tab===id?"0.2px":"0"
          }}>{label}</button>
        ))}
      </div>

      {tab==="overview"&&(
        <div>
          <Card title="비용 구분별 요약" accent="#1d4ed8" mb={14}>
            <SummaryTable totals={comparison.totals} currentMonth={currentMonth} prevMonth={prevMonth} units={comparison.units}/>
          </Card>
          <Card title="단위별 당월 비용 (억원 단위)" accent="#1d4ed8" mb={14}>
            <CostChart units={comparison.units}/>
          </Card>
          <div style={{padding:"8px 14px",background:"#fffbeb",borderRadius:8,border:"1px solid #fde047",fontSize:11,color:"#92400e"}}>
            <b>분석 제외 계정과목:</b>{" "+EXCLUDE_LABEL.join(", ")+" — 이중계상 방지 및 집계 대분류 항목으로 제외됨."}
          </div>
        </div>
      )}
      {tab==="units"&&<Card title="전표관리단위별 상세 분석 (증감액 순)"><UnitAccordion units={comparison.units} aiComments={aiComments} prevMonth={prevMonth}/></Card>}
      {tab==="top"&&<Card title="주요 증감 TOP 15 (증감액 기준)"><TopChanges units={comparison.units}/></Card>}
      {tab==="ai"&&<CommentTab aiComments={aiComments}/>}
    </div>
  );
}

/* 히스토리 탭 */

    <div style={{textAlign:"center",padding:"80px 20px",color:"#94a3b8"}}>
      <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>저장된 히스토리가 없습니다</p>

      <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>과거 분석 결과를 확인하고 전월 기준으로 활용하세요</p>

          const tot=h.comparison?.totals;
          const gc=tot?tot.curr.mfg+tot.curr.sga+tot.curr.etc:0;

            <div key={i} style={{background:"white",borderRadius:10,padding:"16px 20px",boxShadow:"0 1px 4px rgba(0,0,0,0.07)",display:"flex",alignItems:"center",gap:14,border:"1px solid #e2e8f0"}}>
              <div style={{width:44,height:44,background:"linear-gradient(135deg,#1a3a6e,#2563eb)",borderRadius:10,flexShrink:0}}></div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:800,color:"#1e293b"}}>{mLabel(h.currentMonth)}{" 실적 분석"}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{h.prevMonth?mLabel(h.prevMonth)+" 대비":"단독 분석"}{" · "}{new Date(h.savedAt).toLocaleString("ko-KR")}</div>
                {tot&&<div style={{fontSize:13,marginTop:4}}>{"총비용 "}<b>{fmt(gc)}</b>{"원 · 전월比 "}<span style={{color:dColor(gc-gp),fontWeight:700}}>{dLabel(gc-gp)}{"원"}</span></div>}
              </div>
              <div style={{display:"flex",gap:8,flexShrink:0}}>
                <button onClick={()=>onSelect(h)} style={{padding:"8px 16px",background:"#1a3a6e",color:"white",border:"none",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:600}}>보기</button>
                <button onClick={()=>onDelete(h.key)} style={{padding:"8px 16px",background:"white",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,fontSize:12,cursor:"pointer"}}>삭제</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* 설정 탭 */
function SettingsTab({settings,onSave}){
  const SETTINGS_PW="halla!admin";
  const [unlocked,setUnlocked]=useState(false);
  const [pwInput,setPwInput]=useState("");
  const [pwErr,setPwErr]=useState(false);
  const [key,setKey]=useState(settings.geminiKey||"");
  const [id,setId]=useState(settings.creds?.id||"admin");
  const [pw,setPw]=useState(settings.creds?.pw||"halla2026");
  const [saved,setSaved]=useState(false);
  function checkPw(){if(pwInput===SETTINGS_PW){setUnlocked(true);setPwErr(false);}else{setPwErr(true);}}
  function save(){onSave({geminiKey:key,creds:{id,pw}});setSaved(true);setTimeout(()=>setSaved(false),2000);}
  const inp={width:"100%",padding:"10px 13px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,background:"#f8fafc"};
  const lbl={fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5};
  if(!unlocked){
    return(
      <div style={{maxWidth:400}}>
        <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",marginBottom:4}}>설정</h2>
        <p style={{fontSize:13,color:"#64748b",marginBottom:24}}>설정 메뉴는 관리자 비밀번호가 필요합니다.</p>
        <div style={{background:"white",borderRadius:12,padding:"28px 24px",border:"1px solid #e2e8f0",boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
          <div style={{textAlign:"center",fontSize:32,marginBottom:16}}>🔒</div>
          <label style={{...lbl,textAlign:"center",display:"block",marginBottom:10}}>관리자 비밀번호</label>
          <input type="password" value={pwInput} onChange={e=>{setPwInput(e.target.value);setPwErr(false);}} onKeyDown={e=>e.key==="Enter"&&checkPw()} placeholder="비밀번호 입력" style={{...inp,textAlign:"center",marginBottom:pwErr?8:14}}/>
          {pwErr&&<p style={{fontSize:12,color:"#dc2626",textAlign:"center",margin:"0 0 12px"}}>비밀번호가 올바르지 않습니다.</p>}
          <button onClick={checkPw} style={{width:"100%",padding:"12px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer"}}>확인</button>
        </div>
      </div>
    );
  }
  return(
    <div style={{maxWidth:600}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040"}}>설정</h2>
        <button onClick={()=>{setUnlocked(false);setPwInput("");}} style={{padding:"5px 12px",background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:6,fontSize:12,color:"#64748b",cursor:"pointer"}}>잠금</button>
      </div>
      <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>Gemini API 키 및 로그인 계정을 관리합니다</p>
      <Card title="Gemini API 설정" mb={16}>
        <label style={lbl}>Google Gemini API 키 (gemini-2.5-flash 우선, 자동 폴백)</label>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="AIza..." style={inp}/>
        <div style={{marginTop:8,padding:"10px 12px",background:"#eff6ff",borderRadius:7,border:"1px solid #bfdbfe",fontSize:12,color:"#1e40af"}}>
          Google AI Studio (aistudio.google.com) → API 키 발급 → 여기에 입력
        </div>
      </Card>
      <Card title="로그인 계정 관리" mb={16}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div><label style={lbl}>아이디</label><input value={id} onChange={e=>setId(e.target.value)} style={inp}/></div>
          <div><label style={lbl}>비밀번호</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} style={inp}/></div>
        </div>
      </Card>
      <Card title="ERP 파일 컬럼 구조 (고정)" mb={20}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13,color:"#4b5563"}}>
          {[["B열 (index 1)","회계일"],["D열 (index 3)","전표관리단위"],["Q열 (index 16)","계정과목"],["R열 (index 17)","차변금액"],["V열 (index 21)","적요"]].map(([col,name])=>(
            <div key={col} style={{display:"flex",gap:8,padding:"7px 10px",background:"#f8fafc",borderRadius:6}}>
              <span style={{fontWeight:700,color:"#1e40af",minWidth:100}}>{col}</span><span>{name}</span>
            </div>
          ))}
        </div>
      </Card>
      <button onClick={save} style={{padding:"12px 32px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer"}}>
        {saved?"저장 완료":"저장"}
      </button>
    </div>
  );
}/* ═══════════════════════════════════════════════════
   로그인 / 사이드바 / 드롭존
═══════════════════════════════════════════════════ */
function Login({onLogin}){
  const [id,setId]=useState(""); const [pw,setPw]=useState(""); const [err,setErr]=useState("");
  function doLogin(){
    const s=lsGet("app:settings")||{creds:DEFAULT_CREDS};
    const cr=s.creds||DEFAULT_CREDS;
    if(id===cr.id&&pw===cr.pw)onLogin();
    else setErr("아이디 또는 비밀번호가 올바르지 않습니다.");
  }
  const inp={width:"100%",padding:"11px 14px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,outline:"none",background:"#f8fafc"};
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#0f2040,#1a3a6e)"}}>
      <div style={{width:380,padding:"40px 36px",background:"rgba(255,255,255,0.97)",borderRadius:16,boxShadow:"0 24px 80px rgba(0,0,0,0.45)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:52,height:52,margin:"0 auto 14px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",borderRadius:14}}></div>
          <h1 style={{margin:0,fontSize:22,fontWeight:800,color:"#0f2040"}}>비용실적 분석시스템</h1>
          <p style={{margin:"6px 0 0",fontSize:13,color:"#64748b"}}>한라엔컴㈜ ERP 비용 분석 플랫폼</p>
        </div>
        <div style={{marginBottom:14}}><label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5}}>아이디</label><input value={id} onChange={e=>setId(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} style={inp}/></div>
        <div style={{marginBottom:14}}><label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5}}>비밀번호</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} style={inp}/></div>
        {err&&<div style={{padding:"8px 12px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:6,fontSize:13,color:"#dc2626",marginBottom:12}}>{err}</div>}
        <button onClick={doLogin} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",color:"white",border:"none",borderRadius:8,fontSize:15,fontWeight:700,cursor:"pointer",marginTop:4}}>로그인</button>
        <p style={{fontSize:11,color:"#94a3b8",textAlign:"center",margin:"16px 0 0"}}>기본 계정: admin / halla2026</p>
      </div>
    </div>
  );
}

function Sidebar({active,onNav,onLogout}){
  const NAV=[{id:"upload",label:"분석하기"},{id:"results",label:"종합분석결과"},{id:"activity",label:"사업활동비"},{id:"repair",label:"수선비"},{id:"supply",label:"소모품비"},{id:"transport",label:"시내교통비"},{id:"trip",label:"국내출장비"},{id:"history",label:"히스토리"},{id:"settings",label:"설정"}];
  return(
    <div style={{width:190,background:"#0f2040",display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"22px 20px 18px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
        <div style={{fontSize:14,fontWeight:800,color:"white"}}>비용분석시스템</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:3}}>한라엔컴㈜</div>
      </div>
      <nav style={{flex:1,paddingTop:8}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>onNav(n.id)} style={{width:"100%",padding:"11px 20px",display:"flex",alignItems:"center",background:active===n.id?"rgba(255,255,255,0.12)":"transparent",border:"none",borderLeft:active===n.id?"3px solid #3b82f6":"3px solid transparent",color:active===n.id?"white":"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:13,textAlign:"left",fontWeight:active===n.id?700:400}}>{n.label}</button>
        ))}
      </nav>
      <div style={{padding:"16px 20px",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
        <button onClick={onLogout} style={{width:"100%",padding:"8px 10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:6,color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:12}}>로그아웃</button>
      </div>
    </div>
  );
}

function DropZone({label,fileName,onUpload,required,badge}){
  const ref=useRef(); const [drag,setDrag]=useState(false);
  function handle(file){if(!file||(!file.name.endsWith(".xlsx")&&!file.name.endsWith(".xls"))){alert("xlsx/xls만 지원합니다.");return;}onUpload(file);}
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <label style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{label}</label>
        {required&&<span style={{fontSize:10,padding:"1px 6px",background:"#fee2e2",color:"#dc2626",borderRadius:4,fontWeight:700}}>필수</span>}
        {badge&&<span style={{fontSize:10,padding:"1px 6px",background:"#dbeafe",color:"#1d4ed8",borderRadius:4}}>{badge}</span>}
      </div>
      <div onClick={()=>ref.current.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0]);}}
        style={{border:"2px dashed "+(fileName?"#16a34a":drag?"#3b82f6":"#cbd5e1"),borderRadius:10,padding:"18px 16px",textAlign:"center",cursor:"pointer",background:fileName?"#f0fdf4":drag?"#eff6ff":"#f8fafc"}}>
        {fileName?<p style={{margin:0,fontSize:12,color:"#166534",fontWeight:600}}>{"✓ "+fileName}</p>:<div><p style={{margin:0,fontSize:12,color:"#64748b"}}>클릭 또는 드래그</p><p style={{margin:"2px 0 0",fontSize:11,color:"#94a3b8"}}>.xlsx / .xls</p></div>}
      </div>
      <input ref={ref} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>e.target.files[0]&&handle(e.target.files[0])}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   메인 앱
═══════════════════════════════════════════════════ */
function App(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [tab,setTab]=useState("upload");
  const [settings,setSettings]=useState({geminiKey:"",creds:DEFAULT_CREDS});
  const [activityData,setActivityData]=useState(null);
  const [repairData,setRepairData]=useState(null);
  const [supplyData,setSupplyData]=useState(null);
  const [transportData,setTransportData]=useState(null);
  const [tripData,setTripData]=useState(null);
  const [currFile,setCurrFile]=useState(null);
  const [prevFile,setPrevFile]=useState(null);
  const [currData,setCurrData]=useState(null);
  const [prevData,setPrevData]=useState(null);
  const [result,setResult]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [error,setError]=useState("");
  const [history,setHistory]=useState([]);

  useEffect(()=>{
    const s=lsGet("app:settings");
    if(s)setSettings(s);
    loadHist();
  },[]);

  function loadHist(){
    const keys=lsList("analysis:");
    const items=keys.map(k=>{const v=lsGet(k);return v?{key:k,...v}:null;}).filter(Boolean);
    items.sort((a,b)=>(b.savedAt||"").localeCompare(a.savedAt||""));
    setHistory(items);
  }
  function saveSettings(s){setSettings(s);lsSet("app:settings",s);}

  function loadFile(file,type){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"array"});
        const recs=parseERP(wb);
        const agg=aggregate(recs);
        const months=Object.keys(agg).sort();
        if(!months.length){alert("데이터를 찾을 수 없습니다. 컬럼 구조를 확인하세요.");return;}
        const data={recs,agg,months,fileName:file.name};
        if(type==="curr"){
          setCurrData(data);setCurrFile(file.name);
          setActivityData(buildActivityData(recs));
          // prevData가 있으면 전월 recs 사용
          const pRecs=prevData&&!prevData.fromHistory?prevData.recs:[];
          setRepairData(buildItemData(recs,"수선비",pRecs));
          setSupplyData(buildItemData(recs,"소모품비",pRecs));
          setTransportData(buildItemData(recs,"시내교통비",pRecs));
          setTripData(buildItemData(recs,"국내출장비",pRecs));
        }else{setPrevData(data);setPrevFile(file.name);}
      }catch(err){alert("파일 파싱 오류: "+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function usePrevHist(h){
    const recAgg={};
    h.comparison?.units?.forEach(u=>{
      recAgg[u.unit]={};
      u.accs.forEach(a=>{recAgg[u.unit][a.acc]={amt:a.c,memos:a.memos||[],cat:a.cat};});
    });
    setPrevData({fromHistory:true,recAgg,months:[h.currentMonth],fileName:mLabel(h.currentMonth)+" (히스토리)"});
    setPrevFile(mLabel(h.currentMonth)+" (히스토리)");
  }

  async function doAnalyze(){
    if(!currData){alert("당월 파일을 업로드해주세요.");return;}
    if(!settings.geminiKey){alert("설정 메뉴에서 Gemini API 키를 입력해주세요.");return;}
    setAnalyzing(true);setError("");
    try{
      const currentMonth=currData.months[currData.months.length-1];
      const currAgg=currData.agg[currentMonth]||{};
      let prevAgg={},prevMonth=null;
      if(prevData){
        if(prevData.fromHistory){prevAgg=prevData.recAgg||{};prevMonth=prevData.months[0];}
        else{prevMonth=prevData.months[prevData.months.length-1];prevAgg=prevData.agg[prevMonth]||{};}
      }
      const comparison=buildCompare(currAgg,prevAgg);
      // 전월 recs 구성
      const pRecsForItems=prevData&&!prevData.fromHistory&&prevData.recs?prevData.recs:
        (prevAgg?Object.entries(prevAgg).flatMap(([unit,accs])=>
          Object.entries(accs).flatMap(([acc,v])=>
            (v.memos||[]).map(m=>({unit,acc,amt:v.amt/Math.max((v.memos||[]).length,1),memo:m.text||"",month:prevMonth||"",dept:unit,mgmt:""}))
          )
        ):[]);
      const aiComments=await runAnalysis(comparison,currentMonth,prevMonth,settings.geminiKey);
      const res={currentMonth,prevMonth,comparison,aiComments,currentFileName:currData.fileName,prevFileName:prevData?.fileName||null,savedAt:new Date().toISOString()};
      setResult(res);
      const histKey="analysis:"+currentMonth+"_"+Date.now();
      lsSet(histKey,res);
      // 사업활동비·수선비·소모품비는 당월 파일 recs 기반 → currData에서 재활용
      // 전월 recs를 활용하여 증감 포함 재계산
      const pR=prevData&&!prevData.fromHistory&&prevData.recs?prevData.recs:[];
      const actD=buildActivityData(currData.recs);
      const repD=buildItemData(currData.recs,"수선비",pR);
      const supD=buildItemData(currData.recs,"소모품비",pR);
      const traD=buildItemData(currData.recs,"시내교통비",pR);
      const triD=buildItemData(currData.recs,"국내출장비",pR);
      setActivityData(actD);setRepairData(repD);setSupplyData(supD);setTransportData(traD);setTripData(triD);
      if(actD)lsSet("activity:"+currentMonth,actD);
      if(repD)lsSet("repair:"+currentMonth,repD);
      if(supD)lsSet("supply:"+currentMonth,supD);
      if(traD)lsSet("transport:"+currentMonth,traD);
      if(triD)lsSet("trip:"+currentMonth,triD);
      loadHist();
      setTab("results");
    }catch(err){
      const msg=err.message||"";
      setError(
  msg.includes("OVERLOAD")
    ? "Gemini 서버 과부하 지속 중입니다. 5분 후 다시 시도해주세요. (API 무료 플랜은 사용량 제한이 있습니다)"
    : (msg.includes("과부하")||msg.includes("high demand")||msg.includes("overloaded"))
      ? "Gemini 서버 일시 과부하 — 자동 재시도 중 최대 3분까지 대기합니다. 창을 닫지 마세요."
      : "오류: "+msg
);
    }finally{setAnalyzing(false);}
  }

  if(!loggedIn)return <Login onLogin={()=>setLoggedIn(true)}/>;

  return(
    <div style={{display:"flex",height:"100vh",fontFamily:"'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif",background:"#f0f4f8"}}>
      <Sidebar active={tab} onNav={setTab} onLogout={()=>setLoggedIn(false)}/>
      <main style={{flex:1,overflow:"auto",padding:"24px 28px"}}>
        {tab==="upload"&&<UploadTab currFile={currFile} prevFile={prevFile} onCurrUpload={f=>loadFile(f,"curr")} onPrevUpload={f=>loadFile(f,"prev")} onAnalyze={doAnalyze} analyzing={analyzing} error={error} hasKey={!!settings.geminiKey} history={history} onPrevHist={usePrevHist}/>}
        {tab==="results"&&result&&<ResultsTab result={result} onExport={()=>exportXLS(result)}/>}
        {tab==="results"&&!result&&(
          <div style={{textAlign:"center",padding:"100px 20px",color:"#94a3b8"}}>
            <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>분석 결과가 없습니다</p>
            <p style={{fontSize:13}}>분석하기 탭에서 파일을 업로드하고 분석을 실행하세요.</p>
          </div>
        )}
        {tab==="activity"&&<ActivityTab data={activityData}/>}
        {tab==="repair"&&<RepairTab data={repairData}/>}
        {tab==="supply"&&<SupplyTab data={supplyData}/>}
        {tab==="transport"&&<ItemAnalysisTab data={transportData} label="시내교통비" showDept={true}/>}
        {tab==="trip"&&<ItemAnalysisTab data={tripData} label="국내출장비" showDept={true}/>}
        {tab==="history"&&<HistoryTab history={history} onSelect={h=>{
          setResult(h);
          // 해당 월의 activity/repair/supply 복원
          const ad=lsGet("activity:"+h.currentMonth);
          if(ad)setActivityData(ad);
          const rd=lsGet("repair:"+h.currentMonth);
          if(rd)setRepairData(rd);
          const sd=lsGet("supply:"+h.currentMonth);
          if(sd)setSupplyData(sd);
          const td=lsGet("transport:"+h.currentMonth);
          if(td)setTransportData(td);
          const trd=lsGet("trip:"+h.currentMonth);
          if(trd)setTripData(trd);
          setTab("results");
        }} onDelete={k=>{lsDel(k);loadHist();}}/>}
        {tab==="settings"&&<SettingsTab settings={settings} onSave={saveSettings}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
