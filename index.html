function HistoryTab({history,sbRows,sbLoading,onRefreshSB,onSelect,onDelete,onDeleteSB}){
  const [tab,setTab]=useState("cloud");
  const hasSB=getSB()!==null;

  function HistCard({h,isSB}){
    const res=isSB?h.result_data:h;
    const tot=res?.comparison?.totals;
    const gc=tot?tot.curr.mfg+tot.curr.sga:0,gp=tot?tot.prev.mfg+tot.prev.sga:0;
    const month=isSB?h.month:h.currentMonth;
    const prevMonth=isSB?res?.prevMonth:h.prevMonth;
    const savedAt=h.saved_at||h.savedAt;
    const badges=isSB?[h.activity_data?"사업활동비":null,h.repair_data?"수선비":null,h.supply_data?"소모품비":null,h.transport_data?"시내교통비":null,h.trip_data?"국내출장비":null].filter(Boolean):[];
    return(
      <div style={{background:"white",borderRadius:10,padding:"16px 20px",boxShadow:"0 1px 4px rgba(0,0,0,0.07)",border:"1px solid #e2e8f0"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:44,height:44,background:"linear-gradient(135deg,#1a3a6e,#2563eb)",borderRadius:10,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"white"}}>{isSB?"☁":"💾"}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:15,fontWeight:800,color:"#1e293b"}}>{mLabel(month)} 실적 분석</span>
              {isSB&&<span style={{fontSize:10,padding:"1px 6px",background:"#dbeafe",color:"#1d4ed8",borderRadius:4,fontWeight:600}}>공유</span>}
            </div>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{prevMonth?mLabel(prevMonth)+" 대비":"단독"} · {savedAt?new Date(savedAt).toLocaleString("ko-KR"):""}</div>
            {tot&&<div style={{fontSize:13,marginTop:4}}>총비용 <b>{fmt(gc)}</b>원 · <span style={{color:dColor(gc-gp),fontWeight:700}}>{dLabel(gc-gp)}원</span></div>}
            {badges.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>{badges.map(b=><span key={b} style={{fontSize:10,padding:"1px 7px",background:"#f1f5f9",color:"#475569",borderRadius:10,border:"1px solid #e2e8f0"}}>{b}</span>)}</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <button onClick={()=>onSelect(h)} style={{padding:"8px 16px",background:"#1a3a6e",color:"white",border:"none",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:600}}>보기</button>
            {isSB&&onDeleteSB&&<button onClick={()=>onDeleteSB(h.id)} style={{padding:"6px 16px",background:"white",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,fontSize:11,cursor:"pointer"}}>삭제</button>}
            {!isSB&&<button onClick={()=>onDelete(h.key)} style={{padding:"6px 16px",background:"white",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,fontSize:11,cursor:"pointer"}}>삭제</button>}
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{maxWidth:880}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div><h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",margin:0}}>분석 히스토리</h2><p style={{fontSize:13,color:"#64748b",margin:"4px 0 0"}}>클라우드 결과는 누구든 URL 접속 시 열람 가능</p></div>
        {hasSB&&<button onClick={onRefreshSB} style={{padding:"8px 14px",background:"white",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,cursor:"pointer",color:"#475569"}}>{sbLoading?"로딩 중...":"☁ 새로고침"}</button>}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {[["cloud","☁ 클라우드 (공유)"],["local","💾 내 브라우저"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{padding:"8px 20px",background:tab===v?"#0f2040":"white",border:"1.5px solid "+(tab===v?"#0f2040":"#e2e8f0"),borderRadius:8,color:tab===v?"white":"#64748b",fontWeight:tab===v?700:500,fontSize:13,cursor:"pointer"}}>
            {l} ({v==="cloud"?sbRows.length:history.length})
          </button>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {tab==="cloud"&&sbLoading&&<div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>불러오는 중...</div>}
        {tab==="cloud"&&!sbLoading&&sbRows.length===0&&<div style={{textAlign:"center",padding:40,color:"#94a3b8"}}><p style={{fontSize:14,fontWeight:600,marginBottom:6}}>클라우드에 저장된 결과가 없습니다</p><p style={{fontSize:12}}>분석 실행 후 자동으로 저장됩니다.</p></div>}
        {tab==="local"&&history.length===0&&<div style={{textAlign:"center",padding:40,color:"#94a3b8"}}><p style={{fontSize:14,fontWeight:600}}>로컬 히스토리가 없습니다</p></div>}
        {(tab==="cloud"?sbRows:history).map((h,i)=><HistCard key={h.id||h.key||i} h={h} isSB={tab==="cloud"}/>)}
      </div>
    </div>
  );
}
/* ═══ 설정 탭 ═══ */
function SettingsTab({settings,onSave}){
  const [unlocked,setUnlocked]=useState(false);
  const [pwInput,setPwInput]=useState("");const [pwErr,setPwErr]=useState(false);
  const [key,setKey]=useState(settings.geminiKey||"");
  const [id,setId]=useState(settings.creds?.id||"admin");
  const [pw,setPw]=useState(settings.creds?.pw||"halla2026");
  const [sbUrl,setSbUrl]=useState(settings.sbUrl||"");
  const [sbKey2,setSbKey2]=useState(settings.sbKey||"");
  const [telegramToken,setTelegramToken]=useState(settings.telegramToken||"");
  const [telegramChatId,setTelegramChatId]=useState(settings.telegramChatId||"");
  const [appUrl,setAppUrl]=useState(settings.appUrl||"");
  const [newSettingsPw,setNewSettingsPw]=useState("");
  const [newSettingsPw2,setNewSettingsPw2]=useState("");
  const [pwMsg,setPwMsg]=useState("");
  const [ipLogs]=useState(()=>{try{return JSON.parse(localStorage.getItem("ip:logs")||"[]");}catch{return[];}});
  const [saved,setSaved]=useState(false);

  function checkPw(){
    const sp=(lsGet("app:settings")||{}).settingsPw||SETTINGS_PW;
    if(pwInput===sp){setUnlocked(true);setPwErr(false);}else setPwErr(true);
  }
  async function save(){
    if(newSettingsPw&&newSettingsPw!==newSettingsPw2){setPwMsg("비밀번호가 일치하지 않습니다.");return;}
    const settingsPw=newSettingsPw||settings.settingsPw||SETTINGS_PW;
    const newSettings={geminiKey:key,sbUrl,sbKey:sbKey2,telegramToken,telegramChatId,appUrl,settingsPw,creds:{id,pw}};
    onSave(newSettings);
    // Supabase에도 저장 (모든 브라우저 공유)
    await saveAppSettingsToCloud(newSettings);
    setSaved(true);if(newSettingsPw)setPwMsg("설정 비밀번호가 변경됐습니다.");
    setTimeout(()=>{setSaved(false);setPwMsg("");},2500);
  }
  const inp={width:"100%",padding:"10px 13px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,background:"#f8fafc"};
  const lbl={fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5};

  if(!unlocked)return(
    <div style={{maxWidth:400}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",marginBottom:4}}>설정</h2>
      <p style={{fontSize:13,color:"#64748b",marginBottom:24}}>관리자 비밀번호가 필요합니다.</p>
      <div style={{background:"white",borderRadius:12,padding:"28px 24px",border:"1px solid #e2e8f0",boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
        <div style={{textAlign:"center",fontSize:32,marginBottom:16}}>🔒</div>
        <label style={{...lbl,textAlign:"center",display:"block",marginBottom:10}}>관리자 비밀번호</label>
        <input type="password" value={pwInput} onChange={e=>{setPwInput(e.target.value);setPwErr(false);}} onKeyDown={e=>e.key==="Enter"&&checkPw()} placeholder="비밀번호 입력" style={{...inp,textAlign:"center",marginBottom:pwErr?8:14}}/>
        {pwErr&&<p style={{fontSize:12,color:"#dc2626",textAlign:"center",margin:"0 0 12px"}}>비밀번호가 올바르지 않습니다.</p>}
        <button onClick={checkPw} style={{width:"100%",padding:"12px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer"}}>확인</button>
      </div>
    </div>
  );
  return(
    <div style={{maxWidth:600}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040"}}>설정</h2>
        <button onClick={()=>{setUnlocked(false);setPwInput("");}} style={{padding:"5px 12px",background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:6,fontSize:12,color:"#64748b",cursor:"pointer"}}>잠금</button>
      </div>
      <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>API 키, 계정, Telegram 연동을 관리합니다</p>

      <Card title="계정 관리" mb={16}><AccountManager settings={settings} onSave={onSave}/></Card>

      <Card title="Claude API 설정" mb={16}>
        <label style={lbl}>Anthropic Claude API 키</label>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-..." style={inp}/>
        <div style={{marginTop:8,padding:"10px 12px",background:"#eff6ff",borderRadius:7,border:"1px solid #bfdbfe",fontSize:12,color:"#1e40af"}}>console.anthropic.com → API Keys → Create Key</div>
      </Card>

      <Card title="Telegram 승인 알림 설정" mb={16}>
        <p style={{fontSize:12,color:"#64748b",marginBottom:10}}>설정하면 로그인 시도 시 Telegram으로 알림이 오고 승인/거부할 수 있습니다.</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div><label style={lbl}>Bot Token</label><input type="password" value={telegramToken} onChange={e=>setTelegramToken(e.target.value)} placeholder="123456789:ABCdef-xxx..." style={inp}/></div>
          <div><label style={lbl}>Chat ID (내 Telegram ID)</label><input value={telegramChatId} onChange={e=>setTelegramChatId(e.target.value)} placeholder="123456789" style={inp}/></div>
          <div><label style={lbl}>앱 URL (승인 링크용)</label><input value={appUrl} onChange={e=>setAppUrl(e.target.value)} placeholder="https://yourname.github.io/repo/" style={inp}/></div>
        </div>
        <div style={{marginTop:8,padding:"10px 12px",background:"#eff6ff",borderRadius:7,border:"1px solid #bfdbfe",fontSize:12,color:"#1e40af"}}>@BotFather에서 봇 생성 후 Token 복사 · @userinfobot에서 Chat ID 확인</div>
      </Card>

      <Card title="Supabase 설정 (클라우드 공유)" mb={16}>
        <p style={{fontSize:12,color:"#64748b",marginBottom:10}}>설정하면 분석 결과가 클라우드에 저장되어 누구든 URL로 접속 시 히스토리를 볼 수 있습니다.</p>

          <div><label style={lbl}>Project URL</label><input value={sbUrl} onChange={e=>setSbUrl(e.target.value)} placeholder="https://xxxx.supabase.co" style={inp}/></div>
          <div><label style={lbl}>anon public key</label><input type="password" value={sbKey2} onChange={e=>setSbKey2(e.target.value)} placeholder="eyJh..." style={inp}/></div>
        </div>
      </Card>

      <Card title="로그인 계정 관리" mb={16}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div><label style={lbl}>아이디</label><input value={id} onChange={e=>setId(e.target.value)} style={inp}/></div>
          <div><label style={lbl}>비밀번호</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} style={inp}/></div>
        </div>
      </Card>

      <Card title="설정 비밀번호 변경" mb={16}>
        <p style={{fontSize:12,color:"#64748b",marginBottom:10}}>변경하면 설정 메뉴 잠금에 새 비밀번호가 적용됩니다.</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={lbl}>새 비밀번호</label><input type="password" value={newSettingsPw} onChange={e=>setNewSettingsPw(e.target.value)} placeholder="새 비밀번호" style={inp}/></div>
          <div><label style={lbl}>비밀번호 확인</label><input type="password" value={newSettingsPw2} onChange={e=>setNewSettingsPw2(e.target.value)} placeholder="동일하게 입력" style={inp}/></div>
        </div>
        {pwMsg&&<p style={{fontSize:12,color:pwMsg.includes("일치하지")?"#dc2626":"#16a34a",marginTop:8}}>{pwMsg}</p>}
      </Card>

      <Card title="접속 로그" mb={16}>
        <div style={{maxHeight:180,overflowY:"auto"}}>
          {ipLogs.length===0&&<p style={{fontSize:12,color:"#94a3b8"}}>접속 기록이 없습니다.</p>}

            <div key={i} style={{padding:"6px 0",borderBottom:"1px solid #f1f5f9",fontSize:11,display:"flex",gap:10}}>
              <span style={{color:"#94a3b8",minWidth:130,flexShrink:0}}>{new Date(log.time).toLocaleString("ko-KR")}</span>
              <span style={{color:"#1e40af",fontWeight:600,minWidth:60,flexShrink:0}}>{log.id}</span>
              <span style={{color:"#64748b",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{log.ua}</span>
            </div>
          ))}
        </div>
        {ipLogs.length>0&&<button onClick={()=>{localStorage.removeItem("ip:logs");window.location.reload();}} style={{marginTop:10,padding:"6px 14px",background:"white",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,fontSize:12,cursor:"pointer"}}>로그 삭제</button>}
      </Card>

      <Card title="ERP 파일 컬럼 구조 (고정)" mb={20}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13,color:"#4b5563"}}>
          {[["B열(2번)","회계일"],["D열(4번)","전표관리단위"],["Q열(17번)","계정과목"],["R열(18번)","차변금액"],["V열(22번)","적요"],["AB열(28번)","예산부서"],["AM열(39번)","관리항목3"]].map(([col,name])=>(
            <div key={col} style={{display:"flex",gap:8,padding:"7px 10px",background:"#f8fafc",borderRadius:6}}><span style={{fontWeight:700,color:"#1e40af",minWidth:90}}>{col}</span><span>{name}</span></div>
          ))}
        </div>
      </Card>

      <div style={{display:"flex",gap:8}}>
        <button onClick={save} style={{padding:"12px 32px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer"}}>{saved?"저장 완료":"저장"}</button>
        <button onClick={()=>{if(window.confirm("로컬 히스토리를 모두 삭제합니다.")){lsList("analysis:").forEach(lsDel);lsList("activity:").forEach(lsDel);lsList("repair:").forEach(lsDel);lsList("supply:").forEach(lsDel);lsList("transport:").forEach(lsDel);lsList("trip:").forEach(lsDel);alert("삭제 완료");}}} style={{padding:"12px 24px",background:"white",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:8,fontSize:14,cursor:"pointer"}}>로컬 히스토리 초기화</button>
      </div>
    </div>
  );
}

        {NAV.map(n=><button key={n.id} onClick={()=>onNav(n.id)} style={{width:"100%",padding:"10px 20px",display:"flex",alignItems:"center",background:active===n.id?"rgba(255,255,255,0.12)":"transparent",border:"none",borderLeft:active===n.id?"3px solid #3b82f6":"3px solid transparent",color:active===n.id?"white":"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:13,textAlign:"left",fontWeight:active===n.id?700:400}}>{n.l}</button>)}
      </nav>
      <div style={{padding:"16px 20px",borderTop:"1px solid rgba(255,255,255,0.08)"}}><button onClick={onLogout} style={{width:"100%",padding:"8px 10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:6,color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:12}}>로그아웃</button></div>
    </div>
  );
}

/* ═══ 메인 앱 ═══ */
function App(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [tab,setTab]=useState("upload");
  const [settings,setSettings]=useState({geminiKey:"",creds:{id:"admin",pw:"halla2026"}});
  const [currFile,setCurrFile]=useState(null);const [prevFile,setPrevFile]=useState(null);
  const [currData,setCurrData]=useState(null);const [prevData,setPrevData]=useState(null);
  const [result,setResult]=useState(null);
  const [activityData,setActivityData]=useState(null);
  const [repairData,setRepairData]=useState(null);
  const [supplyData,setSupplyData]=useState(null);
  const [transportData,setTransportData]=useState(null);
  const [tripData,setTripData]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [error,setError]=useState("");
  const [history,setHistory]=useState([]);
  const [sbRows,setSbRows]=useState([]);
  const [sbLoading,setSbLoading]=useState(false);

  useEffect(()=>{
    // Supabase에서 최신 설정 로드 (모든 브라우저 공유)
    loadAppSettings().then(s=>{
      if(s&&Object.keys(s).length>0)setSettings(s);
    });
    loadHist();
    refreshSB();
  },[]);

  function loadHist(){
    const keys=lsList("analysis:");
    const items=keys.map(k=>{const v=lsGet(k);return v?{key:k,...v}:null;}).filter(Boolean);
    items.sort((a,b)=>(b.savedAt||"").localeCompare(a.savedAt||""));
    setHistory(items);
  }
  async function refreshSB(){
    setSbLoading(true);
    const rows=await sbLoad();
    setSbRows(rows);
    setSbLoading(false);
  }
  function saveSettings(s){setSettings(s);lsSet("app:settings",s);}

  function loadFile(file,type){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"array"});
        const recs=parseERP(wb);
        const agg=aggregate(recs);
        const months=Object.keys(agg).sort();
        if(!months.length){alert("데이터를 찾을 수 없습니다.");return;}
        const data={recs,agg,months,fileName:file.name};
        if(type==="curr"){setCurrData(data);setCurrFile(file.name);setActivityData(buildActivityData(recs));}
        else{setPrevData(data);setPrevFile(file.name);}
      }catch(err){alert("파일 오류: "+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function usePrevHist(h){
    const recAgg={};
    h.comparison?.units?.forEach(u=>{recAgg[u.unit]={};u.accs.forEach(a=>{recAgg[u.unit][a.acc]={amt:a.c,memos:a.memos||[],cat:a.cat};});});
    setPrevData({fromHistory:true,recAgg,months:[h.currentMonth],fileName:mLabel(h.currentMonth)+"(히스토리)"});
    setPrevFile(mLabel(h.currentMonth)+"(히스토리)");
  }

  async function doAnalyze(){
    if(!currData){alert("당월 파일을 업로드해주세요.");return;}
    if(!settings.geminiKey){alert("설정에서 Claude API 키를 입력해주세요.");return;}
    setAnalyzing(true);setError("");
    try{
      const currentMonth=currData.months[currData.months.length-1];
      const currAgg=currData.agg[currentMonth]||{};
      let prevAgg={},prevMonth=null,prevRecs=[];
      if(prevData){
        if(prevData.fromHistory){prevAgg=prevData.recAgg||{};prevMonth=prevData.months[0];}
        else{prevMonth=prevData.months[prevData.months.length-1];prevAgg=prevData.agg[prevMonth]||{};prevRecs=prevData.recs||[];}
      }
      const comparison=buildCompare(currAgg,prevAgg);
      const aiComments=await runAI(comparison,currentMonth,prevMonth,settings.geminiKey);
      const pR=prevRecs;
      const repD=buildItemData(currData.recs,"수선비",pR);
      const supD=buildItemData(currData.recs,"소모품비",pR);
      const traD=buildItemData(currData.recs,"시내교통비",pR);
      const triD=buildItemData(currData.recs,"국내출장비",pR);
      const actD=buildActivityData(currData.recs);
      setResult({currentMonth,prevMonth,comparison,aiComments,savedAt:new Date().toISOString()});
      setRepairData(repD);setSupplyData(supD);setTransportData(traD);setTripData(triD);setActivityData(actD);
      const res={currentMonth,prevMonth,comparison,aiComments,savedAt:new Date().toISOString()};
      const key="analysis:"+currentMonth+"_"+Date.now();
      lsSet(key,res);
      if(actD)lsSet("activity:"+currentMonth,actD);
      if(repD)lsSet("repair:"+currentMonth,repD);
      if(supD)lsSet("supply:"+currentMonth,supD);
      if(traD)lsSet("transport:"+currentMonth,traD);
      if(triD)lsSet("trip:"+currentMonth,triD);
      await sbSave({month:currentMonth,label:mLabel(currentMonth)+" 실적 분석",saved_at:new Date().toISOString(),result_data:res,activity_data:actD||null,repair_data:repD||null,supply_data:supD||null,transport_data:traD||null,trip_data:triD||null});
      loadHist();
      refreshSB();
      setTab("results");
    }catch(err){setError("오류: "+err.message);}
    finally{setAnalyzing(false);}
  }

  function selectHistory(h){
    const res=h.result_data||h;
    setResult(res);
    if(h.activity_data)setActivityData(h.activity_data);
    if(h.repair_data)setRepairData(h.repair_data);
    if(h.supply_data)setSupplyData(h.supply_data);
    if(h.transport_data)setTransportData(h.transport_data);
    if(h.trip_data)setTripData(h.trip_data);
    if(!h.result_data){
      const m=h.currentMonth;
      const ad=lsGet("activity:"+m);if(ad)setActivityData(ad);
      const rd=lsGet("repair:"+m);if(rd)setRepairData(rd);
      const sd=lsGet("supply:"+m);if(sd)setSupplyData(sd);
      const td=lsGet("transport:"+m);if(td)setTransportData(td);
      const trd=lsGet("trip:"+m);if(trd)setTripData(trd);
    }
    setTab("results");
  }

  if(!loggedIn)return <Login onLogin={(acct)=>setLoggedIn(true)}/>;
  return(
    <div style={{display:"flex",height:"100vh",fontFamily:"'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif",background:"#f0f4f8"}}>
      <Sidebar active={tab} onNav={setTab} onLogout={()=>setLoggedIn(false)}/>
      <main style={{flex:1,overflow:"auto",padding:"24px 28px"}}>
        {tab==="upload"&&<UploadTab currFile={currFile} prevFile={prevFile} onCurrUpload={f=>loadFile(f,"curr")} onPrevUpload={f=>loadFile(f,"prev")} onAnalyze={doAnalyze} analyzing={analyzing} error={error} hasKey={!!settings.geminiKey} history={history} onPrevHist={usePrevHist}/>}
        {tab==="results"&&result&&<ResultsTab result={result} onExport={()=>exportXLS(result)}/>}
        {tab==="results"&&!result&&<div style={{textAlign:"center",padding:"100px 20px",color:"#94a3b8"}}><p style={{fontSize:15,fontWeight:600,marginBottom:8}}>분석 결과가 없습니다</p></div>}
        {tab==="activity"&&<ActivityTab data={activityData}/>}
        {tab==="repair"&&<ItemAnalysisTab data={repairData} label="수선비" showDept={true}/>}
        {tab==="supply"&&<ItemAnalysisTab data={supplyData} label="소모품비" showDept={true}/>}
        {tab==="transport"&&<ItemAnalysisTab data={transportData} label="시내교통비" showDept={true}/>}
        {tab==="trip"&&<ItemAnalysisTab data={tripData} label="국내출장비" showDept={true}/>}
        {tab==="history"&&<HistoryTab
          history={history}
          sbRows={sbRows}
          sbLoading={sbLoading}
          onRefreshSB={refreshSB}
          onSelect={selectHistory}
          onDelete={k=>{lsDel(k);loadHist();}}
          onDeleteSB={async(id)=>{
            if(!window.confirm("클라우드에서 삭제합니다."))return;
            const sb=getSB();if(!sb)return;
            await sb.from("analysis_results").delete().eq("id",id);
            refreshSB();
          }}
        />}
        {tab==="settings"&&<SettingsTab settings={settings} onSave={saveSettings}/>}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
