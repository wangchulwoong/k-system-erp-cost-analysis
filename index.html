/* ═══ ERP 파싱 ═══ */
function parseDate(v){
  if(!v&&v!==0)return"";
  if(typeof v==="number"){try{const d=XLSX.SSF.parse_date_code(v);if(d)return""+d.y+(d.m<10?"0":"")+d.m;}catch{}}
  const s=String(v).replace(/\D/g,"");return s.length>=6?s.slice(0,6):"";
}
function parseERP(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  let dataStart=1;
  for(let i=0;i<5;i++){if(String(rows[i]?.[1]||"").includes("회계일")){dataStart=i+1;break;}}
  const recs=[];
  for(let i=dataStart;i<rows.length;i++){
    const r=rows[i];
    const month=parseDate(r[1]),unit=String(r[3]||"").trim(),acc=String(r[16]||"").trim();
    const amt=typeof r[17]==="number"?r[17]:parseFloat(String(r[17]).replace(/,/g,""))||0;
    const memo=String(r[21]||"").trim(),dept=String(r[27]||"").trim(),mgmt=String(r[38]||"").trim();
    if(!unit||!acc||amt===0)continue;
    if(EXCLUDE_KW.some(k=>acc.includes(k)))continue;
    recs.push({month,unit,acc,amt,memo,dept,mgmt});
  }
  return recs;
}
function aggregate(recs){
  const res={};
  recs.forEach(r=>{
    if(!r.month)return;
    const na=normAcc(r.acc);
    if(!res[r.month])res[r.month]={};
    if(!res[r.month][r.unit])res[r.month][r.unit]={};
    if(!res[r.month][r.unit][na])res[r.month][r.unit][na]={amt:0,memoMap:{},cat:classify(r.acc)};
    const e=res[r.month][r.unit][na];
    e.amt+=r.amt;
    if(r.memo)e.memoMap[r.memo]=(e.memoMap[r.memo]||0)+r.amt;
  });
  Object.values(res).forEach(mo=>Object.values(mo).forEach(un=>Object.values(un).forEach(e=>{
    e.memos=Object.entries(e.memoMap).map(([t,a])=>({text:t,amt:a})).sort((a,b)=>b.amt-a.amt);
    delete e.memoMap;
  })));
  return res;
}
function buildCompare(cA,pA){
  const allU=new Set([...Object.keys(cA),...Object.keys(pA)]);
  const units=[],totals={curr:{mfg:0,sga:0},prev:{mfg:0,sga:0}};
  allU.forEach(unit=>{
    const ca=cA[unit]||{},pa=pA[unit]||{};
    const allAccs=new Set([...Object.keys(ca),...Object.keys(pa)]);
    const accs=[],ut={curr:{mfg:0,sga:0},prev:{mfg:0,sga:0}};
    allAccs.forEach(acc=>{
      const c=ca[acc]?.amt||0,p=pa[acc]?.amt||0,cat=ca[acc]?.cat||pa[acc]?.cat||classify(acc),memos=ca[acc]?.memos||[],prevMemos=pa[acc]?.memos||[],displayMemos=(c<p&&prevMemos.length>0)?prevMemos:memos;
      accs.push({acc,cat,c,p,diff:c-p,memos:displayMemos,currMemos:memos,prevMemos});
      ut.curr[cat==="제조경비"?"mfg":"sga"]+=c;
      ut.prev[cat==="제조경비"?"mfg":"sga"]+=p;
    });
    accs.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
    ["mfg","sga"].forEach(k=>{totals.curr[k]+=ut.curr[k];totals.prev[k]+=ut.prev[k];});
    units.push({unit,accs,curr:ut.curr,prev:ut.prev,totalCurr:ut.curr.mfg+ut.curr.sga,totalPrev:ut.prev.mfg+ut.prev.sga});
  });
  units.sort((a,b)=>Math.abs(b.totalCurr-b.totalPrev)-Math.abs(a.totalCurr-a.totalPrev));
  return{units,totals};
}

/* ═══ 사업활동비 집계 ═══ */
function buildActivityData(recs){
  const ACT_KW=["경상접대비","복리후생비_회식대"];
  const targets=recs.filter(r=>ACT_KW.some(k=>r.acc.includes(k)));
  if(!targets.length)return null;
  const months=[...new Set(targets.map(r=>r.month).filter(Boolean))].sort();
  const month=months[months.length-1];
  const mr=targets.filter(r=>r.month===month);
  const deptMap={};
  mr.forEach(r=>{
    const dept=r.dept||r.unit||"미분류";
    const mgmt=MGMT_LABELS[r.mgmt]??MGMT_LABELS[""];
    const accType=r.acc.includes("복리후생비")?"회식대":"접대비";
    if(!deptMap[dept])deptMap[dept]={dept,hq:isHQDept(dept),접대비:0,회식대:0,total:0,mgmtBreak:{},details:[]};
    deptMap[dept][accType]+=r.amt;deptMap[dept].total+=r.amt;
    deptMap[dept].mgmtBreak[mgmt]=(deptMap[dept].mgmtBreak[mgmt]||0)+r.amt;
    deptMap[dept].details.push({acc:r.acc,amt:r.amt,mgmt,memo:r.memo});
  });
  const depts=Object.values(deptMap).sort((a,b)=>b.total-a.total);
  const allMgmt={};mr.forEach(r=>{const m=MGMT_LABELS[r.mgmt]??MGMT_LABELS[""];allMgmt[m]=(allMgmt[m]||0)+r.amt;});
  return{month,depts,hqDepts:depts.filter(d=>d.hq),siteDepts:depts.filter(d=>!d.hq),
    grandTotal:depts.reduce((s,d)=>s+d.total,0),grandJeob:depts.reduce((s,d)=>s+d.접대비,0),grandFed:depts.reduce((s,d)=>s+d.회식대,0),allMgmt};
}

/* ═══ 항목별 집계 (수선비/소모품비/시내교통비/국내출장비) ═══ */
function buildItemData(recs,keyword,prevRecs){
  const match=r=>normAcc(r.acc).includes(keyword)||r.acc.includes(keyword);
  const targets=recs.filter(match);
  if(!targets.length)return null;
  const months=[...new Set(targets.map(r=>r.month).filter(Boolean))].sort();
  const month=months[months.length-1];
  const mr=targets.filter(r=>r.month===month);
  const pmr=(prevRecs||[]).filter(match);
  const prevUMap={},prevDMap={};
  pmr.forEach(r=>{prevUMap[r.unit]=(prevUMap[r.unit]||0)+r.amt;const d=r.dept||r.unit;prevDMap[d]=(prevDMap[d]||0)+r.amt;});
  const uMap={},dMap={};
  mr.forEach(r=>{
    const u=r.unit||"미분류",cat=classify(r.acc),d=r.dept||r.unit||"미분류";
    if(!uMap[u])uMap[u]={unit:u,hq:isHQUnit(u),제조경비:0,판관비:0,total:0,prev:prevUMap[u]||0,memoMap:{}};
    uMap[u][cat]+=r.amt;uMap[u].total+=r.amt;
    const key=r.memo||"(적요없음)";uMap[u].memoMap[key]=(uMap[u].memoMap[key]||0)+r.amt;
    if(!dMap[d])dMap[d]={dept:d,unit:u,hq:isHQDept(d)||isHQUnit(u),제조경비:0,판관비:0,total:0,prev:prevDMap[d]||0,memoMap:{}};
    dMap[d][cat]+=r.amt;dMap[d].total+=r.amt;dMap[d].memoMap[key]=(dMap[d].memoMap[key]||0)+r.amt;
  });
  Object.keys(prevUMap).forEach(u=>{if(!uMap[u])uMap[u]={unit:u,hq:isHQUnit(u),제조경비:0,판관비:0,total:0,prev:prevUMap[u],memoMap:{}};});
  const toList=m=>Object.values(m).map(x=>({...x,diff:x.total-x.prev,memos:Object.entries(x.memoMap).map(([t,a])=>({text:t,amt:a})).sort((a,b)=>b.amt-a.amt)})).sort((a,b)=>b.total-a.total);
  const units=toList(uMap),depts=toList(dMap);
  const prevMonths=[...new Set(pmr.map(r=>r.month).filter(Boolean))].sort();
  return{month,prevMonth:prevMonths[prevMonths.length-1]||null,units,depts,
    grandTotal:units.reduce((s,u)=>s+u.total,0),grandPrev:units.reduce((s,u)=>s+u.prev,0),
    grandMfg:units.reduce((s,u)=>s+u.제조경비,0),grandSga:units.reduce((s,u)=>s+u.판관비,0)};
}

// Telegram 알림 전송 - Edge Function 경유 (브라우저 직접 호출 차단 우회)
async function sendTelegramAlert(token,accountName,settings){
  const{telegramToken,telegramChatId,appUrl,sbUrl}=settings;
  if(!telegramToken||!telegramChatId)return false;
  const base=appUrl||window.location.origin+window.location.pathname;
  const approveUrl=base+(base.includes("?")?"&":"?")+"action=approve&token="+token;
  const rejectUrl=base+(base.includes("?")?"&":"?")+"action=reject&token="+token;
  const msg="🔔 [한라엔컴 비용분석시스템]\n\n"
    +"계정 <b>"+accountName+"</b> 접속 요청\n"
    +"시각: "+new Date().toLocaleString("ko-KR")+"\n\n"
    +"✅ <a href='"+approveUrl+"'>승인하기</a>\n"
    +"❌ <a href='"+rejectUrl+"'>거부하기</a>";
  // Edge Function URL (Supabase 프로젝트 URL 기반)
  const projectUrl=settings.sbUrl||DEFAULT_SB_URL;
  const edgeUrl=projectUrl+"/functions/v1/send-telegram";
  try{
    const sb=getSB();
    const anonKey=settings.sbKey||DEFAULT_SB_KEY;
    const res=await fetch(edgeUrl,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+anonKey},
      body:JSON.stringify({token:telegramToken,chatId:telegramChatId,message:msg})
    });
    if(res.ok)return true;
    console.warn("Edge Function 실패, 직접 전송 시도");
    // 폴백: 직접 전송 시도 (Chrome에서는 작동)
    await fetch("https://api.telegram.org/bot"+telegramToken+"/sendMessage",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({chat_id:telegramChatId,text:msg,parse_mode:"HTML",disable_web_page_preview:true})
    });
    return true;
  }catch(e){console.error("Telegram 전송 실패:",e);return false;}
}

// 승인/거부 처리 (URL 파라미터로 진입)
async function handleApprovalUrl(){
  const params=new URLSearchParams(window.location.search);
  const action=params.get("action");
  const token=params.get("token");
  if(!action||!token)return null;
  const sb=getSB();
  if(sb&&(action==="approve"||action==="reject")){
    try{
      await sb.from("access_requests").update({
        status:action==="approve"?"approved":"rejected",
        resolved_at:new Date().toISOString()
      }).eq("token",token);
    }catch{}
  }
  // URL 파라미터 제거
  window.history.replaceState({},"",window.location.pathname);
  return action;
}

/* ═══ Claude API ═══ */
async function callClaude(prompt,apiKey){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),60000);
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:2048,messages:[{role:"user",content:prompt}]}),
      signal:ctrl.signal
    });
    clearTimeout(tid);
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||"HTTP "+res.status);}
    const d=await res.json();
    return d.content?.[0]?.text||"";
  }catch(e){clearTimeout(tid);if(e.name==="AbortError")throw new Error("응답 시간 초과(60초). 다시 시도해주세요.");throw e;}
}

async function runAI(compare,currentMonth,prevMonth,apiKey){
  const{units,totals}=compare;
  const tc=totals.curr,tp=totals.prev,gc=tc.mfg+tc.sga,gp=tp.mfg+tp.sga;

  // 데이터 구성
  var lines=[];
  lines.push("기간: "+mLabel(prevMonth||"")+" -> "+mLabel(currentMonth));
  lines.push("제조경비: "+fmt(tp.mfg)+"->"+fmt(tc.mfg)+"("+dLabel(tc.mfg-tp.mfg)+","+pctS(tc.mfg,tp.mfg)+")");
  lines.push("판관비: "+fmt(tp.sga)+"->"+fmt(tc.sga)+"("+dLabel(tc.sga-tp.sga)+","+pctS(tc.sga,tp.sga)+")");
  lines.push("합계: "+fmt(gp)+"->"+fmt(gc)+"("+dLabel(gc-gp)+","+pctS(gc,gp)+")");
  lines.push("");
  units.slice(0,15).forEach(function(u){
    var d=u.totalCurr-u.totalPrev;
    if(Math.abs(d)<50000)return;
    lines.push("["+u.unit+"] "+fmt(u.totalPrev)+"->"+fmt(u.totalCurr)+" ("+dLabel(d)+")");
    u.accs.slice(0,5).forEach(function(a){
      if(Math.abs(a.diff)<50000)return;
      var isUp=a.diff>0;
      var memos=isUp?(a.currMemos||a.memos||[]):(a.prevMemos||a.memos||[]);
      var memoStr=memos.slice(0,2).map(function(m){return m.text.slice(0,20)+"("+fmtS(m.amt)+")";}).join(" / ");
      lines.push("  "+a.acc+"("+a.cat+"): "+dLabel(a.diff)+"원"+(memoStr?" - "+memoStr:""));
    });
  });
  var dataStr=lines.join("\n");

  // 구분자 텍스트 형식 프롬프트 (JSON 절대 사용 안 함)
  var prompt="레미콘 골재 제조업 비용분석 전문가입니다.\n"
    +"아래 데이터를 분석하고 반드시 아래 태그 형식으로만 출력하세요.\n"
    +"규칙: 의견권고 금지. 수치팩트만. 문체:~함~임. 감소항목은 전월 적요 참고하여 전월에 있었던 비용이 사라진 원인 기술.\n\n"
    +"[데이터]\n"+dataStr+"\n\n"
    +"[출력 형식 - 반드시 이 태그 그대로 사용]\n"
    +"SUMMARY: 전체 수치 요약 1문장 (총액, 제조/판관 증감액 포함)\n"
    +"UP1: 단위명 > 계정명: 증감액 - 원인\n"
    +"UP2: 단위명 > 계정명: 증감액 - 원인\n"
    +"UP3: 단위명 > 계정명: 증감액 - 원인\n"
    +"DN1: 단위명 > 계정명: 감소액 - 전월에 있었던 비용 설명\n"
    +"DN2: 단위명 > 계정명: 감소액 - 전월에 있었던 비용 설명\n"
    +"WARN1: 이상징후 내용\n"
    +"UNIT_단위명: 해당 단위 요약 1문장";

  var rawText=await callClaude(prompt,apiKey);
  console.log("Claude 응답:", rawText.slice(0,300));

  // 구분자 파싱 (절대 깨지지 않음)
  var result={overallComment:"",upFactors:[],dnFactors:[],keyInsights:[],warnings:[],unitComments:{}};
  rawText.split("\n").forEach(function(line){
    line=line.trim();
    if(line.startsWith("SUMMARY:")){
      result.overallComment=line.replace(/^SUMMARY:\s*/,"");
    }else if(/^UP\d+:/.test(line)){
      var v=line.replace(/^UP\d+:\s*/,"");
      if(v)result.upFactors.push(v);
    }else if(/^DN\d+:/.test(line)){
      var v=line.replace(/^DN\d+:\s*/,"");
      if(v)result.dnFactors.push(v);
    }else if(/^WARN\d*:/.test(line)){
      var v=line.replace(/^WARN\d*:\s*/,"");
      if(v)result.warnings.push(v);
    }else if(/^UNIT_/.test(line)){
      var colonIdx=line.indexOf(":");
      if(colonIdx>0){
        var unitName=line.slice(5,colonIdx).trim();
        var summary=line.slice(colonIdx+1).trim();
        if(unitName&&summary)result.unitComments[unitName]={summary:summary,details:[]};
      }
    }
  });
  result.keyInsights=result.upFactors;

  // 파싱 결과 없으면 수치 직접 계산
  if(!result.overallComment){
    result.overallComment=mLabel(currentMonth)+" 총비용 "+fmt(gc)+"원, 전월 대비 "+dLabel(gc-gp)+"원("+pctS(gc,gp)+") 변동함. 제조경비 "+dLabel(tc.mfg-tp.mfg)+"원("+pctS(tc.mfg,tp.mfg)+"), 판관비 "+dLabel(tc.sga-tp.sga)+"원("+pctS(tc.sga,tp.sga)+") 증감함.";
  }
  return result;
}

/* ─── 세로막대 차트 (가로 나열) ─── */
function VBarChart({data}){
  if(!data||!data.length)return null;
  const CHART_H=420,LABEL_H=40,TOP=10,BW=20,GAP=6,PAD=10;
  const maxV=Math.max(...data.flatMap(d=>[d.prev,d.curr]),1);
  const COL=BW*2+GAP+8,W=data.length*COL+PAD*2,H=CHART_H+LABEL_H+TOP+16;
  const GRIDS=[0.25,0.5,0.75,1.0];
  return(
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{display:"block",minWidth:300,width:"100%"}}>
        {GRIDS.map(pct=>{
          const y=TOP+(1-pct)*CHART_H;
          return <g key={pct}><line x1={0} y1={y} x2={W} y2={y} stroke="#f1f5f9" strokeWidth="1"/><text x={2} y={y-2} fontSize={8} fill="#94a3b8">{fmtS(maxV*pct)}</text></g>;
        })}
        {data.map((d,i)=>{
          const x=PAD+i*COL;
          const ph=Math.max(Math.round(d.prev/maxV*CHART_H),1);
          const ch=Math.max(Math.round(d.curr/maxV*CHART_H),1);
          const up=d.curr>=d.prev;
          const py=TOP+CHART_H-ph,cy=TOP+CHART_H-ch;
          return(
            <g key={i}>
              <rect x={x} y={py} width={BW} height={ph} fill="#e2e8f0" rx="2"/>
              <rect x={x+BW+GAP} y={cy} width={BW} height={ch} fill={up?"#ef4444":"#22c55e"} rx="2"/>
              {ch>14&&<text x={x+BW+GAP+BW/2} y={cy-3} fontSize={8} fill={up?"#dc2626":"#16a34a"} textAnchor="middle" fontWeight="600">{fmtS(d.curr)}</text>}
              <text x={x+BW+GAP/2} y={TOP+CHART_H+LABEL_H-4} fontSize={9} fill={d.isHQ?"#7c3aed":"#475569"} textAnchor="middle">{d.name.length>5?d.name.slice(0,5)+"…":d.name}</text>
            </g>
          );
        })}
      </svg>
      <div style={{display:"flex",gap:14,fontSize:11,color:"#64748b",marginTop:4}}>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#e2e8f0",borderRadius:2,marginRight:3}}></span>전월</span>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#ef4444",borderRadius:2,marginRight:3}}></span>증가</span>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#22c55e",borderRadius:2,marginRight:3}}></span>감소</span>
        <span><span style={{display:"inline-block",width:10,height:8,background:"#8b5cf6",borderRadius:2,marginRight:3}}></span>본사</span>
      </div>
    </div>
  );
}
function CostChart({units}){
  const toAmt=u=>u.curr.mfg+u.curr.sga;
  const toPrev=u=>u.prev.mfg+u.prev.sga;
  const siteData=SITE_ORDER.map(name=>{const u=units.find(u=>u.unit===name);return u?{name:name.length>6?name.slice(0,6)+"…":name,prev:toPrev(u),curr:toAmt(u),isHQ:false}:null;}).filter(Boolean);
  const hqUnits=units.filter(u=>isHQUnit(u.unit)).sort((a,b)=>toAmt(b)-toAmt(a));
  const hqData=hqUnits.map(u=>({name:u.unit.length>6?u.unit.slice(0,6)+"…":u.unit,prev:toPrev(u),curr:toAmt(u),isHQ:true}));
  return <VBarChart data={[...siteData,...hqData]}/>;
}

}

/* ═══ 계정별 분석 ═══ */
const ACCT_STRUCTURE=[
  {section:"II. 노무비",items:["임금(제)","퇴직급여(제)","잡급(제)"]},
  {section:"III. 제조경비",items:["중기유지비","전력비(제)","수도광열비(제)","수선비(제)","교육훈련비(제)","소모품비(제)","세금과공과(제)","감가상각비(제)","감가상각비(제)_사용권자산","보상비(제)","지급임차료(제)","도서인쇄비(제)","보험료(제)","복리후생비(제)","지급수수료(제)","화약대(제)","의료비(제)","운반비(제)","안전관리비(제)","복구비(제)","석산채굴권상각"]},
  {section:"IV. 판매비와 관리비",items:["급여","퇴직급여","복리후생비","여비교통비","통신비","세금과공과","지급임차료","감가상각비","감가상각비_사용권자산","보험료","접대비","광고선전비","교육훈련비","차량유지비","소모품비","도서인쇄비","지급수수료","수도광열비","수선비","판매수수료","의료비","전력비","보상비","대손상각비","특허권상각","광업권상각","영업권상각","소프트웨어상각","경상연구개발비","잡급","잡비","안전관리비"]}
];
function buildAcctData(units){
  const curr={},prev={};
  units.forEach(u=>u.accs.forEach(a=>{const na=normAcc(a.acc);curr[na]=(curr[na]||0)+a.c;prev[na]=(prev[na]||0)+a.p;}));
  return{curr,prev};
}
function AccountTab({units,currentMonth,prevMonth}){
  const [collapsed,setCollapsed]=useState({});
  const{curr,prev}=buildAcctData(units);
  const toggleSec=sec=>setCollapsed(s=>({...s,[sec]:!s[sec]}));
  const secTotal=(items,map)=>items.reduce((s,item)=>s+(map[normAcc(item)]||0),0);
  const totalC=Object.values(curr).reduce((s,v)=>s+v,0);
  const totalP=Object.values(prev).reduce((s,v)=>s+v,0);
  const th={padding:"9px 14px",background:"#0f2040",color:"white",fontSize:11,fontWeight:700,textAlign:"right",whiteSpace:"nowrap",borderRight:"1px solid rgba(255,255,255,0.08)"};
  const thL={...th,textAlign:"left"};
  return(
    <div style={{maxWidth:1000}}>
      <div style={{marginBottom:20}}><h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",margin:0}}>계정별 분석</h2><p style={{fontSize:13,color:"#64748b",margin:"4px 0 0"}}>{prevMonth?mLabel(prevMonth)+" → ":""}{mLabel(currentMonth)} · 제조원가명세서 + 손익계산서 기준</p></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {[{l:"당월 총비용",v:fmt(totalC)+"원",sub:fmtS(totalC),c:"#0f2040"},{l:"전월 총비용",v:fmt(totalP)+"원",sub:fmtS(totalP),c:"#64748b"},{l:"증감액",v:dLabel(totalC-totalP)+"원",sub:pctS(totalC,totalP),c:(totalC-totalP)>0?"#dc2626":"#16a34a"}].map((k,i)=>(
          <div key={i} style={{background:"white",borderRadius:10,padding:"14px 18px",border:"1px solid #e2e8f0",borderTop:"3px solid "+k.c}}>
            <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:4}}>{k.l}</div>
            <div style={{fontSize:16,fontWeight:800,color:k.c}}>{k.v}</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>
      <div style={{background:"white",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr><th style={thL}>계정과목</th><th style={th}>{prevMonth?mLabel(prevMonth):"전월"}</th><th style={th}>{mLabel(currentMonth)}</th><th style={th}>증감액</th><th style={th}>증감률</th><th style={{...th,borderRight:"none"}}>비중</th></tr></thead>
          <tbody>
            {ACCT_STRUCTURE.map((sec,si)=>{
              const secC=secTotal(sec.items,curr),secP=secTotal(sec.items,prev),secD=secC-secP;
              const isCol=collapsed[sec.section];
              return(
                <React.Fragment key={si}>
                  <tr onClick={()=>toggleSec(sec.section)} style={{background:"#1a3a6e",cursor:"pointer"}}>
                    <td style={{padding:"10px 14px",color:"white",fontWeight:800,fontSize:12}}><span style={{marginRight:8,fontSize:10}}>{isCol?"▶":"▼"}</span>{sec.section}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:"rgba(255,255,255,0.75)",fontWeight:700}}>{fmt(secP)}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:"white",fontWeight:800}}>{fmt(secC)}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",fontWeight:800,color:secD>0?"#fca5a5":"#86efac"}}>{dLabel(secD)}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:secD>0?"#fca5a5":"#86efac"}}>{pctS(secC,secP)}</td>
                    <td style={{padding:"10px 14px",textAlign:"right",color:"rgba(255,255,255,0.6)"}}>{totalC>0?(secC/totalC*100).toFixed(1):0}%</td>
                  </tr>
                  {!isCol&&sec.items.map((item,ii)=>{
                    const na=normAcc(item),cv=curr[na]||0,pv=prev[na]||0,d=cv-pv;
                    const anom=Math.abs(d)>=5000000,hasData=cv>0||pv>0;
                    const bg=anom?(d>0?"#fef2f2":"#f0fdf4"):(ii%2===0?"#f8fafc":"white");
                    return(
                      <tr key={ii} style={{background:bg,borderBottom:"1px solid #f1f5f9",opacity:hasData?1:0.4}}>
                        <td style={{padding:"8px 14px 8px 32px",color:anom?(d>0?"#b91c1c":"#166534"):"#374151",fontWeight:anom?600:400}}>{anom&&<span style={{marginRight:5,fontSize:10}}>⚠</span>}({ii+1}) {item}</td>
                        <td style={{padding:"8px 14px",textAlign:"right",color:"#94a3b8"}}>{pv>0?fmt(pv):"-"}</td>
                        <td style={{padding:"8px 14px",textAlign:"right",fontWeight:cv>0?600:400,color:cv>pv?"#dc2626":cv<pv?"#16a34a":"#374151"}}>{cv>0?fmt(cv):"-"}</td>
                        <td style={{padding:"8px 14px",textAlign:"right",fontWeight:anom?700:500,color:dColor(d)}}>{(cv>0||pv>0)?dLabel(d):"-"}</td>
                        <td style={{padding:"8px 14px",textAlign:"right",color:pctC(cv,pv)}}>{pv>0?pctS(cv,pv):"-"}</td>
                        <td style={{padding:"8px 14px",textAlign:"right",color:"#94a3b8",fontSize:11}}>{totalC>0&&cv>0?(cv/totalC*100).toFixed(1)+"%":"-"}</td>
                      </tr>
                    );
                  })}
                  {!isCol&&<tr style={{background:"#f1f5f9",borderBottom:"2px solid #e2e8f0"}}><td style={{padding:"8px 14px 8px 20px",fontWeight:700,color:"#0f2040",fontSize:12}}>소 계</td><td style={{padding:"8px 14px",textAlign:"right",fontWeight:600,color:"#64748b"}}>{fmt(secP)}</td><td style={{padding:"8px 14px",textAlign:"right",fontWeight:800,color:"#0f2040"}}>{fmt(secC)}</td><td style={{padding:"8px 14px",textAlign:"right",fontWeight:800,color:dColor(secD)}}>{dLabel(secD)}</td><td style={{padding:"8px 14px",textAlign:"right",color:pctC(secC,secP)}}>{pctS(secC,secP)}</td><td style={{padding:"8px 14px",textAlign:"right",color:"#475569"}}>{totalC>0?(secC/totalC*100).toFixed(1):0}%</td></tr>}
                </React.Fragment>
              );
            })}
            <tr style={{background:"#0f2040"}}><td style={{padding:"11px 14px",fontWeight:800,color:"white",fontSize:13}}>합 계</td><td style={{padding:"11px 14px",textAlign:"right",color:"rgba(255,255,255,0.7)",fontWeight:700}}>{fmt(totalP)}</td><td style={{padding:"11px 14px",textAlign:"right",color:"white",fontWeight:800,fontSize:14}}>{fmt(totalC)}</td><td style={{padding:"11px 14px",textAlign:"right",fontWeight:800,color:(totalC-totalP)>0?"#fca5a5":"#86efac",fontSize:13}}>{dLabel(totalC-totalP)}</td><td style={{padding:"11px 14px",textAlign:"right",color:(totalC-totalP)>0?"#fca5a5":"#86efac",fontWeight:700}}>{pctS(totalC,totalP)}</td><td style={{padding:"11px 14px",textAlign:"right",color:"rgba(255,255,255,0.55)"}}>100%</td></tr>
          </tbody>
        </table>
      </div>
      <div style={{marginTop:10,fontSize:11,color:"#94a3b8"}}>※ 섹션 클릭시 접기/펼치기 · ⚠ 500만원 이상 증감</div>
    </div>
  );
}

/* ═══ ItemAnalysisTab (수선비/소모품비/시내교통비/국내출장비) ═══ */
function ItemAnalysisTab({data,label,showDept=false}){
  const [open,setOpen]=useState(null);
  const [view,setView]=useState("site");
  if(!data)return(
    <div style={{maxWidth:800}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",marginBottom:4}}>{label} 사용현황</h2>
      <div style={{background:"white",borderRadius:12,padding:"40px",border:"1px solid #e2e8f0",textAlign:"center",color:"#94a3b8",marginTop:16}}>
        <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>데이터가 없습니다</p>
        <p style={{fontSize:13}}>분석하기 탭에서 당월 파일을 업로드하면 자동으로 표시됩니다.</p>
      </div>
    </div>
  );
  const{month,prevMonth,units,depts,grandTotal,grandPrev,grandMfg,grandSga}=data;
  const grandDiff=grandTotal-(grandPrev||0);
  const siteUnits=units.filter(u=>!u.hq);
  const hqRows=showDept&&depts&&depts.length>0
    ? depts.filter(d=>isHQDept(d.dept||"")||isHQUnit(d.unit||"")).sort((a,b)=>b.total-a.total)
    : units.filter(u=>u.hq);
  const curRows=view==="site"?siteUnits:hqRows;
  const curTotal=curRows.reduce((s,u)=>s+u.total,0),curPrev=curRows.reduce((s,u)=>s+(u.prev||0),0);

  const renderRow=(row,i)=>{
    const isOpen=open===i,share=curTotal>0?(row.total/curTotal*100).toFixed(1):0,diff=row.total-(row.prev||0);
    const key=view==="hq"&&showDept?(row.dept||row.unit):(row.unit||row.dept);
    return(
      <React.Fragment key={i}>
        <tr onClick={()=>setOpen(isOpen?null:i)} style={{background:isOpen?"#eff6ff":i%2===0?"white":"#f8fafc",cursor:"pointer",borderBottom:"1px solid #f1f5f9"}}>
          <td style={{padding:"9px 10px",fontWeight:600,color:"#1e293b"}}><span style={{marginRight:6,color:"#94a3b8",fontSize:10}}>{isOpen?"▼":"▶"}</span>{key}</td>
          <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:"#0f2040"}}>{fmt(row.total)}</td>
          <td style={{padding:"9px 10px",textAlign:"right",color:"#64748b"}}>{(row.prev||0)>0?fmt(row.prev):"-"}</td>
          <td style={{padding:"9px 10px",textAlign:"right",fontWeight:700,color:dColor(diff)}}>{(row.prev||0)>0?dLabel(diff):"-"}</td>
          <td style={{padding:"9px 10px",textAlign:"right",color:pctC(row.total,row.prev)}}>{(row.prev||0)>0?pctS(row.total,row.prev||1):"-"}</td>
          <td style={{padding:"9px 10px",textAlign:"right",color:"#2563eb"}}>{(row["제조경비"]||0)>0?fmt(row["제조경비"]):"-"}</td>
          <td style={{padding:"9px 10px",textAlign:"right",color:"#7c3aed"}}>{(row["판관비"]||0)>0?fmt(row["판관비"]):"-"}</td>
          <td style={{padding:"9px 10px",color:"#475569",fontSize:11}}>{row.memos?.[0]?<span>{row.memos[0].text.slice(0,28)}{row.memos[0].text.length>28?"…":""} <b style={{color:"#1e40af"}}>{fmtS(row.memos[0].amt)}</b></span>:"-"}</td>
          <td style={{padding:"9px 10px",textAlign:"right"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
              <div style={{width:36,height:6,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}><div style={{width:share+"%",height:"100%",background:"#2563eb",borderRadius:3}}></div></div>
              <span style={{fontSize:10,color:"#64748b",minWidth:28}}>{share}%</span>
            </div>
          </td>
        </tr>
        {isOpen&&row.memos&&row.memos.length>0&&(
          <tr><td colSpan={9} style={{padding:0,background:"#f8fafc",borderBottom:"2px solid #bfdbfe"}}>
            <div style={{padding:"12px 16px"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#1e40af",marginBottom:8}}>적요별 상세 ({row.memos.length}건)</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead><tr style={{background:"#dbeafe"}}>{["순위","적요","금액","비중"].map((h,j)=><th key={j} style={{padding:"5px 8px",textAlign:j===1?"left":"right",color:"#1e40af",fontWeight:700}}>{h}</th>)}</tr></thead>

/* ═══ 종합분석결과 탭 ═══ */

          {(()=>{

                  <div><div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:3}}>전월 대비</div><div style={{fontSize:20,fontWeight:800,color:dT>0?"#dc2626":"#16a34a"}}>{dT>0?"+":""}{fmtS(dT)}</div></div>

                </div>
                {items.map((item,ii)=>{const d=item.c-item.p,cW=Math.round(item.c/maxV*100),pW=Math.round(item.p/maxV*100);return(
                  <div key={ii} style={{marginBottom:ii===0?10:0}}>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{background:"white",borderRadius:10,padding:"16px 20px",border:"1px solid #e2e8f0",borderLeft:"4px solid #dc2626"}}>
                <div style={{fontSize:13,fontWeight:800,color:"#dc2626",marginBottom:12}}>▲ 증가 요인</div>
                {(aiComments.upFactors||[]).map((k,i)=><div key={i} style={{fontSize:12,color:"#4b5563",lineHeight:1.7,marginTop:i>0?8:0,paddingTop:i>0?8:0,borderTop:i>0?"1px solid #f1f5f9":"none"}}><span style={{fontWeight:700,color:"#dc2626",marginRight:6}}>{i+1}.</span>{k}</div>)}
              </div>
              <div style={{background:"white",borderRadius:10,padding:"16px 20px",border:"1px solid #e2e8f0",borderLeft:"4px solid #16a34a"}}>
                <div style={{fontSize:13,fontWeight:800,color:"#16a34a",marginBottom:12}}>▼ 감소 요인</div>
                {(aiComments.dnFactors||[]).map((k,i)=><div key={i} style={{fontSize:12,color:"#4b5563",lineHeight:1.7,marginTop:i>0?8:0,paddingTop:i>0?8:0,borderTop:i>0?"1px solid #f1f5f9":"none"}}><span style={{fontWeight:700,color:"#16a34a",marginRight:6}}>{i+1}.</span>{k}</div>)}
                {(aiComments.warnings||[]).length>0&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #f1f5f9"}}><div style={{fontSize:12,fontWeight:700,color:"#b91c1c",marginBottom:6}}>⚠ 주의</div>{(aiComments.warnings||[]).map((w,i)=><div key={i} style={{fontSize:11,color:"#991b1b",lineHeight:1.65}}>{w}</div>)}</div>}
              </div>
            </div>
          )}
          {/* 단위별 코멘트 */}
          {Object.keys(aiComments?.unitComments||{}).length===0&&(aiComments?.upFactors||[]).length===0&&(
            <div style={{textAlign:"center",padding:40,color:"#94a3b8"}}><p style={{fontSize:14,fontWeight:600,marginBottom:6}}>분석 코멘트 없음</p><p style={{fontSize:12}}>재분석 시 포함될 수 있습니다.</p></div>
          )}
          {Object.entries(aiComments?.unitComments||{}).map(([unit,cm],i)=>(
            <div key={i} style={{background:"white",borderRadius:10,padding:"16px 20px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:"1px solid #e2e8f0",borderLeft:"4px solid #3b82f6"}}>
              <div style={{fontSize:14,fontWeight:800,color:"#0f2040",marginBottom:10}}>{unit}</div>
              <div style={{fontSize:13,color:"#374151",marginBottom:10,fontWeight:500}}>{(cm.summary||"").split("\n\n").filter(p=>p.trim()).map((para,pi)=><p key={pi} style={{lineHeight:1.7,margin:pi>0?"8px 0 0":0}}>{para.trim()}</p>)}</div>
              {cm.details?.length>0&&<div style={{display:"flex",flexDirection:"column",gap:4,borderTop:"1px solid #e2e8f0",paddingTop:10}}>{cm.details.map((detail,j)=><div key={j} style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:12,color:"#4b5563",lineHeight:1.65}}><span style={{flexShrink:0,width:17,height:17,background:"#dbeafe",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#1d4ed8",marginTop:1}}>{j+1}</span><span>{detail}</span></div>)}</div>}
            </div>

      )}

}

/* ═══ 분석하기 탭 ═══ */
function DropZone({label,fileName,onUpload,required,badge}){
  const ref=useRef();const [drag,setDrag]=useState(false);
  function handle(file){if(!file||(!file.name.endsWith(".xlsx")&&!file.name.endsWith(".xls"))){alert("xlsx/xls만 지원합니다.");return;}onUpload(file);}
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <label style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{label}</label>
        {required&&<span style={{fontSize:10,padding:"1px 6px",background:"#fee2e2",color:"#dc2626",borderRadius:4,fontWeight:700}}>필수</span>}
        {badge&&<span style={{fontSize:10,padding:"1px 6px",background:"#dbeafe",color:"#1d4ed8",borderRadius:4}}>{badge}</span>}
      </div>
      <div onClick={()=>ref.current.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0]);}}
        style={{border:"2px dashed "+(fileName?"#16a34a":drag?"#3b82f6":"#cbd5e1"),borderRadius:10,padding:"18px 16px",textAlign:"center",cursor:"pointer",background:fileName?"#f0fdf4":drag?"#eff6ff":"#f8fafc"}}>
        {fileName?<p style={{margin:0,fontSize:12,color:"#166534",fontWeight:600}}>{"✓ "+fileName}</p>:<div><p style={{margin:0,fontSize:12,color:"#64748b"}}>클릭 또는 드래그</p><p style={{margin:"2px 0 0",fontSize:11,color:"#94a3b8"}}>.xlsx / .xls</p></div>}
      </div>
      <input ref={ref} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>e.target.files[0]&&handle(e.target.files[0])}/>
    </div>
  );
}

function UploadTab({currFile,prevFile,onCurrUpload,onPrevUpload,onAnalyze,analyzing,error,hasKey,history,onPrevHist}){
  return(
    <div style={{maxWidth:760}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",marginBottom:4}}>분석하기</h2>
      <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>ERP Excel 파일을 업로드하고 비용 증감 분석을 실행합니다</p>
      <Card title="파일 업로드" mb={16}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <DropZone label="당월 파일" fileName={currFile} onUpload={onCurrUpload} required={true}/>
          <DropZone label="전월 파일" fileName={prevFile} onUpload={onPrevUpload} badge="비교기준"/>
        </div>
        {history.length>0&&!prevFile&&(
          <div style={{marginTop:14,padding:"10px 14px",background:"#eff6ff",borderRadius:8,border:"1px solid #bfdbfe"}}>
            <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:"#1e40af"}}>히스토리에서 전월 선택</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>{history.slice(0,6).map((h,i)=><button key={i} onClick={()=>onPrevHist(h)} style={{padding:"4px 12px",background:"white",border:"1px solid #93c5fd",borderRadius:20,fontSize:12,cursor:"pointer",color:"#1d4ed8",fontWeight:500}}>{mLabel(h.currentMonth)}</button>)}</div>
          </div>
        )}
      </Card>
      <Card title="분석 제외 계정과목" mb={16} accent="#f59e0b">
        <p style={{fontSize:12,color:"#64748b",marginBottom:10}}>아래 항목은 이중계상 방지 및 집계 대분류로 분석에서 제외됩니다.</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{EXCLUDE_LABEL.map(k=><span key={k} style={{padding:"3px 10px",background:"#fef9c3",border:"1px solid #fde047",borderRadius:20,fontSize:11,color:"#92400e",fontWeight:500}}>{k}</span>)}</div>
      </Card>
      {!hasKey&&<div style={{padding:"10px 14px",background:"#fef9c3",border:"1px solid #fde047",borderRadius:8,fontSize:13,color:"#713f12",marginBottom:16}}>Gemini API 키가 없습니다. 설정 메뉴에서 입력하세요.</div>}
      {error&&<div style={{padding:"10px 14px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,fontSize:13,color:"#b91c1c",marginBottom:16}}>{error}</div>}
      <button onClick={onAnalyze} disabled={analyzing||!currFile||!hasKey}
        style={{padding:"14px 44px",background:(analyzing||!currFile||!hasKey)?"#94a3b8":"linear-gradient(135deg,#1a3a6e,#2563eb)",color:"white",border:"none",borderRadius:10,fontSize:15,fontWeight:800,cursor:(analyzing||!currFile||!hasKey)?"not-allowed":"pointer",display:"flex",alignItems:"center"}}>
        {analyzing?<><Spinner/>{"AI 분석 중... (최대 40초)"}</>:"분석 실행"}
      </button>
    </div>
  );
}





/* ═══ 히스토리 ═══ */
function HistoryTab({history,sbRows,sbLoading,onRefreshSB,onSelect,onDelete,onDeleteSB}){
  const [tab,setTab]=useState("cloud");
  const hasSB=getSB()!==null;

  function HistCard({h,isSB}){
    const res=isSB?h.result_data:h;
    const tot=res?.comparison?.totals;
    const gc=tot?tot.curr.mfg+tot.curr.sga:0,gp=tot?tot.prev.mfg+tot.prev.sga:0;
    const month=isSB?h.month:h.currentMonth;
    const prevMonth=isSB?res?.prevMonth:h.prevMonth;
    const savedAt=h.saved_at||h.savedAt;
    const badges=isSB?[h.activity_data?"사업활동비":null,h.repair_data?"수선비":null,h.supply_data?"소모품비":null,h.transport_data?"시내교통비":null,h.trip_data?"국내출장비":null].filter(Boolean):[];
    return(
      <div style={{background:"white",borderRadius:10,padding:"16px 20px",boxShadow:"0 1px 4px rgba(0,0,0,0.07)",border:"1px solid #e2e8f0"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:44,height:44,background:"linear-gradient(135deg,#1a3a6e,#2563eb)",borderRadius:10,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"white"}}>{isSB?"☁":"💾"}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:15,fontWeight:800,color:"#1e293b"}}>{mLabel(month)} 실적 분석</span>
              {isSB&&<span style={{fontSize:10,padding:"1px 6px",background:"#dbeafe",color:"#1d4ed8",borderRadius:4,fontWeight:600}}>공유</span>}
            </div>
            <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{prevMonth?mLabel(prevMonth)+" 대비":"단독"} · {savedAt?new Date(savedAt).toLocaleString("ko-KR"):""}</div>
            {tot&&<div style={{fontSize:13,marginTop:4}}>총비용 <b>{fmt(gc)}</b>원 · <span style={{color:dColor(gc-gp),fontWeight:700}}>{dLabel(gc-gp)}원</span></div>}
            {badges.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>{badges.map(b=><span key={b} style={{fontSize:10,padding:"1px 7px",background:"#f1f5f9",color:"#475569",borderRadius:10,border:"1px solid #e2e8f0"}}>{b}</span>)}</div>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <button onClick={()=>onSelect(h)} style={{padding:"8px 16px",background:"#1a3a6e",color:"white",border:"none",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:600}}>보기</button>
            {isSB&&onDeleteSB&&<button onClick={()=>onDeleteSB(h.id)} style={{padding:"6px 16px",background:"white",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,fontSize:11,cursor:"pointer"}}>삭제</button>}
            {!isSB&&<button onClick={()=>onDelete(h.key)} style={{padding:"6px 16px",background:"white",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,fontSize:11,cursor:"pointer"}}>삭제</button>}
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{maxWidth:880}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div><h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",margin:0}}>분석 히스토리</h2><p style={{fontSize:13,color:"#64748b",margin:"4px 0 0"}}>클라우드 결과는 누구든 URL 접속 시 열람 가능</p></div>
        {hasSB&&<button onClick={onRefreshSB} style={{padding:"8px 14px",background:"white",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,cursor:"pointer",color:"#475569"}}>{sbLoading?"로딩 중...":"☁ 새로고침"}</button>}
      </div>

function Login({onLogin}){
  const [id,setId]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [phase,setPhase]=useState("login");
  const [token,setToken]=useState("");
  const [countdown,setCountdown]=useState(120);
  const pollRef=useRef(null);
  const countRef=useRef(null);

  useEffect(()=>{
    handleApprovalUrl().then(action=>{
      if(action==="approve")setPhase("admin_approved");
      else if(action==="reject")setPhase("admin_rejected");
    });
    // 앱 시작 시 Supabase에서 최신 계정 동기화
    loadAccounts().then(accs=>{if(accs&&accs.length>0)lsSet("app:accounts",accs);});
  },[]);

  function stopPolling(){clearInterval(pollRef.current);clearInterval(countRef.current);}

  async function doLogin(){
    const account=findAccount(id,pw);
    if(!account){
      // Supabase에서 최신 계정 재확인
      const latestAccts=await loadAccounts();
      const found=latestAccts.find(a=>a.id===id&&a.pw===pw);
      if(!found){setErr("아이디 또는 비밀번호가 올바르지 않습니다.");return;}
      lsSet("app:accounts",latestAccts);
      doLoginSuccess(found);return;
    }
    doLoginSuccess(account);
  }

  async function doLoginSuccess(account){
    setErr("");
    try{const logs=JSON.parse(localStorage.getItem("ip:logs")||"[]");logs.unshift({time:new Date().toISOString(),id:account.id,ua:navigator.userAgent.slice(0,80)});localStorage.setItem("ip:logs",JSON.stringify(logs.slice(0,50)));}catch{}
    const s=lsGet("app:settings")||{};
    const hasTelegram=s.telegramToken&&s.telegramChatId;
    const hasSB=getSB()!==null;
    if(hasTelegram&&hasSB){
      const tk=Math.random().toString(36).slice(2)+Date.now().toString(36);
      setToken(tk);
      await submitAccessRequest(tk,account.name||account.id);
      await sendTelegramAlert(tk,account.name||account.id,s);
      setPhase("waiting");setCountdown(120);
      countRef.current=setInterval(()=>setCountdown(n=>{if(n<=1){stopPolling();setPhase("timeout");return 0;}return n-1;}),1000);
      pollRef.current=setInterval(async()=>{
        const st=await pollApproval(tk);
        if(st==="approved"){stopPolling();setPhase("approved");setTimeout(()=>onLogin(account),800);}
        else if(st==="rejected"){stopPolling();setPhase("rejected");}
      },3000);
    }else{onLogin(account);}
  }

  const inp={width:"100%",padding:"11px 14px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,outline:"none",background:"#f8fafc"};

  if(phase==="admin_approved")return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#0f2040,#1a3a6e)"}}>
      <div style={{width:380,padding:"40px",background:"white",borderRadius:16,textAlign:"center"}}><div style={{fontSize:48,marginBottom:16}}>✅</div><h2 style={{color:"#166534"}}>승인 완료</h2><p style={{color:"#64748b",marginTop:8}}>이 창을 닫으세요.</p></div>
    </div>
  );
  if(phase==="admin_rejected")return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#0f2040,#1a3a6e)"}}>
      <div style={{width:380,padding:"40px",background:"white",borderRadius:16,textAlign:"center"}}><div style={{fontSize:48,marginBottom:16}}>❌</div><h2 style={{color:"#dc2626"}}>거부 완료</h2><p style={{color:"#64748b",marginTop:8}}>이 창을 닫으세요.</p></div>
    </div>
  );
  if(phase!=="login")return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#0f2040,#1a3a6e)"}}>
      <div style={{width:400,padding:"40px",background:"white",borderRadius:16,textAlign:"center",boxShadow:"0 24px 80px rgba(0,0,0,0.45)"}}>
        {phase==="waiting"&&<><div style={{width:56,height:56,margin:"0 auto 20px",border:"5px solid #e2e8f0",borderTopColor:"#2563eb",borderRadius:"50%",animation:"spin 1s linear infinite"}}></div><h2 style={{fontSize:18,fontWeight:800,color:"#0f2040",marginBottom:8}}>승인 대기 중...</h2><p style={{fontSize:13,color:"#64748b",marginBottom:16}}>관리자에게 Telegram 알림을 보냈습니다.</p><div style={{padding:"10px 16px",background:"#f1f5f9",borderRadius:8,fontSize:13,color:"#1e40af",fontWeight:600}}>{Math.floor(countdown/60)}:{String(countdown%60).padStart(2,"0")} 후 자동 만료</div><button onClick={()=>{stopPolling();setPhase("login");}} style={{marginTop:16,padding:"8px 20px",background:"white",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13,cursor:"pointer",color:"#64748b"}}>취소</button></>}
        {phase==="approved"&&<><div style={{fontSize:48,marginBottom:16}}>✅</div><h2 style={{fontSize:18,fontWeight:800,color:"#166534"}}>승인됨 — 접속 중...</h2></>}
        {phase==="rejected"&&<><div style={{fontSize:48,marginBottom:16}}>❌</div><h2 style={{fontSize:18,fontWeight:800,color:"#dc2626",marginBottom:8}}>접속이 거부되었습니다</h2><button onClick={()=>setPhase("login")} style={{padding:"10px 24px",background:"#0f2040",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:14}}>돌아가기</button></>}
        {phase==="timeout"&&<><div style={{fontSize:48,marginBottom:16}}>⏰</div><h2 style={{fontSize:18,fontWeight:800,color:"#92400e",marginBottom:8}}>시간 초과</h2><button onClick={()=>setPhase("login")} style={{padding:"10px 24px",background:"#0f2040",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:14}}>다시 시도</button></>}
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#0f2040,#1a3a6e)"}}>
      <div style={{width:380,padding:"40px 36px",background:"rgba(255,255,255,0.97)",borderRadius:16,boxShadow:"0 24px 80px rgba(0,0,0,0.45)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:52,height:52,margin:"0 auto 14px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",borderRadius:14}}></div>
          <h1 style={{margin:0,fontSize:22,fontWeight:800,color:"#0f2040"}}>비용실적 분석시스템</h1>
          <p style={{margin:"6px 0 0",fontSize:13,color:"#64748b"}}>한라엔컴㈜ ERP 비용 분석 플랫폼</p>
        </div>
        <div style={{marginBottom:14}}><label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5}}>아이디</label><input value={id} onChange={e=>setId(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} style={inp}/></div>
        <div style={{marginBottom:14}}><label style={{fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5}}>비밀번호</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} style={inp}/></div>
        {err&&<div style={{padding:"8px 12px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:6,fontSize:13,color:"#dc2626",marginBottom:12}}>{err}</div>}
        <button onClick={doLogin} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",color:"white",border:"none",borderRadius:8,fontSize:15,fontWeight:700,cursor:"pointer",marginTop:4}}>로그인</button>
      </div>
    </div>
  );
}

        {NAV.map(n=><button key={n.id} onClick={()=>onNav(n.id)} style={{width:"100%",padding:"10px 20px",display:"flex",alignItems:"center",background:active===n.id?"rgba(255,255,255,0.12)":"transparent",border:"none",borderLeft:active===n.id?"3px solid #3b82f6":"3px solid transparent",color:active===n.id?"white":"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:13,textAlign:"left",fontWeight:active===n.id?700:400}}>{n.l}</button>)}
      </nav>
      <div style={{padding:"16px 20px",borderTop:"1px solid rgba(255,255,255,0.08)"}}><button onClick={onLogout} style={{width:"100%",padding:"8px 10px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:6,color:"rgba(255,255,255,0.5)",cursor:"pointer",fontSize:12}}>로그아웃</button></div>
    </div>
  );
}

/* ═══ 메인 앱 ═══ */
function App(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [tab,setTab]=useState("upload");
  const [settings,setSettings]=useState({geminiKey:"",creds:{id:"admin",pw:"halla2026"}});
  const [currFile,setCurrFile]=useState(null);const [prevFile,setPrevFile]=useState(null);
  const [currData,setCurrData]=useState(null);const [prevData,setPrevData]=useState(null);
  const [result,setResult]=useState(null);
  const [activityData,setActivityData]=useState(null);
  const [repairData,setRepairData]=useState(null);
  const [supplyData,setSupplyData]=useState(null);
  const [transportData,setTransportData]=useState(null);
  const [tripData,setTripData]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [error,setError]=useState("");
  const [history,setHistory]=useState([]);
  const [sbRows,setSbRows]=useState([]);
  const [sbLoading,setSbLoading]=useState(false);

  useEffect(()=>{
    const s=lsGet("app:settings");if(s)setSettings(s);
    loadHist();
    refreshSB();
  },[]);

  function loadHist(){
    const keys=lsList("analysis:");
    const items=keys.map(k=>{const v=lsGet(k);return v?{key:k,...v}:null;}).filter(Boolean);
    items.sort((a,b)=>(b.savedAt||"").localeCompare(a.savedAt||""));
    setHistory(items);
  }
  async function refreshSB(){
    setSbLoading(true);
    const rows=await sbLoad();
    setSbRows(rows);
    setSbLoading(false);
  }
  function saveSettings(s){setSettings(s);lsSet("app:settings",s);}

  function loadFile(file,type){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"array"});
        const recs=parseERP(wb);
        const agg=aggregate(recs);
        const months=Object.keys(agg).sort();
        if(!months.length){alert("데이터를 찾을 수 없습니다.");return;}
        const data={recs,agg,months,fileName:file.name};
        if(type==="curr"){setCurrData(data);setCurrFile(file.name);setActivityData(buildActivityData(recs));}
        else{setPrevData(data);setPrevFile(file.name);}
      }catch(err){alert("파일 오류: "+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function usePrevHist(h){
    const recAgg={};
    h.comparison?.units?.forEach(u=>{recAgg[u.unit]={};u.accs.forEach(a=>{recAgg[u.unit][a.acc]={amt:a.c,memos:a.memos||[],cat:a.cat};});});
    setPrevData({fromHistory:true,recAgg,months:[h.currentMonth],fileName:mLabel(h.currentMonth)+"(히스토리)"});
    setPrevFile(mLabel(h.currentMonth)+"(히스토리)");
  }

  async function doAnalyze(){
    if(!currData){alert("당월 파일을 업로드해주세요.");return;}
    if(!settings.geminiKey){alert("설정에서 Claude API 키를 입력해주세요.");return;}
    setAnalyzing(true);setError("");
    try{
      const currentMonth=currData.months[currData.months.length-1];
      const currAgg=currData.agg[currentMonth]||{};
      let prevAgg={},prevMonth=null,prevRecs=[];
      if(prevData){
        if(prevData.fromHistory){prevAgg=prevData.recAgg||{};prevMonth=prevData.months[0];}
        else{prevMonth=prevData.months[prevData.months.length-1];prevAgg=prevData.agg[prevMonth]||{};prevRecs=prevData.recs||[];}
      }
      const comparison=buildCompare(currAgg,prevAgg);
      const aiComments=await runAI(comparison,currentMonth,prevMonth,settings.geminiKey);
      const pR=prevRecs;
      const repD=buildItemData(currData.recs,"수선비",pR);
      const supD=buildItemData(currData.recs,"소모품비",pR);
      const traD=buildItemData(currData.recs,"시내교통비",pR);
      const triD=buildItemData(currData.recs,"국내출장비",pR);
      const actD=buildActivityData(currData.recs);
      setResult({currentMonth,prevMonth,comparison,aiComments,savedAt:new Date().toISOString()});
      setRepairData(repD);setSupplyData(supD);setTransportData(traD);setTripData(triD);setActivityData(actD);
      const res={currentMonth,prevMonth,comparison,aiComments,savedAt:new Date().toISOString()};
      const key="analysis:"+currentMonth+"_"+Date.now();
      lsSet(key,res);
      if(actD)lsSet("activity:"+currentMonth,actD);
      if(repD)lsSet("repair:"+currentMonth,repD);
      if(supD)lsSet("supply:"+currentMonth,supD);
      if(traD)lsSet("transport:"+currentMonth,traD);
      if(triD)lsSet("trip:"+currentMonth,triD);
      await sbSave({month:currentMonth,label:mLabel(currentMonth)+" 실적 분석",saved_at:new Date().toISOString(),result_data:res,activity_data:actD||null,repair_data:repD||null,supply_data:supD||null,transport_data:traD||null,trip_data:triD||null});
      loadHist();
      refreshSB();
      setTab("results");
    }catch(err){setError("오류: "+err.message);}
    finally{setAnalyzing(false);}
  }

  function selectHistory(h){
    const res=h.result_data||h;
    setResult(res);
    if(h.activity_data)setActivityData(h.activity_data);
    if(h.repair_data)setRepairData(h.repair_data);
    if(h.supply_data)setSupplyData(h.supply_data);
    if(h.transport_data)setTransportData(h.transport_data);
    if(h.trip_data)setTripData(h.trip_data);
    if(!h.result_data){
      const m=h.currentMonth;
      const ad=lsGet("activity:"+m);if(ad)setActivityData(ad);
      const rd=lsGet("repair:"+m);if(rd)setRepairData(rd);
      const sd=lsGet("supply:"+m);if(sd)setSupplyData(sd);
      const td=lsGet("transport:"+m);if(td)setTransportData(td);
      const trd=lsGet("trip:"+m);if(trd)setTripData(trd);
    }
    setTab("results");
  }

  if(!loggedIn)return <Login onLogin={(acct)=>setLoggedIn(true)}/>;
  return(
    <div style={{display:"flex",height:"100vh",fontFamily:"'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif",background:"#f0f4f8"}}>
      <Sidebar active={tab} onNav={setTab} onLogout={()=>setLoggedIn(false)}/>
      <main style={{flex:1,overflow:"auto",padding:"24px 28px"}}>
        {tab==="upload"&&<UploadTab currFile={currFile} prevFile={prevFile} onCurrUpload={f=>loadFile(f,"curr")} onPrevUpload={f=>loadFile(f,"prev")} onAnalyze={doAnalyze} analyzing={analyzing} error={error} hasKey={!!settings.geminiKey} history={history} onPrevHist={usePrevHist}/>}
        {tab==="results"&&result&&<ResultsTab result={result} onExport={()=>exportXLS(result)}/>}
        {tab==="results"&&!result&&<div style={{textAlign:"center",padding:"100px 20px",color:"#94a3b8"}}><p style={{fontSize:15,fontWeight:600,marginBottom:8}}>분석 결과가 없습니다</p></div>}
        {tab==="activity"&&<ActivityTab data={activityData}/>}
        {tab==="repair"&&<ItemAnalysisTab data={repairData} label="수선비" showDept={true}/>}
        {tab==="supply"&&<ItemAnalysisTab data={supplyData} label="소모품비" showDept={true}/>}
        {tab==="transport"&&<ItemAnalysisTab data={transportData} label="시내교통비" showDept={true}/>}
        {tab==="trip"&&<ItemAnalysisTab data={tripData} label="국내출장비" showDept={true}/>}
        {tab==="history"&&<HistoryTab
          history={history}
          sbRows={sbRows}
          sbLoading={sbLoading}
          onRefreshSB={refreshSB}
          onSelect={selectHistory}
          onDelete={k=>{lsDel(k);loadHist();}}
          onDeleteSB={async(id)=>{
            if(!window.confirm("클라우드에서 삭제합니다."))return;
            const sb=getSB();if(!sb)return;
            await sb.from("analysis_results").delete().eq("id",id);
            refreshSB();
          }}
        />}
        {tab==="settings"&&<SettingsTab settings={settings} onSave={saveSettings}/>}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script></body></html>
