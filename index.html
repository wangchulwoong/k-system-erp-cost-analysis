<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const XLSX = window.XLSX;

/* ─── 상수 ─── */
const DEFAULT_CREDS = { id:"admin", pw:"halla2026" };
const MFG_KW = ["부재료","노무비","시간외","외주가공","전력비","연료비","수도광열","소모품비","수선","보험료(제)","임차료(제)","감가상각비(제)","잡비(제)","제조간접","작업","생산"];
const SGA_KW = ["급여","상여","퇴직급여","복리후생","여비교통","통신비","수도광열비","세금과공과","임차료(판)","감가상각비(판)","보험료(판)","광고선전","접대비","기부금","판매수수료","운반비","도서인쇄","소모품비(판)","잡비(판)","잡급","수수료","지급수수료"];
const EXCLUDE_KW = ["레미콘 제품원가","제조원가","재료비","도급비","급료","임금","제품원가","상품원가","타계정으로대체"];
const ANOMALY_AMT = 5000000;

/* ─── 헬퍼 ─── */
const normAcc = acc => { const s=String(acc||""), i=s.indexOf("_"); return i>0?s.slice(0,i).trim():s.trim(); };
const classify = acc => { const n=normAcc(acc); if(MFG_KW.some(k=>n.includes(k)))return"제조경비"; if(SGA_KW.some(k=>n.includes(k)))return"판관비"; return"기타"; };
const isHQ = unit => ["본사","HQ","관리부"].some(k=>String(unit).includes(k));
const fmt = n => (n==null||isNaN(n))?"-":Math.round(n).toLocaleString("ko-KR");
const fmtM = n => Math.round((n||0)/10000).toLocaleString("ko-KR")+"만";
const dColor = d => d>0?"#dc2626":d<0?"#16a34a":"#94a3b8";
const dLabel = d => (d>0?"+":"")+fmt(d);
const pctS = (c,p) => { if(!p||p===0)return c>0?"신규":"-"; const v=(c-p)/Math.abs(p)*100; return(v>0?"▲":"▼")+Math.abs(v).toFixed(1)+"%"; };
const pctC = (c,p) => !p?"#94a3b8":c>p?"#dc2626":c<p?"#16a34a":"#94a3b8";
const mLabel = m => m&&m.length>=6?`${m.slice(0,4)}년 ${parseInt(m.slice(4,6))}월`:(m||"");

/* ─── localStorage ─── */
const lsGet  = k => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;} };
const lsSet  = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };
const lsList = p => { try{return Object.keys(localStorage).filter(k=>k.startsWith(p));}catch{return[];} };
const lsDel  = k => { try{localStorage.removeItem(k);}catch{} };

/* ─── ERP 파싱 ─── */
function parseDate(v) {
  if(!v&&v!==0)return"";
  if(typeof v==="number"){ try{const d=XLSX.SSF.parse_date_code(v);if(d)return`${d.y}${String(d.m).padStart(2,"0")}`;}catch{} }
  const s=String(v).replace(/\D/g,"");
  return s.length>=6?s.slice(0,6):"";
}

function parseERP(wb) {
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  const recs=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const month=parseDate(r[1]);
    const unit=String(r[3]||"").trim();
    const acc=String(r[16]||"").trim();
    const amt=typeof r[17]==="number"?r[17]:parseFloat(String(r[17]).replace(/,/g,""))||0;
    const memo=String(r[21]||"").trim();
    if(!unit||!acc||amt===0)continue;
    if(EXCLUDE_KW.some(k=>acc.includes(k)))continue;
    recs.push({month,unit,acc,amt,memo});
  }
  return recs;
}

function aggregate(recs) {
  const res={};
  recs.forEach(r=>{
    if(!r.month)return;
    const na=normAcc(r.acc);
    if(!res[r.month])res[r.month]={};
    if(!res[r.month][r.unit])res[r.month][r.unit]={};
    if(!res[r.month][r.unit][na])res[r.month][r.unit][na]={amt:0,memos:[],cat:classify(r.acc)};
    res[r.month][r.unit][na].amt+=r.amt;
    const m=res[r.month][r.unit][na].memos;
    if(r.memo&&m.length<20&&!m.includes(r.memo))m.push(r.memo);
  });
  return res;
}

/* ─── 비교 빌드 ─── */
function buildCompare(cA, pA) {
  const allU=new Set([...Object.keys(cA),...Object.keys(pA)]);
  const units=[];
  const totals={curr:{mfg:0,sga:0,etc:0},prev:{mfg:0,sga:0,etc:0}};
  allU.forEach(unit=>{
    const ca=cA[unit]||{}, pa=pA[unit]||{};
    const allAccs=new Set([...Object.keys(ca),...Object.keys(pa)]);
    const accs=[];
    const ut={curr:{mfg:0,sga:0,etc:0},prev:{mfg:0,sga:0,etc:0}};
    allAccs.forEach(acc=>{
      const c=ca[acc]?.amt||0, p=pa[acc]?.amt||0;
      const cat=ca[acc]?.cat||pa[acc]?.cat||classify(acc);
      const memos=[...(ca[acc]?.memos||[]),...(pa[acc]?.memos||[])].filter((m,i,a)=>a.indexOf(m)===i);
      accs.push({acc,cat,c,p,diff:c-p,memos});
      const k=cat==="제조경비"?"mfg":cat==="판관비"?"sga":"etc";
      ut.curr[k]+=c; ut.prev[k]+=p;
    });
    accs.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
    ["mfg","sga","etc"].forEach(k=>{totals.curr[k]+=ut.curr[k];totals.prev[k]+=ut.prev[k];});
    const tc=ut.curr.mfg+ut.curr.sga+ut.curr.etc;
    const tp=ut.prev.mfg+ut.prev.sga+ut.prev.etc;
    units.push({unit,accs,curr:ut.curr,prev:ut.prev,totalCurr:tc,totalPrev:tp});
  });
  units.sort((a,b)=>b.totalCurr-a.totalCurr);
  return{units,totals};
}

/* ─── Gemini ─── */
async function callGemini(prompt,apiKey){
  const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
    {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"Gemini API 오류");}
  const d=await res.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
}

async function analyze(compare,currentMonth,prevMonth,apiKey){
  const{units,totals}=compare;
  const tc=totals.curr,tp=totals.prev;
  let p=`당신은 레미콘·골재 제조업 전문 경영분석가입니다.
${mLabel(prevMonth||"")} 대비 ${mLabel(currentMonth)} 비용 전표 데이터를 분석합니다.
적요를 참고해 증감 원인을 팩트 위주로 작성하고 아래 JSON 형식으로만 응답하세요 (마크다운 없이).
문체: "~함","~임","~증가함","~감소함" 등 간결한 명사형. "~했습니다","~입니다" 사용 금지.

[전체 비용 변동]
- 제조경비: ${fmt(tp.mfg)}원 → ${fmt(tc.mfg)}원 (${dLabel(tc.mfg-tp.mfg)}원, ${pctS(tc.mfg,tp.mfg)})
- 판관비:   ${fmt(tp.sga)}원 → ${fmt(tc.sga)}원 (${dLabel(tc.sga-tp.sga)}원, ${pctS(tc.sga,tp.sga)})
- 합계:     ${fmt(tp.mfg+tp.sga+tp.etc)}원 → ${fmt(tc.mfg+tc.sga+tc.etc)}원\n\n`;
  units.forEach(u=>{
    const changes=u.accs.filter(a=>Math.abs(a.diff)>=100000);
    if(!changes.length)return;
    p+=`▶ ${u.unit} (당월: ${fmt(u.totalCurr)}원, 증감: ${dLabel(u.totalCurr-u.totalPrev)}원)\n`;
    changes.slice(0,7).forEach(a=>{
      p+=`  • ${a.acc}(${a.cat}): ${fmt(a.p)}→${fmt(a.c)} (${dLabel(a.diff)}원)\n`;
      if(a.memos.length)p+=`    [적요] ${a.memos.slice(0,5).join(" / ")}\n`;
    });
    p+="\n";
  });
  p+=`응답 JSON:
{"overallComment":"전체 비용 증감 핵심 요약(3~5문장, 주요단위·계정과목·금액 명시)",
"keyInsights":["인사이트1","인사이트2","인사이트3"],
"warnings":["주의항목1","주의항목2"],
"unitComments":{"전표관리단위명":{"summary":"1~2문장(금액포함)","details":["팩트1","팩트2","팩트3"]}}}`;
  const text=await callGemini(p,apiKey);
  const clean=text.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
  try{return JSON.parse(clean);}catch{return{overallComment:text,keyInsights:[],warnings:[],unitComments:{}};}
}

/* ─── Excel 내보내기 ─── */
function exportXLS(result){
  const{comparison,aiComments,currentMonth}=result;
  const{units,totals}=comparison;
  const wb=XLSX.utils.book_new();
  const tc=totals.curr,tp=totals.prev;
  const s1=[["비용실적 분석 보고서","","","",""],
    [`${mLabel(currentMonth)} 전월 대비 증감`,"","","",""],[""],
    ["구분","전월(원)","당월(원)","증감액(원)","증감률"],
    ["제조경비",tp.mfg,tc.mfg,tc.mfg-tp.mfg,pctS(tc.mfg,tp.mfg)],
    ["판관비",tp.sga,tc.sga,tc.sga-tp.sga,pctS(tc.sga,tp.sga)],
    ["기타",tp.etc,tc.etc,tc.etc-tp.etc,pctS(tc.etc,tp.etc)],
    ["합계",tp.mfg+tp.sga+tp.etc,tc.mfg+tc.sga+tc.etc,(tc.mfg+tc.sga+tc.etc)-(tp.mfg+tp.sga+tp.etc),pctS(tc.mfg+tc.sga+tc.etc,tp.mfg+tp.sga+tp.etc)]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s1),"전체요약");
  const s2=[["전표관리단위","구분","계정과목","전월(원)","당월(원)","증감액(원)","증감률","적요(상위3)"]];
  units.forEach(u=>{
    s2.push([u.unit,"","",u.totalPrev,u.totalCurr,u.totalCurr-u.totalPrev,pctS(u.totalCurr,u.totalPrev),"[소계]"]);
    u.accs.forEach(a=>s2.push(["",a.cat,a.acc,a.p,a.c,a.diff,pctS(a.c,a.p),a.memos.slice(0,3).join(" | ")]));
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s2),"전표관리단위별");
  const all=[];
  units.forEach(u=>u.accs.forEach(a=>all.push({unit:u.unit,...a})));
  all.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  const s3=[["순위","전표관리단위","계정과목","구분","전월(원)","당월(원)","증감액(원)","증감률","적요"]];
  all.slice(0,30).forEach((a,i)=>s3.push([i+1,a.unit,a.acc,a.cat,a.p,a.c,a.diff,pctS(a.c,a.p),a.memos.slice(0,3).join(" | ")]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s3),"주요증감TOP30");
  const s4=[["분석 결과"]];
  if(aiComments?.overallComment){s4.push(["▶ 전체 요약"]);s4.push([aiComments.overallComment]);s4.push([""]);}
  if(aiComments?.keyInsights?.length){s4.push(["▶ 주요 인사이트"]);aiComments.keyInsights.forEach(k=>s4.push(["  • "+k]));s4.push([""]);}
  if(aiComments?.warnings?.length){s4.push(["▶ 주의사항"]);aiComments.warnings.forEach(w=>s4.push(["  - "+w]));s4.push([""]);}
  if(aiComments?.unitComments){
    s4.push(["▶ 전표관리단위별 분석"]);
    Object.entries(aiComments.unitComments).forEach(([unit,c])=>{
      s4.push([unit]);s4.push(["  요약: "+c.summary]);
      c.details?.forEach(d=>s4.push(["    - "+d]));s4.push([""]);
    });
  }
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(s4),"분석코멘트");
  XLSX.writeFile(wb,`비용실적분석_${currentMonth}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* ─── SVG 바 차트 ─── */
function SvgBar({data}){
  if(!data||!data.length)return <p style={{color:"#94a3b8",fontSize:13,padding:16}}>데이터 없음</p>;
  const LABEL=120, PAD=8, W=500, BH=18, GAP=6;
  const maxV=Math.max(...data.flatMap(d=>[d.prev,d.curr]),1);
  const avail=W-LABEL-PAD;
  const H=data.length*(BH*2+GAP+8)+20;
  return(
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block",minWidth:280}}>
        {data.map((d,i)=>{
          const y=16+i*(BH*2+GAP+8);
          const pw=Math.max(Math.round(d.prev/maxV*avail),1);
          const cw=Math.max(Math.round(d.curr/maxV*avail),1);
          const up=d.curr>=d.prev;
          return(
            <g key={i}>
              <text x={LABEL-4} y={y+BH-4} fontSize={11} fill="#475569" textAnchor="end">{d.name}</text>
              <rect x={LABEL} y={y} width={pw} height={BH-2} fill="#cbd5e1" rx={2}/>
              <text x={LABEL+pw+3} y={y+BH-5} fontSize={10} fill="#64748b">{fmtM(d.prev)}</text>
              <rect x={LABEL} y={y+BH} width={cw} height={BH-2} fill={up?"#ef4444":"#22c55e"} rx={2}/>
              <text x={LABEL+cw+3} y={y+BH*2-5} fontSize={10} fill={up?"#dc2626":"#16a34a"} fontWeight="600">{fmtM(d.curr)}</text>
            </g>
          );
        })}
      </svg>
      <div style={{display:"flex",gap:16,fontSize:11,color:"#64748b",marginTop:4,paddingLeft:LABEL}}>
        <span><span style={{display:"inline-block",width:12,height:8,background:"#cbd5e1",borderRadius:2,marginRight:3}}></span>전월</span>
        <span><span style={{display:"inline-block",width:12,height:8,background:"#ef4444",borderRadius:2,marginRight:3}}></span>증가</span>
        <span><span style={{display:"inline-block",width:12,height:8,background:"#22c55e",borderRadius:2,marginRight:3}}></span>감소</span>
      </div>
    </div>
  );
}

function CostChart({units}){
  const site=units.filter(u=>!isHQ(u.unit));
  const hq=units.filter(u=>isHQ(u.unit));
  const toD=list=>list.map(u=>({name:u.unit.length>9?u.unit.slice(0,9)+"…":u.unit,prev:u.prev.mfg+u.prev.sga+u.prev.etc,curr:u.curr.mfg+u.curr.sga+u.curr.etc}));
  return(
    <div>
      {site.length>0&&(
        <div style={{marginBottom:hq.length>0?20:0}}>
          {hq.length>0&&<div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6}}>사업장</div>}
          <SvgBar data={toD(site)}/>
        </div>
      )}
      {hq.length>0&&(
        <div>
          <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6,paddingTop:site.length>0?8:0,borderTop:site.length>0?"1px solid #f1f5f9":"none"}}>본사</div>
          <SvgBar data={toD(hq)}/>
        </div>
      )}
    </div>
  );
}

/* ─── 공통 UI ─── */

    </div>

}
function Spinner(){return <span style={{display:"inline-block",width:14,height:14,border:"2px solid rgba(255,255,255,0.35)",borderTopColor:"white",borderRadius:"50%",animation:"spin 0.6s linear infinite",verticalAlign:"middle",marginRight:6}}/>;}
function CatBadge({cat}){
  const s={"제조경비":{bg:"#dbeafe",c:"#1d4ed8"},"판관비":{bg:"#ede9fe",c:"#6d28d9"}}[cat]||{bg:"#f0fdf4",c:"#166534"};
  return <span style={{padding:"1px 6px",borderRadius:4,fontSize:10,fontWeight:600,background:s.bg,color:s.c}}>{cat}</span>;

function MemoList({memos}){
  if(!memos||!memos.length)return <span style={{color:"#cbd5e1",fontSize:11}}>-</span>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:2}}>
      {memos.slice(0,3).map((m,i)=>(
        <span key={i} style={{display:"block",padding:"1px 6px",background:"#f8fafc",borderRadius:4,border:"1px solid #e2e8f0",fontSize:11,whiteSpace:"nowrap"}}>{m}</span>
      ))}
      {memos.length>3&&<span style={{fontSize:10,color:"#94a3b8",paddingLeft:2}}>외 {memos.length-3}건</span>}
    </div>
  );
}

/* ─── 로그인 ─── */
function Login({onLogin}){
  const [id,setId]=useState(""); const [pw,setPw]=useState(""); const [err,setErr]=useState("");
  function doLogin(){
    const s=lsGet("app:settings")||{creds:DEFAULT_CREDS};
    const cr=s.creds||DEFAULT_CREDS;
    if(id===cr.id&&pw===cr.pw)onLogin();
    else setErr("아이디 또는 비밀번호가 올바르지 않습니다.");
  }
  const inp={width:"100%",padding:"11px 14px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,outline:"none",background:"#f8fafc"};
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(145deg,#0f2040,#1a3a6e)"}}>
      <div style={{width:380,padding:"40px 36px",background:"rgba(255,255,255,0.97)",borderRadius:16,boxShadow:"0 24px 80px rgba(0,0,0,0.45)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:50,height:50,margin:"0 auto 14px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",borderRadius:14}}></div>
          <h1 style={{margin:0,fontSize:22,fontWeight:800,color:"#0f2040"}}>비용실적 분석시스템</h1>
          <p style={{margin:"6px 0 0",fontSize:13,color:"#64748b"}}>한라엔컴㈜ ERP 비용 분석 플랫폼</p>
        </div>

/* ─── 드롭존 ─── */
function DropZone({label,fileName,onUpload,required,badge}){
  const ref=useRef(); const [drag,setDrag]=useState(false);
  function handle(file){if(!file||(!file.name.endsWith(".xlsx")&&!file.name.endsWith(".xls"))){alert("xlsx/xls만 지원합니다.");return;}onUpload(file);}
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <label style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{label}</label>
        {required&&<span style={{fontSize:10,padding:"1px 6px",background:"#fee2e2",color:"#dc2626",borderRadius:4,fontWeight:700}}>필수</span>}
        {badge&&<span style={{fontSize:10,padding:"1px 6px",background:"#dbeafe",color:"#1d4ed8",borderRadius:4}}>{badge}</span>}
      </div>
      <div onClick={()=>ref.current.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0]);}}
        style={{border:`2px dashed ${fileName?"#16a34a":drag?"#3b82f6":"#cbd5e1"}`,borderRadius:10,padding:"18px 16px",textAlign:"center",cursor:"pointer",background:fileName?"#f0fdf4":drag?"#eff6ff":"#f8fafc"}}>
        {fileName
          ?<p style={{margin:0,fontSize:12,color:"#166534",fontWeight:600}}>{"✓ "}{fileName}</p>
          :<div><p style={{margin:0,fontSize:12,color:"#64748b"}}>클릭 또는 드래그</p><p style={{margin:"2px 0 0",fontSize:11,color:"#94a3b8"}}>.xlsx / .xls</p></div>}
      </div>
      <input ref={ref} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>e.target.files[0]&&handle(e.target.files[0])}/>
    </div>
  );
}

  units.forEach(u=>u.accs.forEach(a=>all.push({...a,unit:u.unit})));
  all.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));
  return(
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>

          <tr style={{background:"#f1f5f9"}}>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",margin:0}}>분석 결과</h2>
          <p style={{fontSize:13,color:"#64748b",margin:"4px 0 0"}}>{prevMonth?mLabel(prevMonth):"전월"}{" → "}{mLabel(currentMonth)}{" 비용 증감 분석"}</p>
        </div>
        <button onClick={onExport} style={{padding:"10px 22px",background:"#166534",color:"white",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>Excel 내보내기 (4시트)</button>
      </div>
      {aiComments?.overallComment&&(
        <div style={{background:"linear-gradient(135deg,#0f2040,#1a3a6e)",borderRadius:12,padding:"18px 22px",marginBottom:18,color:"white"}}>
          <div style={{fontSize:11,fontWeight:700,opacity:0.55,marginBottom:8,letterSpacing:"1px"}}>비용 증감 요약</div>
          <p style={{fontSize:14,lineHeight:1.8,margin:0,opacity:0.95}}>{aiComments.overallComment}</p>
          {(aiComments.keyInsights?.length>0||aiComments.warnings?.length>0)&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:14,paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.15)"}}>
              {aiComments.keyInsights?.length>0&&(
                <div>
                  <div style={{fontSize:11,fontWeight:700,opacity:0.6,marginBottom:6}}>주요 인사이트</div>
                  {aiComments.keyInsights.map((k,i)=><p key={i} style={{fontSize:12,margin:"3px 0",opacity:0.85}}>{"• "}{k}</p>)}
                </div>
              )}
              {aiComments.warnings?.length>0&&(
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginBottom:6}}>주의 항목</div>
                  {aiComments.warnings.map((w,i)=><p key={i} style={{fontSize:12,margin:"3px 0",color:"#fde68a"}}>{"• "}{w}</p>)}
                </div>
              )}
            </div>
          )}
        </div>
      )}
      <div style={{display:"flex",gap:4,marginBottom:16,borderBottom:"2px solid #e2e8f0"}}>
        {TABS.map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 16px",background:"none",border:"none",borderBottom:tab===id?"2px solid #1d4ed8":"2px solid transparent",color:tab===id?"#1d4ed8":"#64748b",fontWeight:tab===id?700:500,fontSize:13,cursor:"pointer",marginBottom:-2}}>{label}</button>
        ))}
      </div>
      {tab==="overview"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1.3fr",gap:16}}>
          <Card title="비용 구분별 요약"><SummaryTable totals={comparison.totals} currentMonth={currentMonth} prevMonth={prevMonth} units={comparison.units}/></Card>
          <Card title="단위별 당월 비용"><CostChart units={comparison.units}/></Card>
        </div>
      )}
      {tab==="units"&&<Card title="전표관리단위별 상세 분석"><UnitAccordion units={comparison.units} aiComments={aiComments}/></Card>}
      {tab==="top"&&<Card title="주요 증감 TOP 15 (증감액 기준)"><TopChanges units={comparison.units}/></Card>}
      {tab==="ai"&&<CommentTab aiComments={aiComments}/>}
    </div>
  );
}

/* ─── 히스토리 탭 ─── */
function HistoryTab({history,onSelect,onDelete}){
  if(!history.length)return(
    <div style={{textAlign:"center",padding:"80px 20px",color:"#94a3b8"}}>
      <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>저장된 히스토리가 없습니다</p>
      <p style={{fontSize:13}}>분석을 실행하면 자동으로 저장됩니다.</p>
    </div>
  );
  return(
    <div style={{maxWidth:800}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",marginBottom:4}}>분석 히스토리</h2>
      <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>과거 분석 결과를 확인하고 전월 기준으로 활용하세요</p>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {history.map((h,i)=>{
          const tot=h.comparison?.totals;
          const gc=tot?tot.curr.mfg+tot.curr.sga+tot.curr.etc:0;
          const gp=tot?tot.prev.mfg+tot.prev.sga+tot.prev.etc:0;
          return(
            <div key={i} style={{background:"white",borderRadius:10,padding:"16px 20px",boxShadow:"0 1px 4px rgba(0,0,0,0.07)",display:"flex",alignItems:"center",gap:14,border:"1px solid #e2e8f0"}}>
              <div style={{width:44,height:44,background:"linear-gradient(135deg,#1a3a6e,#2563eb)",borderRadius:10,flexShrink:0}}></div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:800,color:"#1e293b"}}>{mLabel(h.currentMonth)}{" 실적 분석"}</div>
                <div style={{fontSize:12,color:"#64748b",marginTop:2}}>
                  {h.prevMonth?mLabel(h.prevMonth)+" 대비":"단독 분석"}{" · "}{new Date(h.savedAt).toLocaleString("ko-KR")}
                </div>
                {tot&&<div style={{fontSize:13,marginTop:4}}>{"총비용 "}<b>{fmt(gc)}</b>{"원 · 전월比 "}<span style={{color:dColor(gc-gp),fontWeight:700}}>{dLabel(gc-gp)}{"원"}</span></div>}
              </div>
              <div style={{display:"flex",gap:8,flexShrink:0}}>
                <button onClick={()=>onSelect(h)} style={{padding:"8px 16px",background:"#1a3a6e",color:"white",border:"none",borderRadius:6,fontSize:12,cursor:"pointer",fontWeight:600}}>보기</button>
                <button onClick={()=>onDelete(h.key)} style={{padding:"8px 16px",background:"white",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,fontSize:12,cursor:"pointer"}}>삭제</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── 설정 탭 ─── */
function SettingsTab({settings,onSave}){
  const [key,setKey]=useState(settings.geminiKey||"");
  const [id,setId]=useState(settings.creds?.id||"admin");
  const [pw,setPw]=useState(settings.creds?.pw||"halla2026");
  const [saved,setSaved]=useState(false);
  function save(){onSave({geminiKey:key,creds:{id,pw}});setSaved(true);setTimeout(()=>setSaved(false),2000);}
  const inp={width:"100%",padding:"10px 13px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:14,background:"#f8fafc"};
  const lbl={fontSize:12,fontWeight:700,color:"#374151",display:"block",marginBottom:5};
  return(
    <div style={{maxWidth:600}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#0f2040",marginBottom:4}}>설정</h2>
      <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>Gemini API 키 및 로그인 계정을 관리합니다</p>
      <Card title="Gemini API 설정" mb={16}>
        <label style={lbl}>Google Gemini API 키 (gemini-2.5-flash)</label>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="AIza..." style={inp}/>
        <div style={{marginTop:8,padding:"10px 12px",background:"#eff6ff",borderRadius:7,border:"1px solid #bfdbfe",fontSize:12,color:"#1e40af"}}>
          Google AI Studio (aistudio.google.com) → API 키 발급 → 여기에 입력
        </div>
      </Card>
      <Card title="로그인 계정 관리" mb={16}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div><label style={lbl}>아이디</label><input value={id} onChange={e=>setId(e.target.value)} style={inp}/></div>
          <div><label style={lbl}>비밀번호</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} style={inp}/></div>
        </div>
      </Card>
      <Card title="ERP 파일 컬럼 구조 (고정)" mb={20}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13,color:"#4b5563"}}>
          {[["B열 (index 1)","회계일"],["D열 (index 3)","전표관리단위"],["Q열 (index 16)","계정과목"],["R열 (index 17)","차변금액"],["V열 (index 21)","적요"]].map(([col,name])=>(
            <div key={col} style={{display:"flex",gap:8,padding:"7px 10px",background:"#f8fafc",borderRadius:6}}>
              <span style={{fontWeight:700,color:"#1e40af",minWidth:100}}>{col}</span><span>{name}</span>
            </div>
          ))}
        </div>
      </Card>
      <button onClick={save} style={{padding:"12px 32px",background:"linear-gradient(135deg,#1a3a6e,#2563eb)",color:"white",border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:"pointer"}}>
        {saved?"저장 완료":"저장"}
      </button>
    </div>
  );
}

/* ─── 메인 앱 ─── */
function App(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [tab,setTab]=useState("upload");
  const [settings,setSettings]=useState({geminiKey:"",creds:DEFAULT_CREDS});
  const [currFile,setCurrFile]=useState(null);
  const [prevFile,setPrevFile]=useState(null);
  const [currData,setCurrData]=useState(null);
  const [prevData,setPrevData]=useState(null);
  const [result,setResult]=useState(null);
  const [analyzing,setAnalyzing]=useState(false);
  const [error,setError]=useState("");
  const [history,setHistory]=useState([]);

  useEffect(()=>{
    const s=lsGet("app:settings");
    if(s)setSettings(s);
    loadHist();
  },[]);

  function loadHist(){
    const keys=lsList("analysis:");
    const items=keys.map(k=>{const v=lsGet(k);return v?{key:k,...v}:null;}).filter(Boolean);
    items.sort((a,b)=>(b.savedAt||"").localeCompare(a.savedAt||""));
    setHistory(items);
  }
  function saveSettings(s){setSettings(s);lsSet("app:settings",s);}

  function loadFile(file,type){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"array"});
        const recs=parseERP(wb);
        const agg=aggregate(recs);
        const months=Object.keys(agg).sort();
        if(!months.length){alert("데이터를 찾을 수 없습니다. 컬럼 구조를 확인하세요.");return;}
        const data={recs,agg,months,fileName:file.name};
        if(type==="curr"){setCurrData(data);setCurrFile(file.name);}
        else{setPrevData(data);setPrevFile(file.name);}
      }catch(err){alert("파일 파싱 오류: "+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function usePrevHist(h){
    const recAgg={};
    h.comparison?.units?.forEach(u=>{
      recAgg[u.unit]={};
      u.accs.forEach(a=>{recAgg[u.unit][a.acc]={amt:a.c,memos:a.memos,cat:a.cat};});
    });
    setPrevData({fromHistory:true,recAgg,months:[h.currentMonth],fileName:mLabel(h.currentMonth)+" (히스토리)"});
    setPrevFile(mLabel(h.currentMonth)+" (히스토리)");
  }

  async function runAnalysis(){
    if(!currData){alert("당월 파일을 업로드해주세요.");return;}
    if(!settings.geminiKey){alert("설정 메뉴에서 Gemini API 키를 입력해주세요.");return;}
    setAnalyzing(true);setError("");
    try{
      const currentMonth=currData.months[currData.months.length-1];
      const currAgg=currData.agg[currentMonth]||{};
      let prevAgg={},prevMonth=null;
      if(prevData){
        if(prevData.fromHistory){prevAgg=prevData.recAgg||{};prevMonth=prevData.months[0];}
        else{prevMonth=prevData.months[prevData.months.length-1];prevAgg=prevData.agg[prevMonth]||{};}
      }
      const comparison=buildCompare(currAgg,prevAgg);
      const aiComments=await analyze(comparison,currentMonth,prevMonth,settings.geminiKey);
      const res={currentMonth,prevMonth,comparison,aiComments,currentFileName:currData.fileName,prevFileName:prevData?.fileName||null,savedAt:new Date().toISOString()};
      setResult(res);
      lsSet("analysis:"+currentMonth+"_"+Date.now(),res);
      loadHist();
      setTab("results");
    }catch(err){setError("오류: "+err.message);}
    finally{setAnalyzing(false);}
  }

  if(!loggedIn)return <Login onLogin={()=>setLoggedIn(true)}/>;

  return(
    <div style={{display:"flex",height:"100vh",fontFamily:"'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif",background:"#f0f4f8"}}>
      <Sidebar active={tab} onNav={setTab} onLogout={()=>setLoggedIn(false)}/>
      <main style={{flex:1,overflow:"auto",padding:"24px 28px"}}>
        {tab==="upload"&&<UploadTab currFile={currFile} prevFile={prevFile} onCurrUpload={f=>loadFile(f,"curr")} onPrevUpload={f=>loadFile(f,"prev")} onAnalyze={runAnalysis} analyzing={analyzing} error={error} hasKey={!!settings.geminiKey} history={history} onPrevHist={usePrevHist}/>}
        {tab==="results"&&result&&<ResultsTab result={result} onExport={()=>exportXLS(result)}/>}
        {tab==="results"&&!result&&(
          <div style={{textAlign:"center",padding:"100px 20px",color:"#94a3b8"}}>
            <p style={{fontSize:15,fontWeight:600,marginBottom:8}}>분석 결과가 없습니다</p>
            <p style={{fontSize:13}}>분석하기 탭에서 파일을 업로드하고 분석을 실행하세요.</p>
          </div>
        )}
        {tab==="history"&&<HistoryTab history={history} onSelect={h=>{setResult(h);setTab("results");}} onDelete={k=>{lsDel(k);loadHist();}}/>}
        {tab==="settings"&&<SettingsTab settings={settings} onSave={saveSettings}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
