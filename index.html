const MFG_KW=["부재료","노무비","시간외","외주가공","전력비","연료비","수도광열","소모품비","수선","보험료(제)","임차료(제)","감가상각비(제)","잡비(제)","제조간접","작업","생산"];
const SGA_KW=["급여","상여","퇴직급여","복리후생","여비교통","통신비","수도광열비","세금과공과","임차료(판)","감가상각비(판)","보험료(판)","광고선전","접대비","기부금","판매수수료","운반비","도서인쇄","소모품비(판)","잡비(판)","잡급","수수료","지급수수료"];
const EXCLUDE_KW=["레미콘 제품원가","제조원가","재료비","도급비","급료","임금","제품원가","상품원가","타계정으로대체"];
const ANOMALY_AMT=5000000;
const EXCLUDE_DISPLAY=["레미콘 제품원가","제조원가","재료비","도급비","급료","임금","제품원가","상품원가","타계정으로대체액"];

/* ─── 헬퍼 ─── */
const normAcc=acc=>{const s=String(acc||""),i=s.indexOf("_");return i>0?s.slice(0,i).trim():s.trim();};
const classify=acc=>{const n=normAcc(acc);if(MFG_KW.some(k=>n.includes(k)))return"제조경비";if(SGA_KW.some(k=>n.includes(k)))return"판관비";return"기타";};
const isHQ=unit=>["본사","HQ","관리부"].some(k=>String(unit).includes(k));
const fmt=n=>(n==null||isNaN(n))?"-":Math.round(n).toLocaleString("ko-KR");
const fmtM=n=>{const v=n||0;if(Math.abs(v)>=100000000)return(v/100000000).toFixed(2)+"억";if(Math.abs(v)>=10000000)return(v/10000000).toFixed(1)+"천만";return Math.round(v/10000).toLocaleString()+"만";};
const fmtAmt=n=>{if(!n||isNaN(n))return"";const a=Math.abs(Math.round(n));if(a>=100000000)return(Math.round(n/100000000*10)/10).toFixed(1)+"억";if(a>=10000000)return Math.round(n/10000000)+"천만";if(a>=10000)return Math.round(n/10000)+"만";return Math.round(n).toLocaleString()+"원";};
const dColor=d=>d>0?"#dc2626":d<0?"#16a34a":"#94a3b8";
const dLabel=d=>(d>0?"+":"")+fmt(d);
const pctS=(c,p)=>{if(!p||p===0)return c>0?"신규":"-";const v=(c-p)/Math.abs(p)*100;return(v>0?"▲":"▼")+Math.abs(v).toFixed(1)+"%";};
const pctC=(c,p)=>!p?"#94a3b8":c>p?"#dc2626":c<p?"#16a34a":"#94a3b8";
const mLabel=m=>m&&m.length>=6?`${m.slice(0,4)}년 ${parseInt(m.slice(4,6))}월`:(m||"");

/* ─── localStorage ─── */
const lsGet=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const lsList=p=>{try{return Object.keys(localStorage).filter(k=>k.startsWith(p));}catch{return[];}};
const lsDel=k=>{try{localStorage.removeItem(k);}catch{}};

/* ─── ERP 파싱 ─── */
function parseDate(v){
  if(!v&&v!==0)return"";
  if(typeof v==="number"){try{const d=XLSX.SSF.parse_date_code(v);if(d)return`${d.y}${String(d.m).padStart(2,"0")}`;}catch{}}
  const s=String(v).replace(/\D/g,"");return s.length>=6?s.slice(0,6):"";
}
function parseERP(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
  const recs=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const month=parseDate(r[1]),unit=String(r[3]||"").trim(),acc=String(r[16]||"").trim();
    const amt=typeof r[17]==="number"?r[17]:parseFloat(String(r[17]).replace(/,/g,""))||0;
    const memo=String(r[21]||"").trim();
    if(!unit||!acc||amt===0)continue;
    if(EXCLUDE_KW.some(k=>acc.includes(k)))continue;
    recs.push({month,unit,acc,amt,memo});
  }
  return recs;
}

/* ─── aggregate: 적요를 금액과 함께 저장, 금액순 정렬 ─── */
function aggregate(recs){
  const res={};
  recs.forEach(r=>{
    if(!r.month)return;
    const na=normAcc(r.acc);
    if(!res[r.month])res[r.month]={};
    if(!res[r.month][r.unit])res[r.month][r.unit]={};
    if(!res[r.month][r.unit][na])res[r.month][r.unit][na]={amt:0,memoMap:{},cat:classify(r.acc)};
    const entry=res[r.month][r.unit][na];
    entry.amt+=r.amt;
    // 적요별 금액 합산
    if(r.memo){entry.memoMap[r.memo]=(entry.memoMap[r.memo]||0)+r.amt;}
  });
  // memoMap → 금액순 정렬된 [{text,amt}] 배열로 변환
  Object.values(res).forEach(mo=>Object.values(mo).forEach(un=>Object.values(un).forEach(entry=>{
    entry.memos=Object.entries(entry.memoMap).map(([text,amt])=>({text,amt})).sort((a,b)=>b.amt-a.amt);
    delete entry.memoMap;
  })));
  return res;
}

/* ─── buildCompare ─── */
function buildCompare(cA,pA){
  const allU=new Set([...Object.keys(cA),...Object.keys(pA)]);
  const units=[],totals={curr:{mfg:0,sga:0,etc:0},prev:{mfg:0,sga:0,etc:0}};
  allU.forEach(unit=>{
    const ca=cA[unit]||{},pa=pA[unit]||{};
    const allAccs=new Set([...Object.keys(ca),...Object.keys(pa)]);
    const accs=[],ut={curr:{mfg:0,sga:0,etc:0},prev:{mfg:0,sga:0,etc:0}};
    allAccs.forEach(acc=>{
      const c=ca[acc]?.amt||0,p=pa[acc]?.amt||0;
      const cat=ca[acc]?.cat||pa[acc]?.cat||classify(acc);
      // 당월 적요 우선, 없으면 전월 적요 사용 (모두 [{text,amt}] 형식)
      const memos=ca[acc]?.memos||pa[acc]?.memos||[];
      accs.push({acc,cat,c,p,diff:c-p,memos});
      const k=cat==="제조경비"?"mfg":cat==="판관비"?"sga":"etc";
      ut.curr[k]+=c;ut.prev[k]+=p;
    });
    accs.sort((a,b)=>b.c-a.c); // 당월 금액 내림차순
    ["mfg","sga","etc"].forEach(k=>{totals.curr[k]+=ut.curr[k];totals.prev[k]+=ut.prev[k];});
    const tc=ut.curr.mfg+ut.curr.sga+ut.curr.etc,tp=ut.prev.mfg+ut.prev.sga+ut.prev.etc;
    units.push({unit,accs,curr:ut.curr,prev:ut.prev,totalCurr:tc,totalPrev:tp});
  });
  units.sort((a,b)=>b.totalCurr-a.totalCurr);
  return{units,totals};
}

/* ─── Gemini API (모델 폴백 + 재시도) ─── */
async function callGemini(prompt,apiKey){
  const MODELS=["gemini-2.5-flash","gemini-2.0-flash","gemini-1.5-flash"];
  const WAIT=[5000,12000,25000];
  const isOverload=msg=>["high demand","overloaded","unavailable","503","quota"].some(k=>String(msg).toLowerCase().includes(k));
  for(let mi=0;mi<MODELS.length;mi++){
    for(let at=0;at<3;at++){
      try{
        const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODELS[mi]}:generateContent?key=${apiKey}`,
          {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
        const d=await res.json();
        const errMsg=d.error?.message||((!res.ok)?"HTTP "+res.status:"");
        if(errMsg){if(isOverload(errMsg)&&at<2){await new Promise(r=>setTimeout(r,WAIT[at]));continue;}if(isOverload(errMsg)){break;}throw new Error(errMsg);}
        return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
      }catch(err){
        if(isOverload(err.message)&&at<2){await new Promise(r=>setTimeout(r,WAIT[at]));continue;}
        if(isOverload(err.message)){break;}
        throw err;
      }
    }
  }
  throw new Error("모든 모델 과부하 상태. 잠시 후 다시 시도해주세요.");
}

async function analyze(compare,currentMonth,prevMonth,apiKey){
  const{units,totals}=compare;
  const tc=totals.curr,tp=totals.prev;
  let p=`당신은 레미콘·골재 제조업 원가 및 경영분석 전문가입니다.
${mLabel(prevMonth||"")} 대비 ${mLabel(currentMonth)} 비용 전표 데이터를 분석합니다.
아래 지침을 반드시 준수하세요:
1. 증감 원인은 적요 기반 팩트 중심. 추측 표현 금지.
2. 금액은 반드시 원 단위로 명시 (예: 1,234만원, 2.3억원).
3. 구조적 증감(정기적·계절적)과 비구조적 증감(일회성·이상)을 구분하여 서술.
4. 전체 요약은 핵심 수치 → 주요 원인 → 관리 포인트 순서로 작성.
5. 핵심 분석 결과는 각각 "어느 단위의 어느 계정이 얼마 변동했고 원인은 무엇"인지 구체적으로.
6. 문체: "~함","~임","~증가함","~감소함" 등 명사형 종결. "~했습니다","~입니다" 금지.
7. JSON 형식으로만 응답 (마크다운 없이).

[전체 비용 변동]
- 제조경비: ${fmt(tp.mfg)}원 → ${fmt(tc.mfg)}원 (${dLabel(tc.mfg-tp.mfg)}원, ${pctS(tc.mfg,tp.mfg)})
- 판관비: ${fmt(tp.sga)}원 → ${fmt(tc.sga)}원 (${dLabel(tc.sga-tp.sga)}원, ${pctS(tc.sga,tp.sga)})
- 합계: ${fmt(tp.mfg+tp.sga+tp.etc)}원 → ${fmt(tc.mfg+tc.sga+tc.etc)}원\n\n`;
  units.forEach(u=>{
    const changes=u.accs.filter(a=>Math.abs(a.diff)>=100000);
    if(!changes.length)return;
    p+=`▶ ${u.unit} (당월: ${fmt(u.totalCurr)}원, 증감: ${dLabel(u.totalCurr-u.totalPrev)}원)\n`;
    changes.slice(0,7).forEach(a=>{
      p+=`  • ${a.acc}(${a.cat}): ${fmt(a.p)}→${fmt(a.c)} (${dLabel(a.diff)}원)\n`;
      if(a.memos.length)p+=`    [적요] ${a.memos.slice(0,4).map(m=>m.text+"("+fmtAmt(m.amt)+")").join(" / ")}\n`;
    });
    p+="\n";
  });
  p+=`응답 JSON:
{"overallComment":"아래 3개 단락을 줄바꿈(\\n\\n)으로 구분하여 작성:\n1단락) 전체 비용 증감 수치 요약(총액·구분별 증감액·증감률 명시)\n2단락) 주요 증가 원인(단위명·계정과목·금액 명시, 구조적/일회성 구분)\n3단락) 주요 감소 요인 및 관리 포인트",
"keyInsights":["[단위명] [계정과목]: [금액] ([증감률]) — [원인] ([구조적/일회성])","동일 형식","동일 형식"],
"warnings":["[단위명] [계정과목]: [급등/급락 이유 및 검토 필요 사항]","동일 형식"],
"unitComments":{"전표관리단위명":{"summary":"당월 합계 [금액], 전월 대비 [증감액]([증감률]). 주요 증감 원인 1~2문장.","details":["[계정과목] [금액변동]: [적요 기반 구체적 원인]","동일 형식","동일 형식"]}}}`;
  const text=await callGemini(p,apiKey);
  const clean=text.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
  try{return JSON.parse(clean);}catch{return{overallComment:text,keyInsights:[],warnings:[],unitComments:{}};}
}

  };

      ws4[XLSX.utils.encode_cell({r:r4,c:0})]=C(cm.summary,{...S.CMBDY,font:{sz:10,bold:true,color:{rgb:CLR.navy}}});r4++;
      cm.details?.forEach(d=>{ws4[XLSX.utils.encode_cell({r:r4,c:0})]=C("•  "+d,S.CMBLU);r4++;});
      r4++;
    });
  }
  ws4[XLSX.utils.encode_cell({r:r4,c:0})]=C("※ 분석 제외 계정과목: "+EXCLUDE_DISPLAY.join(", ")+"  (이중계상 방지 및 집계 대분류 항목)",{...S.MEMO,font:{sz:9,italic:true,color:{rgb:CLR.amber}}});r4++;
  ws4["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:r4,c:0}});
  ws4["!merges"]=[{s:{r:0,c:0},e:{r:0,c:0}},{s:{r:1,c:0},e:{r:1,c:0}}];
  ws4["!cols"]=[{wch:150}];
  ws4["!rows"]=[{hpt:40},{hpt:20}];
  ws4["!pageSetup"]=pageSetup;ws4["!margins"]=margins;
  XLSX.utils.book_append_sheet(wb,ws4,"분석코멘트");

  XLSX.writeFile(wb,`비용실적분석_${currentMonth}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* ─── SVG 바 차트 ─── */
function SvgBar({data}){
  if(!data||!data.length)return <p style={{color:"#94a3b8",fontSize:13,padding:16}}>데이터 없음</p>;
  const LABEL=130,PAD=8,W=520,BH=18,GAP=5;
  const maxV=Math.max(...data.flatMap(d=>[d.prev,d.curr]),1);
  const avail=W-LABEL-PAD;
  const H=data.length*(BH*2+GAP+8)+20;
  return(
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block",minWidth:260}}>
        {data.map((d,i)=>{
          const y=16+i*(BH*2+GAP+8);
          const pw=Math.max(Math.round(d.prev/maxV*avail),1);
          const cw=Math.max(Math.round(d.curr/maxV*avail),1);
          const up=d.curr>=d.prev;
          return(
            <g key={i}>
              <text x={LABEL-4} y={y+BH-4} fontSize={11} fill="#475569" textAnchor="end">{d.name}</text>
              <rect x={LABEL} y={y} width={pw} height={BH-2} fill="#cbd5e1" rx={2}/>
              <text x={LABEL+pw+3} y={y+BH-5} fontSize={10} fill="#64748b">{fmtM(d.prev)}</text>
              <rect x={LABEL} y={y+BH} width={cw} height={BH-2} fill={up?"#ef4444":"#22c55e"} rx={2}/>
              <text x={LABEL+cw+3} y={y+BH*2-5} fontSize={10} fill={up?"#dc2626":"#16a34a"} fontWeight="600">{fmtM(d.curr)}</text>
            </g>
          );
        })}
      </svg>
      <div style={{display:"flex",gap:16,fontSize:11,color:"#64748b",marginTop:4,paddingLeft:LABEL}}>
        <span><span style={{display:"inline-block",width:12,height:8,background:"#cbd5e1",borderRadius:2,marginRight:3}}></span>전월</span>
        <span><span style={{display:"inline-block",width:12,height:8,background:"#ef4444",borderRadius:2,marginRight:3}}></span>증가</span>
        <span><span style={{display:"inline-block",width:12,height:8,background:"#22c55e",borderRadius:2,marginRight:3}}></span>감소</span>
      </div>
    </div>
  );
}
function CostChart({units}){
  const site=units.filter(u=>!isHQ(u.unit)),hq=units.filter(u=>isHQ(u.unit));
  const toD=list=>list.map(u=>({name:u.unit.length>9?u.unit.slice(0,9)+"…":u.unit,prev:u.prev.mfg+u.prev.sga+u.prev.etc,curr:u.curr.mfg+u.curr.sga+u.curr.etc}));
  return(
    <div>
      {site.length>0&&<div style={{marginBottom:hq.length>0?20:0}}>{hq.length>0&&<div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6}}>사업장</div>}<SvgBar data={toD(site)}/></div>}
      {hq.length>0&&<div><div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6,paddingTop:site.length>0?8:0,borderTop:site.length>0?"1px solid #f1f5f9":"none"}}>본사</div><SvgBar data={toD(hq)}/></div>}

}

/* ─── 요약 테이블 (강화) ─── */
function SummaryTable({totals,currentMonth,prevMonth,units,aiComments}){
  const rows=[
    {label:"제조경비",c:totals.curr.mfg,p:totals.prev.mfg,color:"#1e40af",bg:"#eff6ff"},
    {label:"판관비",c:totals.curr.sga,p:totals.prev.sga,color:"#7c3aed",bg:"#f5f3ff"},
    {label:"기타",c:totals.curr.etc,p:totals.prev.etc,color:"#4b5563",bg:"#f9fafb"},
  ];
  const gc=rows.reduce((s,r)=>s+r.c,0),gp=rows.reduce((s,r)=>s+r.p,0);
  const th={padding:"9px 12px",background:"#0f2040",color:"white",fontSize:12,fontWeight:700,textAlign:"right"};
  const top3=units?units.slice(0,3):[];
  const top3pct=gc>0?(top3.reduce((s,u)=>s+u.totalCurr,0)/gc*100).toFixed(1):0;

  const allFlat=[];units?.forEach(u=>u.accs.forEach(a=>allFlat.push({...a,unit:u.unit})));
  allFlat.sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff));

  const top3Dn=allFlat.filter(a=>a.diff<0).slice(0,3);

    <div>

          <tr>

            <th style={th}>{prevMonth?mLabel(prevMonth):"전월"}</th>
            <th style={th}>{mLabel(currentMonth)}</th>
            <th style={th}>증감액</th>
            <th style={th}>증감률</th>
            <th style={th}>비중</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r,i)=>{const d=r.c-r.p;const share=gc>0?(r.c/gc*100).toFixed(1):0;return(
            <tr key={i} style={{background:r.bg}}>
              <td style={{padding:"10px 12px",paddingLeft:16,fontWeight:700,color:r.color}}>{r.label}</td>
              <td style={{padding:"10px 12px",textAlign:"right"}}>{fmt(r.p)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",fontWeight:600}}>{fmt(r.c)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",color:dColor(d),fontWeight:700}}>{dLabel(d)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",color:pctC(r.c,r.p)}}>{pctS(r.c,r.p)}</td>
              <td style={{padding:"10px 12px",textAlign:"right",color:"#475569"}}>{share}%</td>
            </tr>
          );})}
          <tr style={{background:"#0f2040"}}>
            <td style={{padding:"10px 12px",paddingLeft:16,fontWeight:800,color:"white"}}>합 계</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:"rgba(255,255,255,0.8)"}}>{fmt(gp)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",fontWeight:800,color:"white"}}>{fmt(gc)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:dColor(gc-gp),fontWeight:800}}>{dLabel(gc-gp)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:pctC(gc,gp),fontWeight:700}}>{pctS(gc,gp)}</td>
            <td style={{padding:"10px 12px",textAlign:"right",color:"rgba(255,255,255,0.7)"}}>100%</td>
          </tr>
        </tbody>
      </table>
      {/* 비용 집중도 */}
      {top3.length>0&&(
        <div style={{padding:"8px 14px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0",fontSize:12,color:"#475569",marginBottom:10}}>
          <b style={{color:"#1e293b"}}>비용 집중도</b>{" 상위 3개 단위("}{top3.map(u=>u.unit).join(", ")}{")가 전체 "}
          <b style={{color:"#1e40af"}}>{top3pct}%</b>{" 차지"}
        </div>
      )}
      {/* 주요 증감 요인 */}
      {(top3Up.length>0||top3Dn.length>0)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{background:"#fef2f2",borderRadius:8,padding:"10px 12px",border:"1px solid #fecaca"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#b91c1c",marginBottom:6}}>주요 증가 항목</div>
            {top3Up.map((a,i)=>(
              <div key={i} style={{fontSize:11,marginBottom:4}}>
                <span style={{color:"#1e293b",fontWeight:500}}>{a.unit} · {a.acc}</span>
                <span style={{color:"#dc2626",fontWeight:700,float:"right"}}>{dLabel(a.diff)}원</span>
              </div>
            ))}
          </div>
          <div style={{background:"#f0fdf4",borderRadius:8,padding:"10px 12px",border:"1px solid #bbf7d0"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#166534",marginBottom:6}}>주요 감소 항목</div>

function DropZone({label,fileName,onUpload,required,badge}){
  const ref=useRef();const [drag,setDrag]=useState(false);
  function handle(file){if(!file||(!file.name.endsWith(".xlsx")&&!file.name.endsWith(".xls"))){alert("xlsx/xls만 지원합니다.");return;}onUpload(file);}
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <label style={{fontSize:13,fontWeight:700,color:"#1e293b"}}>{label}</label>
        {required&&<span style={{fontSize:10,padding:"1px 6px",background:"#fee2e2",color:"#dc2626",borderRadius:4,fontWeight:700}}>필수</span>}
        {badge&&<span style={{fontSize:10,padding:"1px 6px",background:"#dbeafe",color:"#1d4ed8",borderRadius:4}}>{badge}</span>}
      </div>
      <div onClick={()=>ref.current.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0]);}}
        style={{border:`2px dashed ${fileName?"#16a34a":drag?"#3b82f6":"#cbd5e1"}`,borderRadius:10,padding:"18px 16px",textAlign:"center",cursor:"pointer",background:fileName?"#f0fdf4":drag?"#eff6ff":"#f8fafc"}}>
        {fileName?<p style={{margin:0,fontSize:12,color:"#166534",fontWeight:600}}>{"✓ "}{fileName}</p>:<div><p style={{margin:0,fontSize:12,color:"#64748b"}}>클릭 또는 드래그</p><p style={{margin:"2px 0 0",fontSize:11,color:"#94a3b8"}}>.xlsx / .xls</p></div>}
      </div>
      <input ref={ref} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>e.target.files[0]&&handle(e.target.files[0])}/>
    </div>
  );
}

  const [tab,setTab]=useState("upload");
  const [settings,setSettings]=useState({geminiKey:"",creds:DEFAULT_CREDS});
  const [currFile,setCurrFile]=useState(null);const [prevFile,setPrevFile]=useState(null);
  const [currData,setCurrData]=useState(null);const [prevData,setPrevData]=useState(null);
  const [result,setResult]=useState(null);const [analyzing,setAnalyzing]=useState(false);
  const [error,setError]=useState("");const [history,setHistory]=useState([]);
  useEffect(()=>{const s=lsGet("app:settings");if(s)setSettings(s);loadHist();},[]);
  function loadHist(){const keys=lsList("analysis:");const items=keys.map(k=>{const v=lsGet(k);return v?{key:k,...v}:null;}).filter(Boolean);items.sort((a,b)=>(b.savedAt||"").localeCompare(a.savedAt||""));setHistory(items);}
  function saveSettings(s){setSettings(s);lsSet("app:settings",s);}
  function loadFile(file,type){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:"array"});
        const recs=parseERP(wb);const agg=aggregate(recs);const months=Object.keys(agg).sort();
        if(!months.length){alert("데이터를 찾을 수 없습니다.");return;}
        const data={recs,agg,months,fileName:file.name};
        if(type==="curr"){setCurrData(data);setCurrFile(file.name);}else{setPrevData(data);setPrevFile(file.name);}
      }catch(err){alert("파일 파싱 오류: "+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }
  function usePrevHist(h){
    const recAgg={};
    h.comparison?.units?.forEach(u=>{recAgg[u.unit]={};u.accs.forEach(a=>{recAgg[u.unit][a.acc]={amt:a.c,memos:a.memos||[],cat:a.cat};});});
    setPrevData({fromHistory:true,recAgg,months:[h.currentMonth],fileName:mLabel(h.currentMonth)+" (히스토리)"});
    setPrevFile(mLabel(h.currentMonth)+" (히스토리)");
  }
  async function runAnalysis(){
    if(!currData){alert("당월 파일을 업로드해주세요.");return;}
    if(!settings.geminiKey){alert("설정 메뉴에서 Gemini API 키를 입력해주세요.");return;}
    setAnalyzing(true);setError("");
    try{
      const currentMonth=currData.months[currData.months.length-1];
      const currAgg=currData.agg[currentMonth]||{};
      let prevAgg={},prevMonth=null;
      if(prevData){if(prevData.fromHistory){prevAgg=prevData.recAgg||{};prevMonth=prevData.months[0];}else{prevMonth=prevData.months[prevData.months.length-1];prevAgg=prevData.agg[prevMonth]||{};}}
      const comparison=buildCompare(currAgg,prevAgg);
      const aiComments=await analyze(comparison,currentMonth,prevMonth,settings.geminiKey);
      const res={currentMonth,prevMonth,comparison,aiComments,currentFileName:currData.fileName,prevFileName:prevData?.fileName||null,savedAt:new Date().toISOString()};
      setResult(res);lsSet("analysis:"+currentMonth+"_"+Date.now(),res);loadHist();setTab("results");
    }catch(err){
      const msg=err.message||"";
      setError(msg.includes("과부하")||msg.includes("high demand")||msg.includes("overloaded")?"Gemini 서버 일시 과부하. 잠시 후 분석 실행을 다시 눌러주세요.":"오류: "+msg);
    }finally{setAnalyzing(false);}
  }
  if(!loggedIn)return <Login onLogin={()=>setLoggedIn(true)}/>;
  return(
    <div style={{display:"flex",height:"100vh",fontFamily:"'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif",background:"#f0f4f8"}}>
      <Sidebar active={tab} onNav={setTab} onLogout={()=>setLoggedIn(false)}/>
      <main style={{flex:1,overflow:"auto",padding:"24px 28px"}}>
        {tab==="upload"&&<UploadTab currFile={currFile} prevFile={prevFile} onCurrUpload={f=>loadFile(f,"curr")} onPrevUpload={f=>loadFile(f,"prev")} onAnalyze={runAnalysis} analyzing={analyzing} error={error} hasKey={!!settings.geminiKey} history={history} onPrevHist={usePrevHist}/>}
        {tab==="results"&&result&&<ResultsTab result={result} onExport={()=>exportXLS(result)}/>}
        {tab==="results"&&!result&&(<div style={{textAlign:"center",padding:"100px 20px",color:"#94a3b8"}}><p style={{fontSize:15,fontWeight:600,marginBottom:8}}>분석 결과가 없습니다</p><p style={{fontSize:13}}>분석하기 탭에서 파일을 업로드하고 분석을 실행하세요.</p></div>)}
        {tab==="history"&&<HistoryTab history={history} onSelect={h=>{setResult(h);setTab("results");}} onDelete={k=>{lsDel(k);loadHist();}}/>}
        {tab==="settings"&&<SettingsTab settings={settings} onSave={saveSettings}/>}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
